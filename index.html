// ── MachineForm ───────────────────────────────────────────────────────────────
const MachineForm = ({ initial, quoteData, machineOpts, onUpdateMachineOpts, onSaveBrands, onSave, onBack }) => {
  const { brands = [], iceMachines = [] } = quoteData;
  const [brand,    setBrand]    = useState(initial?.brand    || "");
  const [modelSel, setModelSel] = useState("");
  const [modelCustom, setModelCustom] = useState(initial?.model || "");
  const [serialNo, setSerialNo] = useState(initial?.serialNo || "");
  const [iceType,  setIceType]  = useState(initial?.iceType  || "");
  const [capacity, setCapacity] = useState(initial?.capacity || "");
  const [voltage,  setVoltage]  = useState(initial?.voltage  || "");
  const [coolant,  setCoolant]  = useState(initial?.coolant  || "");
  const [cooling,  setCooling]  = useState(initial?.cooling  || "");
  const [type,     setType]     = useState(initial?.type     || "");
  const [customer, setCustomer] = useState(initial?.customer || "");
  const [editOpts, setEditOpts] = useState(null);
  const [showBrand, setShowBrand] = useState(false);

  // init modelSel when editing
  useEffect(() => {
    if (!initial?.model) return;
    const found = iceMachines.find(m => m.brand===initial.brand && m.model===initial.model);
    setModelSel(found ? initial.model : "__other__");
    setModelCustom(found ? "" : initial.model);
  }, []);

  const brandModels = [...new Set(iceMachines.filter(m => m.brand===brand).map(m => m.model))];
  const finalModel  = modelSel==="__other__" ? modelCustom : modelSel;

  const CHIPS = [
    { key:"iceType",  label:"冰型", val:iceType,  set:setIceType },
    { key:"capacity", label:"磅數", val:capacity, set:setCapacity },
    { key:"voltage",  label:"電壓", val:voltage,  set:setVoltage },
    { key:"coolant",  label:"冷媒", val:coolant,  set:setCoolant },
    { key:"cooling",  label:"散熱", val:cooling,  set:setCooling },
  ];

  const handleSave = () => {
    if (!brand) return alert("請選擇廠牌");
    if (!serialNo.trim()) return alert("請輸入機號");
    if (!type) return alert("請選擇類型");
    onSave({ id:initial?.id||uid(), brand, model:finalModel, serialNo:serialNo.trim(), iceType, capacity, voltage, coolant, cooling, type, customer:customer.trim() });
  };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0 }}>
      <div style={SM.formHeader}>
        <button onClick={onBack} style={{ ...SM.iconBtn, color:"#aaa" }}><IBack /></button>
        <span style={SM.mTitle}>{initial ? "編輯機器" : "新增機器"}</span>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"20px 20px 0" }}>
        {/* 廠牌 */}
        <div style={SM.field}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
            <label style={SM.lbl}>廠牌</label>
            <button onClick={() => setShowBrand(true)} style={{ display:"flex", alignItems:"center", gap:4, background:"#1e1e1e", border:"1px solid #2e2e2e", borderRadius:6, padding:"3px 10px", color:"#888", fontSize:11, cursor:"pointer", fontWeight:600 }}>管理廠牌</button>
          </div>
          <select value={brand} onChange={e => { setBrand(e.target.value); setModelSel(""); setModelCustom(""); }} style={SM.sel}>
            <option value="">請選擇廠牌</option>
            {brands.map(b => <option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        {/* 機型 */}
        <div style={SM.field}>
          <label style={SM.lbl}>機型</label>
          <select value={modelSel} onChange={e => setModelSel(e.target.value)} style={{ ...SM.sel, marginBottom:6 }} disabled={!brand}>
            <option value="">請選擇機型</option>
            {brandModels.map(m => <option key={m} value={m}>{m}</option>)}
            <option value="__other__">其他（手動輸入）</option>
          </select>
          {modelSel==="__other__" && <input value={modelCustom} onChange={e => setModelCustom(e.target.value)} placeholder="輸入機型" style={SM.inp} />}
        </div>
        {/* 機號 */}
        <div style={SM.field}>
          <label style={SM.lbl}>機號 <span style={{ color:"#f87171" }}>*</span></label>
          <input value={serialNo} onChange={e => setSerialNo(e.target.value)} style={SM.inp} />
        </div>
        {/* Chip 單選 */}
        {CHIPS.map(f => (
          <SingleChipGroup key={f.key} label={f.label} options={machineOpts[f.key]||[]} selected={f.val} onChange={f.set} onEditOpts={() => setEditOpts({ key:f.key, label:f.label })} />
        ))}
        {/* 類型 */}
        <div style={SM.field}>
          <label style={SM.lbl}>類型 <span style={{ color:"#f87171" }}>*</span></label>
          <select value={type} onChange={e => setType(e.target.value)} style={SM.sel}>
            <option value="">請選擇</option>
            {MACHINE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        {/* 目前客戶 */}
        <div style={SM.field}>
          <label style={SM.lbl}>目前客戶</label>
          <input value={customer} onChange={e => setCustomer(e.target.value)} placeholder="遹填，輸入客戶名稱" style={SM.inp} />
        </div>
        <div style={{ height:20 }} />
      </div>
      <div style={SM.formFooter}>
        <button onClick={onBack} style={SM.cancelBtn}>取消</button>
        <button onClick={handleSave} style={SM.saveBtn}>儲存</button>
      </div>
      {editOpts && <EditOptsModal label={editOpts.label} options={machineOpts[editOpts.key]||[]} onSave={v => onUpdateMachineOpts(editOpts.key, v)} onClose={() => setEditOpts(null)} />}
      {showBrand && <BrandModal brands={brands} onSave={onSaveBrands} onClose={() => setShowBrand(false)} />}
    </div>
  );
};

// ── MachineCard ───────────────────────────────────────────────────────────────
const MachineCard = ({ item, onClick }) => {
  // 到期提醒
  const endDate = item['到期日期']||item.endDate||'';
  let expireBadge = null;
  if(endDate){
    const ed = new Date(endDate.replace(/\//g,'-'));
    const today = new Date(new Date().toDateString());
    const diff = Math.floor((ed-today)/86400000);
    if(diff<0){
      expireBadge = <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:'rgba(239,68,68,.15)',color:'#f87171',border:'1px solid rgba(239,68,68,.3)',whiteSpace:'nowrap'}}>已到期</span>;
    } else if(diff<=30){
      const expDay = ed.getMonth()+1 + '/' + ed.getDate();
      expireBadge = <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:'rgba(249,168,37,.12)',color:'#fcd34d',border:'1px solid rgba(249,168,37,.3)',whiteSpace:'nowrap'}}>⚠️ {expDay}到期</span>;
    } else if(diff<=180){
      const months = Math.ceil(diff/30);
      expireBadge = <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:'rgba(156,163,175,.1)',color:'#9ca3af',border:'1px solid rgba(156,163,175,.2)',whiteSpace:'nowrap'}}>{months}月後到期</span>;
    }
  }
  const isInRepair = (item['類型']||item.type||'')==='◎進廠';
  return(
    <div style={{ ...SM.card, cursor:"pointer", borderLeft:isInRepair?'3px solid #f59e0b':'3px solid transparent' }} onClick={onClick}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:15, fontWeight:800, color:isInRepair?'#f59e0b':'#fff', marginBottom:3 }}>{item.model || "—"}</div>
          <div style={{ fontSize:12, color:"#aaa" }}>{item.serialNo || ""}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5, flexShrink:0, marginLeft:12 }}>
          {expireBadge}
          <span style={{ fontSize:13, fontWeight:700, color:"#aaa" }}>{item.capacity || ""}</span>
          <span style={{ fontSize:11, color:"#666" }}>{item.brand || ""}</span>
        </div>
      </div>
      {isInRepair && <div style={{fontSize:11,color:'#f59e0b',marginTop:4,fontWeight:700}}>🔧 進廠維修中</div>}
      {item.customer && <div style={{ fontSize:11, color:"#555", marginTop:4 }}>👤 {item.customer}</div>}
    </div>
  );
};

// ── MachDetailSheet ───────────────────────────────────────────────────────────────
const MachDetailSheet = ({ item, onEdit, onDelete, onClose }) => {
  const clr = MTYPE_COLOR[item.type] || "#888";
  const DRow = ({ label, val }) => val ? (
    <div style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid #1a1a1a" }}>
      <span style={{ color:"#555", fontSize:12, width:60, flexShrink:0 }}>{label}</span>
      <span style={{ color:"#ccc", fontSize:13 }}>{val}</span>
    </div>
  ) : null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:300 }} onClick={onClose}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)" }} />
      <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"#111", borderRadius:"20px 20px 0 0", border:"1px solid #222", maxHeight:"85vh", display:"flex", flexDirection:"column", animation:"slideUp .25s ease" }} onClick={e => e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px" }}><div style={{ width:36, height:4, borderRadius:2, background:"#333" }} /></div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 20px 12px" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:18, fontWeight:800, color:"#fff" }}>{item.brand} {item.model}</span>
              {item.type && <span style={{ fontSize:12, fontWeight:700, padding:"3px 10px", borderRadius:20, background:clr+"22", border:`1px solid ${clr}44`, color:clr }}>{item.type}</span>}
            </div>
            {item.serialNo && <div style={{ fontSize:12, color:"#fff", marginTop:3 }}>機號：{item.serialNo}</div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            {onEdit && <button onClick={onEdit}   style={{ ...SM.iconBtn, color:"#666", background:"#1a1a1a", borderRadius:8, padding:8 }}><IEdit /></button>}
            {onDelete && <button onClick={onDelete} style={{ ...SM.iconBtn, color:"#dc2626", background:"#1a1a1a", borderRadius:8, padding:8 }}><ITrash /></button>}
          </div>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"0 20px 32px" }}>
          {(item.customer||item['目前客戶']) && <div style={{ marginBottom:14 }}><div style={{ fontSize:11, color:"#555", marginBottom:3 }}>目前客戶</div><div style={{ color:"#ccc", fontSize:14, fontWeight:600 }}>{item.customer||item['目前客戶']}</div></div>}
          <DRow label="冰型"  val={item.iceType}  />
          <DRow label="磅數"  val={item.capacity} />
          <DRow label="電壓"  val={item.voltage}  />
          <DRow label="冷媒"  val={item.coolant}  />
          <DRow label="散熱"  val={item.cooling}  />
        </div>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════════════════════════
// MachineApp — standalone default export
// ══════════════════════════════════════════════════════════════════════════════
function MachineApp() {
  const [machines, setMachines] = useState([]);
  const [machineOpts, setMachineOpts] = useState({ ...DEFAULT_MACHINE_OPTS });
  const [quoteData, setQuoteData] = useState({ brands: [], iceMachines: [] });
  const [ready, setReady] = useState(false);
  const [view, setView] = useState("list");   // "list" | "form"
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all"); // 機器類型 filter
  const [editItem, setEditItem] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [delTarget, setDelTarget] = useState(null);

  // Load machines + quote data
  useEffect(() => {
    (async () => {
      try {
        const r = await storeHelper.get(MACHINES_KEY);
        if (r?.value) {
          const d = JSON.parse(r.value);
          setMachines(d.machines || (Array.isArray(d) ? d : []));
          if (d.opts) setMachineOpts({ ...DEFAULT_MACHINE_OPTS, ...d.opts });
        }
      } catch {}
      try {
        const q = await storeHelper.get(QUOTE_KEY);
        if (q?.value) {
          const d = JSON.parse(q.value);
          setQuoteData({ brands: d.opts?.brands || [], iceMachines: d.iceMachines || [] });
        }
      } catch {}
      setReady(true);
    })();
  }, []);

  const persistMachines = useCallback(async (data, opts) => {
    setMachines(data);
    try { await storeHelper.set(MACHINES_KEY, JSON.stringify({ machines: data, opts: opts || machineOpts })); } catch {}
    try { scheduleSync(); } catch {}
  }, [machineOpts]);

  const updateMachineOpts = useCallback((key, vals) => {
    setMachineOpts(prev => {
      const next = { ...prev, [key]: vals };
      storeHelper.get(MACHINES_KEY).then(r => {
        const d = r?.value ? JSON.parse(r.value) : {};
        storeHelper.set(MACHINES_KEY, JSON.stringify({ machines: d.machines || [], opts: next }));
      }).catch(() => {});
      return next;
    });
  }, []);

  const saveBrands = async (brands) => {
    // Update quote DB brands
    try {
      const r = await storeHelper.get(QUOTE_KEY);
      const d = r?.value ? JSON.parse(r.value) : {};
      d.opts = d.opts || {}; d.opts.brands = brands;
      await storeHelper.set(QUOTE_KEY, JSON.stringify(d));
      setQuoteData(q => ({ ...q, brands }));
    } catch {}
  };

  const handleSave = (item) => {
    const nd = [...machines];
    const i = nd.findIndex(x => x.id === item.id);
    if (i >= 0) nd[i] = item; else nd.push(item);
    persistMachines(nd); setView("list"); setEditItem(null);
    try { 
      const sn = item['機號']||item.serialNo||item.serial||'';
      if (sn) markDirty('機器清單', sn, 'upsert'); 
    } catch{}
  };

  const handleDelete = () => {
    const m = machines.find(x => x.id === delTarget.id);
    const nd = machines.filter(x => x.id !== delTarget.id);
    persistMachines(nd); setDelTarget(null); setDetailItem(null);
    // 標記刪除（試算表用機號當主鍵）
    if (m?.serialNo) try { markDirty('機器清單', m.serialNo, 'delete'); } catch{}
  };

  // Filter + group by type
  const lq = search.toLowerCase();
  const filtered = machines.filter(m =>
    !search || m.brand?.toLowerCase().includes(lq) || m.model?.toLowerCase().includes(lq) ||
    m.serialNo?.toLowerCase().includes(lq) || m.customer?.toLowerCase().includes(lq) || m.type?.toLowerCase().includes(lq)
  );
  const groups = {};
  [...MACHINE_TYPES, ""].forEach(t => groups[t] = []);
  filtered.forEach(m => { const k = MACHINE_TYPES.includes(m.type) ? m.type : ""; groups[k].push(m); });

  // 30天內到期提醒
  const expiringMachines = filtered.filter(m => {
    const ed = m['到期日期']||m.endDate||'';
    if(!ed) return false;
    const d = new Date(ed.replace(/\//g,'-'));
    const today = new Date(new Date().toDateString());
    const in30 = new Date(today); in30.setDate(in30.getDate()+30);
    return d >= today && d <= in30;
  });

  if (!ready) return <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center", justifyContent:"center", color:"#555", fontSize:14, background:"#0f0f0f" }}>載入中…</div>;

  return (
    <div style={SM.app}>
      {/* Header（套用簽單頁版型） */}
      {view === "list" && (
        <div style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'10px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontWeight:800,fontSize:15,color:'#ccc',flex:1}}>機器清單</span>
            <button onClick={() => { setEditItem(null); setView("form"); }} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 14px',background:'linear-gradient(135deg,#dc2626,#991b1b)',border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              <IPlus s={14}/>新增機器
            </button>
          </div>
          {/* Search */}
          <div style={{position:'relative',marginBottom:8}}>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#444',display:'flex',pointerEvents:'none'}}><ISearch/></span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋廠牌、機型、機號、客戶…"
              style={{width:'100%',padding:'8px 12px 8px 32px',background:'#1a1a1a',border:'1px solid #222',borderRadius:9,color:'#ccc',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
            {search && <button onClick={() => setSearch("")} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#555',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>}
          </div>
          {/* Filter chips by 機器類型 */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {(()=>{
              const counts = {};
              MACHINE_TYPES.forEach(t => counts[t] = filtered.filter(m => m.type===t).length);
              const ALL = filtered.length;
              return [['all','全部',ALL], ...MACHINE_TYPES.map(t=>[t, t, counts[t]])].map(([v,l,cnt])=>(
                <button key={v} onClick={()=>setTypeFilter(v)}
                  style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,border:'1px solid',cursor:'pointer',fontFamily:'inherit',
                    borderColor:typeFilter===v?'#dc2626':'#2a2a2a',
                    background:typeFilter===v?'rgba(220,38,38,.12)':'transparent',
                    color:typeFilter===v?'#ef4444':'#555'}}>
                  {l} {cnt>0&&<span style={{fontSize:10}}>{cnt}</span>}
                </button>
              ));
            })()}
          </div>
        </div>
      )}

      {/* Content */}
      <div style={{ flex:1, overflowY:"auto", padding:"20px" }}>
        {view === "list" && (
          <div style={{ maxWidth:700, margin:"0 auto" }}>
            <div style={{ color:"#444", fontSize:12, marginBottom:12 }}>共 {filtered.length} 台{search && ` (搜尋「${search}」)`}</div>
            {expiringMachines.length > 0 && (
              <div style={{marginBottom:14,padding:'10px 14px',background:'rgba(249,168,37,.08)',border:'1px solid rgba(249,168,37,.25)',borderRadius:8}}>
                <div style={{fontSize:11,fontWeight:800,color:'#fcd34d',marginBottom:6}}>⚠️ 即將到期 ({expiringMachines.length} 台)</div>
                {expiringMachines.map(m=>{
                  const ed=new Date((m['到期日期']||m.endDate||'').replace(/\//g,'-'));
                  const diff=Math.floor((ed-new Date(new Date().toDateString()))/86400000);
                  return(
                    <div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderTop:'1px solid rgba(249,168,37,.1)'}}>
                      <span style={{fontSize:12,color:'#ccc'}}>{m.brand} {m.model} <span style={{color:'#666',fontSize:11}}>{m.serialNo}</span></span>
                      <span style={{fontSize:11,color:'#fcd34d',fontWeight:700}}>
                        {diff<=30?`⚠️ ${ed.getMonth()+1}/${ed.getDate()}到期`:`${Math.ceil(diff/30)}月後到期`}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
            {machines.length === 0 ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:300, color:"#333" }}>
                <div style={{ fontSize:44, marginBottom:16 }}>🧊</div><div style={{ marginBottom:20, fontSize:14 }}>尚無機器資料</div>
                <button onClick={() => setView("form")} style={SM.primBtn}><IPlus s={14} /><span>新增第一筆</span></button>
              </div>
            ) : filtered.length === 0 ? (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:200, color:"#333", fontSize:14 }}>找不到符合「{search}」的結果</div>
            ) : (
              [...MACHINE_TYPES, ""].filter(t => groups[t].length > 0 && (typeFilter==='all' || typeFilter===t)).map(type => {
                const clr = MTYPE_COLOR[type] || "#555";
                return (
                  <div key={type} style={{ marginBottom:20 }}>
                    {/* Group header */}
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingBottom:6, borderBottom:"1px solid #222" }}>
                      {type
                        ? <span style={{ fontSize:12, fontWeight:800, padding:"2px 10px", borderRadius:20, background:clr+"22", border:`1px solid ${clr}44`, color:clr }}>{type}</span>
                        : <span style={{ fontSize:12, fontWeight:800, color:"#555" }}>未分類</span>}
                      <span style={{ fontSize:11, color:"#333" }}>{groups[type].length} 台</span>
                    </div>
                    {groups[type].map(m => <MachineCard key={m.id} item={m} onClick={() => setDetailItem(m)} />)}
                  </div>
                );
              })
            )}
          </div>
        )}
        {view === "form" && (
          <div style={{ maxWidth:560, margin:"0 auto", display:"flex", flexDirection:"column", minHeight:0 }}>
            <MachineForm
              initial={editItem}
              quoteData={quoteData}
              machineOpts={machineOpts}
              onUpdateMachineOpts={updateMachineOpts}
              onSaveBrands={saveBrands}
              onSave={handleSave}
              onBack={() => { setView("list"); setEditItem(null); }}
            />
          </div>
        )}
      </div>

      {/* Detail sheet */}
      {detailItem && (
        <MachDetailSheet
          item={detailItem}
          onEdit={() => { setEditItem(detailItem); setDetailItem(null); setView("form"); }}
          onDelete={() => setDelTarget(detailItem)}
          onClose={() => setDetailItem(null)}
        />
      )}

      {/* Delete confirm */}
      {delTarget && (
        <div style={SM.overlay} onClick={() => setDelTarget(null)}>
          <div style={{ ...SM.modal, maxWidth:360 }} onClick={e => e.stopPropagation()}>
            <div style={SM.mHead}><span style={SM.mTitle}>確認刪除</span><button onClick={() => setDelTarget(null)} style={SM.iconBtn}><IClose /></button></div>
            <div style={SM.mBody}>
              <div style={{ color:"#aaa", fontSize:14, marginBottom:20 }}>確定要刪除 <strong style={{ color:"#f87171" }}>{delTarget.brand} {delTarget.model}</strong>？</div>
              <div style={{ display:"flex", gap:8 }}><button onClick={() => setDelTarget(null)} style={SM.cancelBtn}>取消</button><button onClick={handleDelete} style={{ ...SM.saveBtn, background:"#7f1d1d" }}>確認刪除</button></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  app:       { height:"100vh", background:"#0f0f0f", fontFamily:"'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif", display:"flex", flexDirection:"column", overflow:"hidden" },
  hdr:       { background:"#111", borderBottom:"1px solid #222", flexShrink:0 },
  hdrIn:     { maxWidth:1400, margin:"0 auto", padding:"0 16px", height:54, display:"flex", alignItems:"center", gap:12 },
  logo:      { width:7, height:7, borderRadius:"50%", background:"linear-gradient(135deg,#dc2626,#991b1b)", boxShadow:"0 0 10px #dc262660" },
  logoTxt:   { fontSize:14, fontWeight:800, color:"#888", letterSpacing:"0.04em" },
  searchWrap: { position:"relative" },
  searchIco:  { position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#444", pointerEvents:"none", display:"flex" },
  searchInp:  { width:"100%", padding:"7px 32px 7px 32px", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:8, color:"#aaa", fontSize:13, outline:"none", boxSizing:"border-box" },
  card:      { background:"#181818", borderRadius:10, padding:"12px 16px", marginBottom:8, border:"1px solid #222" },

const genSerial = (prefix, list) => {
  const d=new Date(), ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

};

// ── 一次性資料遷移：把既有資料的「轉帳」字眼換成「匯款」 ────────────
function migrateTransferToRemittance(){
  try {
    const flag = localStorage.getItem('tk_migrate_remittance_v1');
    if (flag === 'done') return;
    const keys = ['tk_work','tk_pay','tk_con','tk_maint'];
    let changed = 0;
    keys.forEach(k => {
      try {
        const raw = localStorage.getItem(k);
        if (!raw) return;
        const list = JSON.parse(raw);
        if (!Array.isArray(list)) return;
        let dirty = false;
        list.forEach(rec => {
          if (rec && typeof rec === 'object') {
            ['收款方式','付款方式'].forEach(field => {
              if (rec[field] === '轉帳') { rec[field] = '匯款'; dirty = true; }
            });
          }
        });
        if (dirty) { localStorage.setItem(k, JSON.stringify(list)); changed++; }
      } catch{}
    });
    // 合約資料
    try {
      const raw = localStorage.getItem('tk_contracts');
      if (raw) {
        const list = JSON.parse(raw);
        if (Array.isArray(list)) {
          let dirty = false;
          list.forEach(c => {
            if (c && c.payMethod === '轉帳') { c.payMethod = '匯款'; dirty = true; }
            if (c && c['付款方式'] === '轉帳') { c['付款方式'] = '匯款'; dirty = true; }
          });
          if (dirty) { localStorage.setItem('tk_contracts', JSON.stringify(list)); changed++; }
        }
      }
    } catch{}
    localStorage.setItem('tk_migrate_remittance_v1', 'done');
    if (changed > 0) {
      try { scheduleSync(); } catch{}
      console.log('[migration] 已將「轉帳」更名為「匯款」，共改動', changed, '張表');
    }
  } catch(e) { console.warn('[migration] failed:', e); }
}

// 把單筆 row 拆解為 PDF 表格的可顯示列（一個 row 可能展開成多列，例如維修 row 含多個項目）
function flattenRowForPdf(r){
  if(!r) return [];
  const taxed = (amt, tax) => Math.round(Number(amt||0) * (tax?1.05:1));
  if(r._k === 'rental'){
    const out = [];
    if(r.hasRent && Number(r.rentAmt)>0){
      out.push({type:'租賃', content:`租金 ${r.rentFrom||''} ~ ${r.rentTo||''}`+(r.contractId?` (合約 ${r.contractId})`:''), qty:'', amount: taxed(r.rentAmt, r.rentTax)});
    }
    if(r.hasDeposit && Number(r.depositAmt)>0){
      out.push({type:'租賃', content:'押金', qty:'', amount: Number(r.depositAmt)});
    }
    return out;
  }
  if(r._k === 'con'){
    if(r.serviceType === '換機'){
      return [{type:'換機', content:`裝 ${r.newModel||''} ${r.newSerial||''} ／ 回 ${r.oldModel||''} ${r.oldSerial||''}`, qty:'', amount: taxed(r.amount, r.tax)}];
    }
    return [{type:r.serviceType||'施工', content:`${r.dir||'裝'} ${r.model||''} ${r.serial||''}`.trim(), qty:'', amount: taxed(r.amount, r.tax)}];
  }
  if(r._k === 'repair'){
    const head = [r.model, r.serial].filter(Boolean).join(' ');
    return (r.items||[]).map(it => ({type:'維修', content: head ? `${head}｜${it.name||''}` : (it.name||''), qty:'', amount: taxed(it.amount, it.tax)}));
  }
  if(r._k === 'misc'){
    return [{type:r.miscType||'外務', content:r.name||'', qty:r.qty||'', amount: taxed(r.amount, r.tax)}];
  }
  if(r._k === 'material'){
    return [{type:'材料', content:r.name||'', qty:r.qty||'', amount: taxed(r.amount, r.tax)}];
  }
  if(r._k === 'other'){
    return [{type:'其他', content:r.desc||'', qty:'', amount: taxed(r.amount, r.tax)}];
  }
  if(r._k === 'billing'){
    const sub = `引用 ${r.refSerial||''}${r.refDate?` · ${r.refDate}`:''}${r.refSummary?`<br/><span style="font-size:10px;color:#666">${r.refSummary}</span>`:''}`;
    return [{type:'請款', content: sub, qty:'', amount: Number(r.amount||0)}];
  }
  return [];
}

// 簽單完成後的連動：依工作明細更新機器類型/客戶 與 合約狀態
async function syncStateFromSignRows({customer, completionDate, rows, onSubmit}) {
  console.log('[sync] 啟動連動更新', {customer, completionDate, rowCount: rows?.length});
  if(!Array.isArray(rows) || rows.length===0) { console.log('[sync] rows 為空，跳過'); return; }
  // 公司名稱（機器回廠時的「目前客戶」）
  const companyName = (typeof getCompany==='function' ? (getCompany().name||'') : '') || '本公司';
  // 載入機器清單
  let allMachines = [];
  try {
    const raw = localStorage.getItem('machines_v1');
    const parsed = raw ? JSON.parse(raw) : null;
    allMachines = Array.isArray(parsed) ? parsed : (parsed?.machines || []);
  } catch{}
  console.log('[sync] 載入機器清單', allMachines.length, '台');
  const norm = v => String(v||'').trim().toLowerCase();
  const findMachine = (model, serial) => {
    const nm = norm(model);
    const ns = norm(serial);
    if(!nm && !ns) return null;
    const m = allMachines.find(m => {
      const mModel  = norm(m['型號']||m.model);
      const mSerial = norm(m['機號']||m.serialNo);
      return (!nm || mModel===nm) && (!ns || mSerial===ns);
    });
    console.log('[sync] findMachine', {model, serial, found: !!m, machineId: m?.id});
    return m;
  };
  // 載入合約清單
  let allContracts = [];
  try { allContracts = JSON.parse(localStorage.getItem('tk_contracts')||'[]'); } catch{}
  // 判斷裝機後機器類型：看同張單有沒有租賃/簽約 row 對應合約類型
  const determineRentalType = () => {
    const rentalRow = rows.find(x => x._k==='rental' && x.contractId);
    const billingRow = rows.find(x => x._k==='misc' && x.miscType==='簽約' && x.contractId);
    const cid = rentalRow?.contractId || billingRow?.contractId;
    if(cid){
      const c = allContracts.find(x => x['合約號']===cid);
      if(c?.contractType === 'rentSend') return '租送機';
    }
    return '出租中';
  };

  // 處理 con rows（施工 / 換機 / 拆回 / 移機 / 借用機 / 搬回修理 / 修好送回）
  const conRows = rows.filter(x => x._k==='con');
  console.log('[sync] 處理施工 rows', conRows.length, '筆');
  for(const r of conRows) {
    const st = r.serviceType||'';
    console.log('[sync] row', {serviceType: st, model: r.model, serial: r.serial, dir: r.dir});
    if(st === '裝機' || st === '代裝') {
      const m = findMachine(r.model, r.serial);
      if(m) {
        const newType = determineRentalType();
        console.log('[sync] 裝機 → 更新機器', {型號: m['型號']||m.model, 機號: m['機號']||m.serialNo, 新類型: newType, 新客戶: customer});
        await onSubmit('machineUpdate', {...m, '類型': newType, '目前客戶': customer});
      } else {
        console.warn('[sync] 裝機 → 找不到機器', {model: r.model, serial: r.serial});
      }
    } else if(st === '拆回') {
      const m = findMachine(r.model, r.serial);
      if(m) await onSubmit('machineUpdate', {...m, '類型': '◎進場', '目前客戶': companyName});
    } else if(st === '移機') {
      const m = findMachine(r.model, r.serial);
      if(m) await onSubmit('machineUpdate', {...m, '目前客戶': customer});
    } else if(st === '換機') {
      const newM = findMachine(r.newModel, r.newSerial);
      const oldM = findMachine(r.oldModel, r.oldSerial);
      if(newM) await onSubmit('machineUpdate', {...newM, '類型': '出租中', '目前客戶': customer});
      if(oldM) await onSubmit('machineUpdate', {...oldM, '類型': '◎進場', '目前客戶': companyName});
    } else if(st === '借用機') {
      // 借用機：dir='裝' → 借給客戶；dir='回' → 還回公司
      const m = findMachine(r.model, r.serial);
      if(m) {
        if(r.dir === '回') {
          await onSubmit('machineUpdate', {...m, '類型': '待出租', '目前客戶': companyName});
        } else {
          await onSubmit('machineUpdate', {...m, '類型': '借用機', '目前客戶': customer});
        }
      }
    } else if(st === '搬回修理') {
      const m = findMachine(r.model, r.serial);
      if(m) await onSubmit('machineUpdate', {...m, '類型': '◎進場'});
    } else if(st === '修好送回') {
      const m = findMachine(r.model, r.serial);
      if(m) {
        const orig = m['類型']||m.type||'';
        const newType = (orig==='◎進場' || orig==='') ? '客人機' : orig;
        await onSubmit('machineUpdate', {...m, '類型': newType, '目前客戶': customer});
      }
    }
  }

  // 處理 misc 簽約 rows：把對應合約從「待簽」→「出租中」/「租送機」，並啟動計費日
  const signingRows = rows.filter(x => x._k==='misc' && x.miscType==='簽約' && x.contractId);
  if(signingRows.length > 0) {
    let changed = false;
    let cs = allContracts.slice();
    for(const r of signingRows) {
      const idx = cs.findIndex(c => c['合約號']===r.contractId);
      if(idx>=0 && (cs[idx]['狀態']||'待簽')==='待簽') {
        const isRS = cs[idx].contractType === 'rentSend';
        cs[idx] = {
          ...cs[idx],
          '狀態': isRS ? '租送機' : '出租中',
          installCompletionDate: completionDate || todayStr(),
        };
        changed = true;
        try { markDirty('合約', r.contractId, 'upsert'); } catch{}
        // 同步機器
        const serialNo = cs[idx].serialNo;
        if(serialNo) {
          const m = allMachines.find(x => (x['機號']||x.serialNo||'')===serialNo);
          if(m) await onSubmit('machineUpdate', {...m, '類型': isRS ? '租送機' : '出租中', '目前客戶': cs[idx].storeName||customer});
        }
      }
    }
    if(changed) localStorage.setItem('tk_contracts', JSON.stringify(cs));
  }
}

const AutoDocInput = ({value,onChange,onSelect,suggestions=[],ph,dStyle,inputClass}) => {
  const [open,setOpen] = useState(false);
  const [pos,setPos] = useState({top:0,left:0,width:200});
  const inputRef = useRef(null);
  const filtered = String(value||'').trim()
    ? suggestions.filter(s=>s&&s.toLowerCase().includes(String(value).toLowerCase())&&s!==value).slice(0,8)
    : [];
  const base = {width:'100%',background:'transparent',border:'none',borderBottom:'1px solid #d1d5db',padding:'5px 2px',fontSize:13,color:'#111',outline:'none',fontFamily:'inherit'};
  const updatePos = () => {
    if(!inputRef.current) return;
    const r = inputRef.current.getBoundingClientRect();
    const vh = window.innerHeight;
    const popHeight = Math.min(280, filtered.length*36 + 12);
    const goUp = (vh - r.bottom) < popHeight && r.top > popHeight;
    setPos({ top: goUp ? (r.top - popHeight - 2) : (r.bottom + 2), left: r.left, width: r.width });
  };

    if(!open || filtered.length===0) return;
    updatePos();
    const handler = () => updatePos();
    window.addEventListener('scroll', handler, true);
    window.addEventListener('resize', handler);
    return () => {
      window.removeEventListener('scroll', handler, true);
      window.removeEventListener('resize', handler);
    };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [open, filtered.length]);

  return (
    <div style={{position:'relative'}}>
      <input ref={inputRef} value={value||''} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>{updatePos();setOpen(true);}}

  );
};

const DocSigCanvas = ({onSave,borderColor='#d1d5db'}) => {
  const ref=useRef(null); const [has,setHas]=useState(false); const last=useRef(null);
  const pos=(e,c)=>{const r=c.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(c.width/r.width),y:(s.clientY-r.top)*(c.height/r.height)};};
  const start=e=>{e.preventDefault();const c=ref.current;const ctx=c.getContext('2d');ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();last.current=pos(e,c);setHas(true);};
  const move=e=>{if(!last.current)return;e.preventDefault();const c=ref.current;const ctx=c.getContext('2d');const p=pos(e,c);ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();last.current=p;};
  const end=e=>{e.preventDefault();last.current=null;if(onSave&&has)onSave(ref.current.toDataURL());};
  const clear=()=>{ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height);setHas(false);if(onSave)onSave(null);};
  return (
    <div style={{position:'relative'}}>
      <canvas ref={ref} width={480} height={88}
        style={{display:'block',width:'100%',cursor:'crosshair',touchAction:'none',background:'#fafafa',border:`1.5px solid ${borderColor}`,borderRadius:6}}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      {has&&<button onClick={clear} style={{position:'absolute',top:4,right:4,background:'rgba(255,255,255,.9)',border:'1px solid #e5e7eb',borderRadius:4,padding:'2px 7px',fontSize:10,color:'#9ca3af',cursor:'pointer'}}>清除</button>}
      {!has&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',color:'#d1d5db',fontSize:11}}>請在此簽名</div>}
    </div>
  );
};

    return amt ? `${base} ${amt}` : base;
  }
  if(r._k === 'repair'){
    const items = (r.items||[]).map(it=>{
      const amt = fmtMoney(it.amount);
      return amt ? `${it.name||''} ${amt}`.trim() : (it.name||'');
    }).filter(Boolean);
    const head = [r.model, r.serial].filter(Boolean).join(' ');
    if(items.length) return `${head?head+' ':''}維修：${items.join('、')}`;
    return head ? `維修 ${head}` : '維修';
  }
  if(r._k === 'rental'){
    const parts = [];
    if(r.hasRent && r.rentAmt) parts.push(`租金 ${Number(r.rentAmt).toLocaleString()}`);
    if(r.hasDeposit && r.depositAmt) parts.push(`押金 ${Number(r.depositAmt).toLocaleString()}`);
    return parts.length ? parts.join(' / ') : '租賃';
  }
  if(r._k === 'misc'){
    const t = r.miscType||'';
    const name = r.name ? `${t} ${r.name}`.trim() : t;
    const amt = fmtMoney(r.amount);
    return [name+qtySuffix(r.qty), amt].filter(Boolean).join(' ');
  }
  if(r._k === 'material'){
    const name = r.name || '材料';
    const amt = fmtMoney(r.amount);
    return [name+qtySuffix(r.qty), amt].filter(Boolean).join(' ');
  }
  if(r._k === 'other'){
    const amt = fmtMoney(r.amount);
    return [r.desc||'其他', amt].filter(Boolean).join(' ');
  }
  if(r._k === 'billing')  return r.refSerial ? `引用 ${r.refSerial}` : '請款';
  return '';
};

const briefRowSummary = (r) => {

    if(r.serviceType === '換機') return `換機 ${r.newModel||''}`.trim();
    return [r.serviceType||'施工', r.model].filter(Boolean).join(' ');

  if(r._k === 'repair') return [`維修`, r.model].filter(Boolean).join(' ');

    if(r.miscType === '簽約') return `簽約 ${r.contractId||''}`.trim();

  }

    if(r.hasRent) parts.push('租金');
    if(r.hasDeposit) parts.push('押金');

  }
  if(r._k === 'billing') return `請款 ${r.refSerial||''}`.trim();
  if(r._k === 'other')   return r.desc || '其他';

};

// ── BillingRowPicker：在簽單裡點 + 請款 時跳出，列出該客戶 + 同公司其他店家的未付簽單 ──
function BillingRowPicker({customer, crmData, workOrders, currentRows, currentSerial, onConfirm, onClose}){
  // 找客戶所屬公司，再找該公司底下所有店家
  const eligibleNames = useMemo(()=>{
    const names = new Set([customer]);
    if(!customer || !crmData) return names;
    const store = (crmData?.stores||[]).find(s => (s.name||s['店家名稱'])===customer);
    if(store && store.companyId){
      (crmData?.stores||[]).filter(s => s.companyId===store.companyId).forEach(s => {
        const n = s.name||s['店家名稱']; if(n) names.add(n);
      });
    }
    // 如果輸入的是公司名稱本身
    const company = (crmData?.companies||[]).find(c => (c.title||c['公司名稱'])===customer);
    if(company){
      (crmData?.stores||[]).filter(s => s.companyId===company.id).forEach(s => {
        const n = s.name||s['店家名稱']; if(n) names.add(n);
      });
    }
    return names;
  }, [customer, crmData]);

  // 收集所有「已被別張簽單引用過」的單號（不能重複請款）
  const alreadyReferenced = useMemo(()=>{
    const set = new Set();
    (workOrders||[]).forEach(w => {
      if(w['單號']===currentSerial) return; // 跳過自己
      const rows = parseArr(w['工作明細'])||[];
      rows.forEach(r => { if(r._k==='billing' && r.refSerial) set.add(r.refSerial); });
    });
    // 也排除目前表單裡已經選過的
    (currentRows||[]).forEach(r => { if(r._k==='billing' && r.refSerial) set.add(r.refSerial); });
    return set;
  }, [workOrders, currentRows, currentSerial]);

  // 候選清單：同客戶+同公司、已完成、未付、且本身不是請款型簽單在嵌套（避免循環）
  const candidates = useMemo(()=>{
    return (workOrders||[]).filter(w => {
      if(w['狀態']!=='完成') return false;
      if(w['付款狀態']!=='未付') return false;
      if(w['單號']===currentSerial) return false;
      if(alreadyReferenced.has(w['單號'])) return false;
      if(!eligibleNames.has(w['客戶名稱'])) return false;
      // 排除自己也是請款型的（避免請款引用請款導致複雜連動）
      const rs = parseArr(w['工作明細'])||[];
      const isPureBilling = rs.length>0 && rs.every(r => r._k==='billing');
      if(isPureBilling) return false;
      return true;
    }).sort((a,b)=>(b['完成日期']||b['紀錄日期']||'').localeCompare(a['完成日期']||a['紀錄日期']||''));
  }, [workOrders, eligibleNames, alreadyReferenced, currentSerial]);

  const [selectedIds, setSelectedIds] = useState(new Set());
  const toggle = id => setSelectedIds(prev => { const n = new Set(prev); if(n.has(id)) n.delete(id); else n.add(id); return n; });
  const toggleAll = () => {
    if(selectedIds.size === candidates.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(candidates.map(w=>w['單號'])));
  };
  const selected = candidates.filter(w => selectedIds.has(w['單號']));
  const sum = selected.reduce((s,w)=>s+Number(w['總金額']||0), 0);

  const typeLabels = {rental:'租賃',con:'施工',repair:'維修',misc:'外務',material:'材料',other:'其他',billing:'請款'};

  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1a1a',border:'1px solid #333',borderRadius:'14px 14px 0 0',padding:'18px 18px 20px',width:'100%',maxWidth:560,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexShrink:0}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#eee'}}>＋ 加入請款明細</div>
            <div style={{fontSize:11,color:'#666',marginTop:2}}>勾選要請款的未付簽單（含同公司其他店家）</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        <div style={{flex:1,overflowY:'auto',marginBottom:14,border:'1px solid #2a2a2a',borderRadius:8,background:'#0f0f0f'}}>
          {candidates.length===0 ? (
            <div style={{padding:'30px 20px',textAlign:'center',color:'#444',fontSize:13}}>
              {customer ? `「${customer}」目前沒有可請款的未付簽單` : '請先填入客戶名稱'}
            </div>
          ) : (
            <>
              <div onClick={toggleAll} style={{padding:'10px 14px',borderBottom:'1px solid #1a1a1a',background:'#0a0a0a',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${selectedIds.size===candidates.length?'#16a34a':'#444'}`,background:selectedIds.size===candidates.length?'#16a34a':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {selectedIds.size===candidates.length&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
                <span style={{fontSize:11,color:'#888',fontWeight:700}}>全選（{candidates.length} 張）</span>
              </div>
              {candidates.map(w => {
                const sel = selectedIds.has(w['單號']);
                const detail = summarizeWorkRows(w['工作明細']) || (w['備註']||'');
                const diffCust = w['客戶名稱'] && w['客戶名稱']!==customer;
                return (
                  <div key={w['單號']} onClick={()=>toggle(w['單號'])}
                    style={{padding:'10px 14px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',gap:10,cursor:'pointer',background:sel?'rgba(22,163,74,.08)':'transparent'}}>
                    <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${sel?'#16a34a':'#444'}`,background:sel?'#16a34a':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {sel&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontSize:11,color:sel?'#16a34a':'#aaa',fontWeight:700}}>{w['單號']}</span>
                        <span style={{fontSize:10,color:'#666'}}>{w['完成日期']||w['紀錄日期']}</span>
                        {diffCust && <span style={{fontSize:9,padding:'1px 6px',borderRadius:3,background:'rgba(96,165,250,.15)',color:'#60a5fa',border:'1px solid rgba(96,165,250,.3)'}}>{w['客戶名稱']}</span>}
                      </div>
                      {detail && <div style={{fontSize:11,color:'#aaa',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{detail}</div>}
                    </div>
                    <div style={{fontSize:13,color:sel?'#16a34a':'#aaa',fontWeight:800}}>NT$ {Number(w['總金額']||0).toLocaleString()}</div>
                  </div>
                );
              })}
            </>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,padding:'10px 12px',background:'#0a0a0a',borderRadius:8,border:'1px solid #2a2a2a'}}>
          <span style={{fontSize:11,color:'#888'}}>已選 {selected.length} 張，合計</span>
          <span style={{fontSize:16,fontWeight:900,color:'#16a34a'}}>NT$ {sum.toLocaleString()}</span>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={onClose} style={{flex:1,padding:'12px',background:'#222',border:'1px solid #333',borderRadius:8,color:'#888',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>取消</button>
          <button onClick={()=>onConfirm(selected)} disabled={selected.length===0}
            style={{flex:2,padding:'12px',background:selected.length===0?'#333':'linear-gradient(135deg,#16a34a,#15803d)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:selected.length===0?'not-allowed':'pointer',fontFamily:'inherit',opacity:selected.length===0?.5:1}}>
            ✓ 加入 {selected.length} 張
          </button>
        </div>
      </div>
    </div>
  );
}

function SignForm({onClose,onSubmit,crmData,machData,quoteDb,workOrders,editRecord,prefill}){
  const co = getCompany();
  const WORK_DOC_COLOR = co.signColor || DEFAULT_SIGN_COLOR;
  const isEdit   = !!editRecord;
  const [saving,setSaving]     = useState(false);
  const [staffSig,setStaffSig] = useState(null);
  const [custSig,setCustSig]   = useState(null);
  const [sigPadOpen,setSigPadOpen] = useState(false);
  const [quickStoreOpen,setQuickStoreOpen] = useState(false);
  const [quickMachineRowId, setQuickMachineRowId] = useState(null); // 哪一列要新增機器（用 row id 追蹤）
  const [formMode,setFormMode] = useState(() => {
    if(!editRecord) return 'draft';
    return (editRecord['狀態']==='待辦' || editRecord['狀態']==='草稿') ? 'draft' : 'complete';
  });
  const isDraft = formMode==='draft';

  const [customer,setCustomer]           = useState(editRecord?.['客戶名稱']||prefill?.customer||'');
  const [recordDate,setRecordDate]       = useState((editRecord?.['紀錄日期']||dateInput()).replace(/\//g,'-'));
  const [completionDate,setCompletionDate] = useState((editRecord?.['完成日期']||'').replace(/\//g,'-'));
  const [staff,setStaff]                 = useState(()=>{const a=parseArr(editRecord?.['執行人員']);return a.length?a:[''];});
  const [phones,setPhones]               = useState(()=>{const a=parseArr(editRecord?.['電話']);if(a.length)return a;if(prefill?.phones?.length)return prefill.phones;return [''];});
  const [addresses,setAddresses]         = useState(()=>{const a=parseArr(editRecord?.['地址']);if(a.length)return a;if(prefill?.addresses?.length)return prefill.addresses;return [''];});
  const [newAddress,setNewAddress]       = useState('');
  const [note,setNote]                   = useState(editRecord?.['備註']||'');
  const [hasPayment,setHasPayment]       = useState(isEdit?(!!editRecord?.['總金額']):false);
  const [payStatus,setPayStatus]         = useState(editRecord?.['付款狀態']||'未付');
  const [payMethod,setPayMethod]         = useState(editRecord?.['收款方式']||'現金');
  const [totalAmount,setTotalAmount]     = useState(editRecord?.['總金額']||'');
  const [totalManual,setTotalManual]     = useState(false); // 是否手動覆寫

  // 1. 預設空白
  const [rows,setRows] = useState(()=>{
    if(editRecord?.['工作明細']) return parseArr(editRecord['工作明細']);
    if(prefill?.rows?.length) return prefill.rows;
    return [];
  });

  // 偵測工作明細是否有任何金額
  const hasAnyAmount = React.useMemo(() => {
    return (rows||[]).some(r => {
      if (r._k === 'rental') return (r.hasRent && Number(r.rentAmt)>0) || (r.hasDeposit && Number(r.depositAmt)>0);
      if (r._k === 'repair') return (r.items||[]).some(it => Number(it.amount)>0);
      return Number(r.amount)>0;
    });
  }, [rows]);

  // 有任何金額時自動開啟收款區塊
  React.useEffect(() => {
    if (hasAnyAmount && !hasPayment) setHasPayment(true);
  }, [hasAnyAmount]);

  // 自動計算總金額（工作明細加總，含稅 +5%）
  React.useEffect(() => {
    if (!hasPayment || totalManual) return;
    let sum = 0;
    (rows || []).forEach(r => {
      if (r._k === 'rental') {
        if (r.hasRent && r.rentAmt) sum += Number(r.rentAmt) * (r.rentTax ? 1.05 : 1);
        if (r.hasDeposit && r.depositAmt) sum += Number(r.depositAmt);
      } else if (r._k === 'repair') {
        (r.items || []).forEach(it => { if (it.amount) sum += Number(it.amount) * (it.tax ? 1.05 : 1); });
      } else if (r.amount) {
        sum += Number(r.amount) * (r.tax ? 1.05 : 1);
      }
    });
    setTotalAmount(String(Math.round(sum)));
  }, [rows, hasPayment, totalManual]);


  const serial = useMemo(()=>editRecord?.['單號']||sfSerial(workOrders),[isEdit]);

  const custNames   = useMemo(()=>[...(crmData?.stores||[]).map(s=>s.name||s['店家名稱']).filter(Boolean),...(crmData?.companies||[]).map(c=>c.title||c['公司名稱']).filter(Boolean)],[crmData]);
  const modelSuggs  = useMemo(()=>[...new Set((machData?.machines||machData||[]).map(m=>m['型號']||m.model).filter(Boolean))],[machData]);
  const partSuggs   = useMemo(()=>(quoteDb?.parts||[]).map(p=>p.name).filter(Boolean),[quoteDb]);
  // 執行人員推薦（優先用公司設定的職員名單；若空才退回過往簽單）
  const staffSuggs = useMemo(() => {
    try {
      const co = getCompany();
      const fromStaff = (co.staff||[]).map(s => (s.name||'').trim()).filter(Boolean);
      if (fromStaff.length > 0) return [...new Set(fromStaff)];
    } catch{}
    const all = [];
    (workOrders||[]).forEach(w => parseArr(w['執行人員']).forEach(s => s && all.push(s)));
    return [...new Set(all)];
  }, [workOrders]);
  const repairSuggs = useMemo(()=>(quoteDb?.repairs||[]).map(r=>r.name).filter(Boolean),[quoteDb]);

  // 8. 移機時才顯示新地址
  const hasIkki = useMemo(()=>rows.some(r=>r._k==='con'&&r.serviceType==='移機'),[rows]);

  useEffect(()=>{
    if(!customer||isEdit)return;
    const s=(crmData?.stores||[]).find(x=>(x.name||x['店家名稱'])===customer);
    if(s){
      const ps=parseArr(s.phones||s['電話']);if(ps.length)setPhones(ps);
      const as=parseArr(s.address||s['地址']);if(as.length)setAddresses(as);
    }
  },[customer]);

  // 判斷某個 refCustomer 是否屬於目前客戶（含同公司其他店家）
  const isCustomerCompatible = (refCustomer) => {
    if(!customer || !refCustomer) return true;
    if(refCustomer === customer) return true;
    if(!crmData) return false;
    const myStore   = (crmData?.stores||[]).find(s => (s.name||s['店家名稱'])===customer);
    const myCompany = (crmData?.companies||[]).find(c => (c.title||c['公司名稱'])===customer);
    const myCid = myStore?.companyId || myCompany?.id;
    if(!myCid) return false;
    const refStore   = (crmData?.stores||[]).find(s => (s.name||s['店家名稱'])===refCustomer);
    const refCompany = (crmData?.companies||[]).find(c => (c.title||c['公司名稱'])===refCustomer);
    const refCid = refStore?.companyId || refCompany?.id;
    return myCid && myCid === refCid;
  };

  // 客戶切換時：自動清除指向其他公司客戶的 billing rows，避免錯置
  useEffect(() => {
    if(!customer) return;
    const incompatible = rows.filter(r => r._k==='billing' && r.refCustomer && !isCustomerCompatible(r.refCustomer));
    if(incompatible.length === 0) return;
    setRows(prev => prev.filter(r => !(r._k==='billing' && r.refCustomer && !isCustomerCompatible(r.refCustomer))));
    showToast(`已清除 ${incompatible.length} 筆與目前客戶不符的請款明細`, 'info');
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [customer, crmData]);

  const addRow   = k=>{
    if(k==='billing'){
      if(!customer.trim()){ showToast('請先填入客戶名稱','error'); return; }
      setBillingPickerOpen(true); return;
    }
    const def=CHIP_DEFS.find(c=>c.k===k);if(def)setRows(p=>[...p,def.make()]);
  };
  const [billingPickerOpen, setBillingPickerOpen] = useState(false);
  const [refDetailSerial, setRefDetailSerial] = useState(null); // 點 billing 列上的單號預覽
  // 將挑選結果（陣列）轉成 billing rows 加入
  const addBillingRows = (picked) => {
    const newRows = picked.map(w => ({
      _k:'billing',
      id:sfUid(),
      refSerial: w['單號']||'',
      refDate: w['完成日期']||w['紀錄日期']||'',
      refSummary: summarizeWorkRows(w['工作明細']) || (w['備註']||''),
      refCustomer: w['客戶名稱']||'',
      amount: String(w['總金額']||0),
    }));
    setRows(p => [...p, ...newRows]);
    setBillingPickerOpen(false);
  };
  const delRow   = id=>setRows(p=>p.filter(r=>r.id!==id));
  const moveRow  = (id, dir)=>setRows(p=>{
    const i = p.findIndex(r=>r.id===id);
    if (i < 0) return p;
    const j = i + dir;
    if (j < 0 || j >= p.length) return p;
    const a = [...p];
    [a[i], a[j]] = [a[j], a[i]];
    return a;
  });
  const updRow   = (id,patch)=>setRows(p=>p.map(r=>r.id===id?{...r,...patch}:r));
  const updRI    = (rowId,itId,patch)=>setRows(p=>p.map(r=>r.id===rowId?{...r,items:r.items.map(it=>it.id===itId?{...it,...patch}:it)}:r));
  const addRI    = rowId=>setRows(p=>p.map(r=>r.id===rowId?{...r,items:[...r.items,{id:sfUid(),name:'',amount:'',tax:false}]}:r));
  const delRI    = (rowId,itId)=>setRows(p=>p.map(r=>r.id===rowId?{...r,items:r.items.filter(it=>it.id!==itId)}:r));

  const getDir=(st,allRows,id)=>{
    if(['裝機','修好送回','移機'].includes(st))return '裝';
    if(st==='拆回')return '退';  // 拆回 用「退/估」按鈕，預設「退」
    if(st==='搬回修理')return '回';
    if(st==='借用機'){const oth=allRows.filter(r=>r.id!==id&&r._k==='con');if(oth.some(r=>r.serviceType==='搬回修理'))return '裝';if(oth.some(r=>r.serviceType==='修好送回'))return '回';return '裝';}
    return '裝';
  };
  const changeServiceType=(id,t)=>{
    // 6. 換機：不拆兩行，單行雙欄
    setRows(prev=>prev.map(r=>r.id===id?{...r,serviceType:t,dir:t==='換機'?'裝':getDir(t,prev,id)}:r));
  };

  // 4. 材料/送貨帶入金額
  // 打字時直接更新 name
  // 客戶名稱選取：自動帶入電話/地址（從 CRM）
  const pickCustomerName = (v) => {
    setCustomer(v);
    if (!crmData) return;
    const s = (crmData?.stores||[]).find(x => (x.name||x['店家名稱']) === v);
    const co = (crmData?.companies||[]).find(c => (c.title||c['公司名稱']) === v);
    if (s) {
      const ps = parseArr(s.phones||s['電話']);
      const as = parseArr(s.address||s['地址']);
      if (ps.length) setPhones(ps.length>0?ps:['']);
      if (as.length) setAddresses(as.length>0?as:['']);
    } else if (co) {
      // 公司：合併底下店家的電話/地址
      const stores = (crmData?.stores||[]).filter(s2 => s2.companyId === co.id);
      const allPh = [...new Set(stores.flatMap(s2 => parseArr(s2.phones||s2['電話'])))];
      const allAd = [...new Set(stores.flatMap(s2 => parseArr(s2.address||s2['地址'])))];
      if (allPh.length) setPhones(allPh.length>0?allPh:['']);
      if (allAd.length) setAddresses(allAd.length>0?allAd:['']);
    }
  };

  const handleNameChange=(id,v)=>updRow(id,{name:v});
  // 從建議清單選取時，同時帶入金額（搜尋 parts 和 repairs）
  const handleSelect=(id,v)=>{
    const found=[...(quoteDb?.parts||[]),...(quoteDb?.repairs||[])].find(p=>p.name===v);
    if(found?.price)updRow(id,{name:v,amount:String(found.price)});
    else updRow(id,{name:v});
  };
  // 維修項目選取時帶金額
  const handleRepairSelect=(rowId,itemId,v)=>{
    const found=(quoteDb?.repairs||[]).find(r=>r.name===v);
    if(found?.price)updRI(rowId,itemId,{name:v,amount:String(found.price)});
    else updRI(rowId,itemId,{name:v});
  };

  const submit=async()=>{
    if(!customer.trim()){showToast('請填入客戶名稱','error');return;}
    if(!isDraft&&!completionDate){showToast('請填入完成日期','error');return;}
    if(!isDraft&&!isEdit&&!custSig){showToast('請取得客戶簽章','error');return;}
    setSaving(true);
    const finalAddr=hasIkki&&newAddress.trim()?[newAddress.trim(),...addresses.slice(1)]:addresses.filter(Boolean);
    try{
      const rec={
        '單號':serial,'狀態':isDraft?'待辦':'完成',
        '紀錄日期':fmtDate(recordDate),'完成日期':isDraft?'':fmtDate(completionDate),
        '客戶名稱':customer,'電話':phones.filter(Boolean),
        '地址':finalAddr,'執行人員':staff.filter(Boolean),
        '工作明細':rows,'備註':note,
        '付款狀態':hasPayment?payStatus:'未付',
        '收款方式':hasPayment?payMethod:'',
        '總金額':hasPayment?totalAmount:'',
        '收款日期':hasPayment&&payStatus==='付清'?todayStr():'',
      };
      await onSubmit(isEdit?'updateWorkOrder':'addWorkOrder',rec);
      
      // 簽單上的電話 / 地址若與 CRM 不同 → 覆蓋更新該客戶的 CRM 資料
      try {
        const cleanPhones = phones.filter(Boolean);
        const cleanAddrs  = finalAddr.filter(Boolean);
        if (customer && (cleanPhones.length || cleanAddrs.length)) {
          const crmRaw = await storeHelper.get('crm_v3');
          const all = crmRaw?.value ? JSON.parse(crmRaw.value) : {stores:[],companies:[],persons:[]};
          const sIdx = (all.stores||[]).findIndex(x => (x.name||x['店家名稱']) === customer);
          if (sIdx >= 0) {
            const s = all.stores[sIdx];
            const oldPhones = parseArr(s.phones||s['電話']);
            const oldAddrs  = parseArr(s.address||s['地址']);
            // 比對：陣列是否相同（忽略順序差異用 join 比對最簡單）
            const phoneChanged = cleanPhones.length>0 && cleanPhones.join('|') !== oldPhones.join('|');
            const addrChanged  = cleanAddrs.length>0  && cleanAddrs.join('|')  !== oldAddrs.join('|');
            if (phoneChanged || addrChanged) {
              all.stores[sIdx] = {
                ...s,
                ...(phoneChanged ? { phones: cleanPhones } : {}),
                ...(addrChanged  ? { address: cleanAddrs[0]||'' } : {}),
              };
              await storeHelper.set('crm_v3', JSON.stringify(all));
              try { markDirty('客戶資料', customer, 'upsert'); } catch{}
            }
          }
        }
      } catch(e) { console.warn('同步客戶資料失敗', e.message); }
      
      if(!isDraft){
        // 完成簽單 → 自動產生收款紀錄（不論已付清/未付）
        // 若是編輯既有完成單，先檢查是否已有同單號的收款紀錄
        const payRec = {
          '單號': serial,
          '客戶名稱': customer,
          '服務日期': fmtDate(completionDate),
          '應收金額': hasPayment ? String(totalAmount||'') : '0',
          '付款狀態': hasPayment ? payStatus : '未付',
          '收款方式': hasPayment && payStatus==='付清' ? payMethod : '',
          '收款日期': hasPayment && payStatus==='付清' ? todayStr() : '',
          '請款單號': '',
          '備註': '',
        };
        await onSubmit('upsertPayment', payRec);
        
        const conRows  = rows.filter(r=>r._k==='con');
        const repRows  = rows.filter(r=>r._k==='repair');
        const miscRows = rows.filter(r=>r._k==='misc');
        if(conRows.length>0){
          await onSubmit('addJournalConstruction',{id:sfUid(),constructionId:serial,logDate:fmtDate(recordDate),customer,
            workItems:conRows.map(r=>({id:sfUid(),workType:r.serviceType,model:r.serviceType==='換機'?r.newModel:r.model,serialNo:r.serviceType==='換機'?r.newSerial:r.serial,oldModel:r.serviceType==='換機'?r.oldModel:'',oldSerial:r.serviceType==='換機'?r.oldSerial:'',dir:r.dir})),
            note:'',schedTime:'',status:'已完成',doneDate:fmtDate(completionDate),handler:staff.filter(Boolean).join('、')});
        }
        if(repRows.length>0){
          await onSubmit('addJournalRepair',{id:sfUid(),repairId:serial,logDate:fmtDate(recordDate),customer,
            model:repRows[0]?.model||'',serialNo:repRows[0]?.serial||'',category:repRows[0]?.equipType||'',
            repairItems:repRows.flatMap(r=>(r.items||[]).map(it=>({id:sfUid(),text:it.name}))),
            handler:staff.filter(Boolean).join('、'),status:'已完成',doneDate:fmtDate(completionDate)});
        }
        if(miscRows.length>0){
          await onSubmit('addJournalMisc',{id:sfUid(),miscId:serial,logDate:fmtDate(recordDate),customer,
            workItems:miscRows.map(r=>({id:sfUid(),workType:r.miscType,desc:r.name,qty:r.qty})),
            note:'',schedTime:'',handler:staff.filter(Boolean).join('、'),status:'已完成',doneDate:fmtDate(completionDate)});
        }
        // 連動更新機器與合約（裝機/拆回/換機/移機/借用機/搬回/修好送回 + 簽約）
        try { await syncStateFromSignRows({customer, completionDate:fmtDate(completionDate), rows, onSubmit}); } catch(e){ console.warn('連動更新失敗', e); }
        // PDF：把 docType 留空讓 generatePDF 依 rows 自動判斷；rows 帶過去渲染
        const fd={serial,customer,recordDate,completionDate,phones:phones.filter(Boolean),addresses:finalAddr,staff:staff.filter(Boolean),rows,note,payMethod:hasPayment?payMethod:'',payStatus:hasPayment?payStatus:'',totalAmount:hasPayment?totalAmount:''};
        setTimeout(async()=>{try{await generatePDF(fd,staffSig,custSig);showToast('✓ PDF 已下載','success');}catch(e){showToast('PDF 失敗','error');}},300);
      }
      showToast(isDraft?'✓ 已儲存為待辦':isEdit?'✓ 已更新':'✓ 完成送出！','success');
      onClose();
    }catch(e){showToast(e.message,'error');}
    finally{setSaving(false);}
  };

// ── 完成流程引擎 (插入 SignForm 內，submit 之前) ──────────────────────────────

  // 流程狀態：浮窗堆疊
  const [flowModal,setFlowModal] = useState(null); // {type, props, onDone}

  // 儲存最終 rec 供流程完成後使用
  const pendingRec = useRef(null);

  // 最終完成：寫入 journal + PDF
  const finalizeComplete = async (rec) => {
    try {
      const conRows  = rows.filter(r=>r._k==='con');
      const repRows  = rows.filter(r=>r._k==='repair');
      const miscRows = rows.filter(r=>r._k==='misc');
      if(conRows.length>0){
        await onSubmit('addJournalConstruction',{id:sfUid(),constructionId:rec['單號'],logDate:rec['紀錄日期'],customer:rec['客戶名稱'],
          workItems:conRows.map(r=>({id:sfUid(),workType:r.serviceType,model:r.serviceType==='換機'?r.newModel:r.model,serialNo:r.serviceType==='換機'?r.newSerial:r.serial,oldModel:r.serviceType==='換機'?r.oldModel:'',oldSerial:r.serviceType==='換機'?r.oldSerial:'',dir:r.dir})),
          note:'',schedTime:'',status:'已完成',doneDate:rec['完成日期'],handler:(rec['執行人員']||[]).join('、')});
      }
      if(repRows.length>0){
        await onSubmit('addJournalRepair',{id:sfUid(),repairId:rec['單號'],logDate:rec['紀錄日期'],customer:rec['客戶名稱'],
          model:repRows[0]?.model||'',serialNo:repRows[0]?.serial||'',category:repRows[0]?.equipType||'',
          repairItems:repRows.flatMap(r=>(r.items||[]).map(it=>({id:sfUid(),text:it.name}))),
          handler:(rec['執行人員']||[]).join('、'),status:'已完成',doneDate:rec['完成日期']});
      }
      if(miscRows.length>0){
        await onSubmit('addJournalMisc',{id:sfUid(),miscId:rec['單號'],logDate:rec['紀錄日期'],customer:rec['客戶名稱'],
          workItems:miscRows.map(r=>({id:sfUid(),workType:r.miscType,desc:r.name,qty:r.qty})),
          note:'',schedTime:'',handler:(rec['執行人員']||[]).join('、'),status:'已完成',doneDate:rec['完成日期']});
      }
      const fd={serial:rec['單號'],customer:rec['客戶名稱'],recordDate:rec['紀錄日期'],completionDate:rec['完成日期'],phones:rec['電話']||[],addresses:rec['地址']||[],staff:rec['執行人員']||[],rows,note:rec['備註']||'',payMethod:rec['收款方式']||'',payStatus:rec['付款狀態']||'',totalAmount:rec['總金額']||''};
      setTimeout(async()=>{try{await generatePDF(fd,staffSig,custSig);showToast('✓ PDF 已下載','success');}catch(e){}},300);
    }catch(e){showToast('寫入失敗：'+e.message,'error');}
    showToast('✓ 完成送出！','success');
    setFlowModal(null);
    setSaving(false);
    onClose();
  };

  // 處理 con rows 流程：逐行處理
  const processConRow = async (conRows, idx, rec) => {
    if(idx >= conRows.length){
      // 全部完成
      await finalizeComplete(rec);
      return;
    }
    const row = conRows[idx];
    const next = ()=>processConRow(conRows, idx+1, rec);
    const st = row.serviceType;
    const model = row.model||'';
    const serial = row.serial||'';
    const cust = rec['客戶名稱'];
    const machineList = machData?.machines||machData||[];
    // 找機器清單中符合的機器
    const findMachine = (m,s)=>machineList.find(x=>(!m||(x['型號']||x.model||'')===m)&&(!s||(x['機號']||x.serial||'')===s));
    // 取客戶名下機器
    const custMachines = machineList.filter(x=>(x['目前客戶']||x.customer||'')=== cust && ['出租中','租送機','買斷','客人機','借用機'].includes(x['類型']||x.status||''));
    // 從報價單找機型報價
    const findPrice = (m)=>(quoteDb?.iceMachines||quoteDb?.parts||[]).find(p=>(p['型號']||p.model||'')===m);

    if(st==='裝機'||st==='代裝'){
      if(!model&&!serial){
        // 沒填機號 → 是否新增機器
        setFlowModal({type:'confirm',
          title:'裝機完成',
          msg:`未填入機型機號，是否要新增機器到機器清單？`,
          yes:'新增機器', no:'取消完成',
          onYes:()=>setFlowModal({type:'addMachine',
            prefill:{'目前客戶':cust,'類型':'出租中'},
            onDone:(newM)=>{
              onSubmit('machineAdd',newM);
              setFlowModal({type:'quickPayment',
                title:'新增收款',
                prefill:{customer:cust,items:['裝機費'],detail:`${newM['型號']||''} ${newM['機號']||''}`},
                onDone:()=>next()});
            }}),
          onNo:()=>{showToast('請填入機型機號後再完成','warn');setFlowModal(null);setSaving(false);}
        });
      } else {
        // 有填機號 → 選裝機類型
        const priceRow = findPrice(model);
        const rent = Number(priceRow?.['月租金']||priceRow?.['租金']||0);
        const rentSend = Number(priceRow?.['租送租金']||priceRow?.['租送 租金']||0);
        const deposit = rent*2;
        const depositSend = Number(priceRow?.['租送押金']||priceRow?.['租送 押金']||0);
        const buyout = Number(priceRow?.['買斷價']||priceRow?.['售價']||0);
        setFlowModal({type:'contractType',
          customer:cust, model, serial,
          rent, deposit, rentSend, depositSend, buyout,
          onSelect:(choice)=>{
            if(choice==='rent'||choice==='rentsend'){
              const contractType = choice==='rent'?'出租中':'租送機';
              const r = choice==='rent'?rent:rentSend;
              const d = choice==='rent'?deposit:depositSend;
              // 更新機器狀態
              const m = findMachine(model,serial);
              if(m){onSubmit('machineUpdate',{...m,'類型':contractType,'目前客戶':cust});}
              setFlowModal({type:'addContract',
                prefill:{customer:cust,model,serial,type:contractType,rent:r,deposit:d,completionDate:completionDate||todayStr()},
                onDone:()=>next()});
            } else if(choice==='customer'){
              const m = findMachine(model,serial);
              if(m){onSubmit('machineUpdate',{...m,'類型':'客人機','目前客戶':cust});}
              setFlowModal({type:'quickPayment',
                title:'新增收款（裝機費）',
                prefill:{customer:cust,items:['裝機費'],detail:`${model} ${serial}`},
                onDone:()=>next()});
            } else if(choice==='buyout'){
              const m = findMachine(model,serial);
              if(m){onSubmit('machineUpdate',{...m,'類型':'買斷','目前客戶':cust});}
              setFlowModal({type:'quickPayment',
                title:'新增收款（買斷）',
                prefill:{customer:cust,items:['機器買斷'],detail:`${model} ${serial}`,amount:buyout},
                onDone:()=>next()});
            }
          }
        });
      }
      return;
    }

    if(st==='換機'){
      // 換機：需要浮窗選新機（從待租/全新清單選）
      const newM = findMachine(row.newModel,row.newSerial);
      const oldM = findMachine(row.oldModel||model, row.oldSerial||serial);
      if(row.newModel||row.newSerial){
        // 有新機資訊
        if(oldM){onSubmit('machineUpdate',{...oldM,'類型':'◎進廠','目前客戶':''});}
        if(newM){onSubmit('machineUpdate',{...newM,'類型':'出租中','目前客戶':cust});}
        next();
      } else {
        // 沒填新機 → 浮窗選
        const available = machineList.filter(x=>['待出租','全新機'].includes(x['類型']||x.status||''));
        setFlowModal({type:'machinePicker',
          title:'選擇換上的機器',
          hint:'推薦：待出租 / 全新',
          machines:available,
          onSelect:(nm)=>{
            if(oldM){onSubmit('machineUpdate',{...oldM,'類型':'◎進廠','目前客戶':''});}
            onSubmit('machineUpdate',{...nm,'類型':'出租中','目前客戶':cust});
            next();
          }
        });
      }
      return;
    }

    if(st==='拆回'){
      if(!model&&!serial){
        showToast('請填入機型機號後再完成','warn');
        setFlowModal(null);setSaving(false);
        return;
      }
      setFlowModal({type:'choice',
        title:'拆回處理',
        msg:`${model} ${serial}`,
        options:[{label:'退租',value:'retire'},{label:'估回',value:'estimate'}],
        onSelect:(choice)=>{
          const m = findMachine(model,serial);
          if(choice==='retire'){
            // 退租：直接改◎進廠
            if(m){onSubmit('machineUpdate',{...m,'類型':'◎進廠','目前客戶':''});}
            onSubmit('contractExpire',{customer:cust,serial});
            showToast('✓ 已終止合約，機器已更新','success');
            next();
          } else {
            // 估回：狀態改◎進廠 → 新增收款
            if(m){onSubmit('machineUpdate',{...m,'類型':'◎進廠','目前客戶':''});}
            setFlowModal({type:'quickPayment',
              title:'新增收款（估回）',
              prefill:{customer:cust,items:['估回'],detail:`${model} ${serial}`},
              onDone:()=>next()});
          }
        }
      });
      return;
    }

    if(st==='搬回修理'){
      // 看有無借用機 row
      const borrowRow = rows.find((r,j)=>rows.indexOf(row)<j&&r._k==='con'&&r.serviceType==='借用機');
      const isCompany = !!(model||serial) && (()=>{
        const m = findMachine(model,serial);
        const tp = m?.['類型']||'';
        return ['出租中','租送機','買斷'].includes(tp);
      })();

      if(!model&&!serial){
        setFlowModal({type:'choice',
          title:'搬回修理',
          msg:'請問是公司機還是客人機？',
          options:[{label:'公司機',value:'company'},{label:'客人機',value:'customer'}],
          onSelect:(choice)=>{
            if(choice==='company'){
              showToast('請填入機型機號後再完成','warn');
              setFlowModal(null);setSaving(false);
            } else {
              // 新增機器（客人機）→ 新增維修
              setFlowModal({type:'addMachine',
                prefill:{'目前客戶':cust,'類型':'客人機'},
                onDone:(newM)=>{
                  onSubmit('machineAdd',newM);
                  if(borrowRow){
                    const avail = machineList.filter(x=>(x['類型']||x.type)==='待出租');
                    setFlowModal({type:'machinePicker',
                      title:'選擇借出的機器',hint:'推薦：待出租',machines:avail,
                      onSelect:(bm)=>{
                        onSubmit('machineUpdate',{...bm,'類型':'借用機','目前客戶':cust});
                        setFlowModal({type:'addRepair',
                          prefill:{customer:cust,model:newM['型號']||'',serial:newM['機號']||'',category:'客人機'},
                          onDone:()=>next()});
                      }});
                  } else {
                    setFlowModal({type:'addRepair',
                      prefill:{customer:cust,model:newM['型號']||'',serial:newM['機號']||'',category:'客人機'},
                      onDone:()=>next()});
                  }
                }
              });
            }
          }
        });
      } else {
        const m = findMachine(model,serial);
        if(m){onSubmit('machineUpdate',{...m,'類型':'◎進廠'});}
        const catType = m?.['類型']||'客人機';
        if(borrowRow&&(!borrowRow.model&&!borrowRow.serial)){
          const avail = machineList.filter(x=>(x['類型']||x.type)==='待出租');
          setFlowModal({type:'machinePicker',
            title:'選擇借出的機器',hint:'推薦：待出租',machines:avail,
            onSelect:(bm)=>{
              onSubmit('machineUpdate',{...bm,'類型':'借用機','目前客戶':cust});
              setFlowModal({type:'addRepair',
                prefill:{customer:cust,model,serial,category:catType},
                onDone:()=>next()});
            }});
        } else {
          if(borrowRow&&(borrowRow.model||borrowRow.serial)){
            const bm = findMachine(borrowRow.model,borrowRow.serial);
            if(bm) onSubmit('machineUpdate',{...bm,'類型':'借用機','目前客戶':cust});
          }
          setFlowModal({type:'addRepair',
            prefill:{customer:cust,model,serial,category:catType},
            onDone:()=>next()});
        }
      }
      return;
    }

    if(st==='修好送回'){
      if(!model&&!serial){
        showToast('請填入機型機號後再完成','warn');
        setFlowModal(null);setSaving(false);
        return;
      }
      // 修好的機器 → 客人機
      const m = findMachine(model,serial);
      if(m){onSubmit('machineUpdate',{...m,'類型':'客人機','目前客戶':cust});}
      // 有無借用機
      const borrowRow = rows.find((r,j)=>rows.indexOf(row)<j&&r._k==='con'&&r.serviceType==='借用機');
      if(borrowRow&&(borrowRow.model||borrowRow.serial)){
        const bm = findMachine(borrowRow.model,borrowRow.serial);
        if(bm){
          setFlowModal({type:'choice',
            title:'借用機歸還後狀態',
            msg:`${borrowRow.model||''} ${borrowRow.serial||''} 歸還後改為：`,
            options:[{label:'待出租',value:'待出租'},{label:'◎進廠',value:'◎進廠'}],
            onSelect:(st2)=>{
              onSubmit('machineUpdate',{...bm,'類型':st2,'目前客戶':''});
              setFlowModal({type:'quickPayment',
                title:'新增收款（維修費）',
                prefill:{customer:cust,items:['維修費'],detail:`${model} ${serial}`},
                onDone:()=>next()});
            }});
          return;
        }
      }
      if(borrowRow&&(!borrowRow.model&&!borrowRow.serial)){
        const avail = machineList.filter(x=>(x['類型']||x.type)==='借用機');
        setFlowModal({type:'machinePicker',
          title:'選擇歸還的借用機',hint:'推薦：借用機',machines:avail,
          onSelect:(bm)=>{
            setFlowModal({type:'choice',
              title:'借用機歸還後狀態',
              msg:`${bm['型號']||m.model||''} ${bm['機號']||m.serialNo||''} 歸還後改為：`,
              options:[{label:'待出租',value:'待出租'},{label:'◎進廠',value:'◎進廠'}],
              onSelect:(st2)=>{
                onSubmit('machineUpdate',{...bm,'類型':st2,'目前客戶':''});
                setFlowModal({type:'quickPayment',
                  title:'新增收款（維修費）',
                  prefill:{customer:cust,items:['維修費'],detail:`${model} ${serial}`},
                  onDone:()=>next()});
              }});
          }});
        return;
      }
      setFlowModal({type:'quickPayment',
        title:'新增收款（維修費）',
        prefill:{customer:cust,items:['維修費'],detail:`${model} ${serial}`},
        onDone:()=>next()});
      return;
    }

    if(st==='移機'){
      // 更新機器地址（透過更新客戶地址）
      const finalAddr = rec['地址']||[];
      const m = findMachine(model,serial);
      if(m){onSubmit('machineUpdate',{...m,'目前客戶':cust});}
      setFlowModal({type:'confirm',
        title:'移機完成',
        msg:'是否新增移機相關收款？',
        yes:'新增收款', no:'略過',
        onYes:()=>setFlowModal({type:'quickPayment',
          title:'新增收款（移機）',
          prefill:{customer:cust,items:['移機費'],detail:`${model} ${serial}`},
          onDone:()=>next()}),
        onNo:()=>next()
      });
      return;
    }

    if(st==='借用機'){
      const borrowM = findMachine(model,serial);
      if(model||serial){
        if(borrowM) onSubmit('machineUpdate',{...borrowM,'類型':'借用機','目前客戶':cust});
        next();
      } else {
        const avail = machineList.filter(x=>(x['類型']||x.type)==='待出租');
        setFlowModal({type:'machinePicker',
          title:'選擇借出的機器',hint:'推薦：待出租',machines:avail,
          onSelect:(bm)=>{
            onSubmit('machineUpdate',{...bm,'類型':'借用機','目前客戶':cust});
            next();
          }});
      }
      return;
    }

    // 其他類型直接繼續
    next();
  };


// ── Flow Modals render (before return in SignForm) ────────────────────────────
  const renderFlowModal = ()=>{
    if(!flowModal) return null;
    const fm = flowModal;
    const CustNames = custNames;
    const ModelSuggs = modelSuggs;

    if(fm.type==='confirm'){
      return(
        <FlowOverlay>
          <FlowCard title={fm.title}>

              <button onClick={fm.onNo} style={FST.cancelBtn}>{fm.no||'否'}</button>

            </div>
          </FlowCard>
        </FlowOverlay>
      );

        <FlowOverlay>
          <FlowCard title={fm.title}>

                <button key={opt.value} onClick={()=>fm.onSelect(opt.value)}

                  {opt.label}
                </button>
              ))}
              <button onClick={()=>{setFlowModal(null);setSaving(false);}} style={{...FST.cancelBtn,marginTop:4}}>取消</button>
            </div>
          </FlowCard>
        </FlowOverlay>
      );
    }

    // ── 裝機類型選擇 ──
    if(fm.type==='contractType'){
      const {customer:cu,model:mo,serial:se,rent,deposit,rentSend,depositSend,buyout} = fm;
      return(
        <FlowOverlay>
          <FlowCard title='選擇裝機類型'>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[

                  const repairSuggM=[...new Set(allM.filter(m=>custM2(m)&&['客人機','出租中','租送機','買斷'].includes(m['類型']||m.type||'')).map(m=>m['型號']||m.model||'').filter(Boolean))];
                  const typeMap={'出租中':'公司','借用機':'公司','租送機':'租送','買斷':'買斷','客人機':'客人'};

                    const f=allM.find(m=>(m['型號']||m.model||'')===v&&custM2(m));
