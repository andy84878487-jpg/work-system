                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        <div><AutoDocMachineInput value={row.model} onChange={v=>updRow(row.id,{model:v})} onPick={p=>{const f=allM.find(m=>(m['機號']||m.serialNo||'')===p.serial);const tp=f?(f['類型']||f.type||''):'';const typeMap={'出租中':'公司','借用機':'公司','租送機':'租送','買斷':'買斷','客人機':'客人'};let autoType=typeMap[tp]||'';if(tp==='租送機'){const ed=f?.['到期日期']||f?.endDate;if(ed&&new Date(String(ed).replace(/\//g,'-'))<new Date())autoType='租送到期';}updRow(row.id,{model:p.model,serial:p.serial,equipType:autoType});}} machines={allM.filter(m=>custM2(m)&&['客人機','出租中','租送機','買斷'].includes(m['類型']||m.type||''))} dStyle={DIS} emptyHint={customer?'此客戶名下無機器':'請先填客戶名稱'}/></div>
                        <div><AutoDocMachineInput value={row.serial} onChange={v=>updRow(row.id,{serial:v})} onPick={p=>{const f=allM.find(m=>(m['機號']||m.serialNo||'')===p.serial);const tp=f?(f['類型']||f.type||''):'';const typeMap={'出租中':'公司','借用機':'公司','租送機':'租送','買斷':'買斷','客人機':'客人'};let autoType=typeMap[tp]||'';if(tp==='租送機'){const ed=f?.['到期日期']||f?.endDate;if(ed&&new Date(String(ed).replace(/\//g,'-'))<new Date())autoType='租送到期';}updRow(row.id,{model:p.model,serial:p.serial,equipType:autoType});}} machines={allM.filter(m=>custM2(m)&&['客人機','出租中','租送機','買斷'].includes(m['類型']||m.type||'')&&(!row.model||(m['型號']||m.model||'')===row.model))} dStyle={DIS} emptyHint="無符合機號"/></div>
                      </div>
                    </div>
                  );
                })()}
                {/* 2. 設備類型（機型機號下方） */}
                <div style={{marginBottom:6}}>
                  <span style={{...CL,color:'#888'}}>設備類型</span>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:3,marginBottom:6}}>
                    {EQUIP_TYPES.map(t=><button key={t} onClick={()=>updRow(row.id,{equipType:row.equipType===t?'':t})} style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,border:'1.5px solid',cursor:'pointer',borderColor:row.equipType===t?WORK_DOC_COLOR:'#e5e7eb',background:row.equipType===t?WORK_DOC_COLOR:'#fff',color:row.equipType===t?'#fff':'#888'}}>{t}</button>)}
                  </div>
                </div>
                <div style={{borderTop:'1px dashed #e5e7eb',paddingTop:6}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{...CL,color:'#888',margin:0}}>維修項目</span>
                    <button onClick={()=>addRI(row.id)} style={{display:'flex',alignItems:'center',gap:2,padding:'2px 8px',borderRadius:4,border:'1px solid #e5e7eb',background:'#fff',color:'#888',fontSize:10,fontWeight:700,cursor:'pointer'}}><IPlus s={10}/>新增</button>
                  </div>
                  {(row.items||[]).map((it,j)=>(
                    <div key={it.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span style={{fontSize:10,color:'#bbb',width:14,flexShrink:0}}>{j+1}</span>
                      <div style={{flex:1}}><AutoDocInput value={it.name} onChange={v=>updRI(row.id,it.id,{name:v})} onSelect={v=>handleRepairSelect(row.id,it.id,v)} suggestions={repairSuggs} dStyle={DIS}/></div>
                      <input type="number" value={it.amount} onChange={e=>updRI(row.id,it.id,{amount:e.target.value})} placeholder="0" style={{...DIS,width:64,textAlign:'right',flexShrink:0}}/><TaxBadge on={!!it.tax} onClick={()=>updRI(row.id,it.id,{tax:!it.tax})}/>
                      {row.items.length>1&&<button onClick={()=>delRI(row.id,it.id)} style={{background:'none',border:'none',color:'#d1d5db',cursor:'pointer',display:'flex',padding:2,flexShrink:0}}><IClose s={12}/></button>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── +外務 ── */}
            {row._k==='misc'&&(
              <div>
                <div style={{display:'flex',gap:4,marginBottom:6,flexWrap:'wrap'}}>
                  {['領貨','送貨','場勘','簽約'].map(t=><button key={t} onClick={()=>updRow(row.id,{miscType:t,...(t==='簽約'?{contractId:'',contractInfo:''}:{})})} style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,border:'1.5px solid',cursor:'pointer',borderColor:row.miscType===t?WORK_DOC_COLOR:'#e5e7eb',background:row.miscType===t?WORK_DOC_COLOR:'#fff',color:row.miscType===t?'#fff':'#888'}}>{t}</button>)}
                </div>
                {/* 場勘不用輸入地址 */}
                {row.miscType==='場勘'?(
                  <div style={{fontSize:12,color:'#aaa',padding:'4px 0'}}>場勘地址請填寫上方地址欄</div>
                ):row.miscType==='簽約'?(
                  <div>
                    {(()=>{
                      let allContracts = [];
                      try { allContracts = JSON.parse(localStorage.getItem('tk_contracts')||'[]'); } catch{}
                      const pending = allContracts.filter(c => (c['狀態']||'待簽')==='待簽');
                      if(pending.length === 0){
                        return <div style={{fontSize:12,color:'#999',padding:'8px 10px',background:'#fef3c7',borderRadius:6,border:'1px solid #fde68a'}}>目前沒有待簽合約。請先到合約頁建立待簽合約。</div>;
                      }
                      const picked = pending.find(c => c['合約號']===row.contractId);
                      return (
                        <div>
                          <span style={{...CL,color:'#888'}}>選擇要簽的合約</span>
                          <select value={row.contractId||''} onChange={e=>{
                            const cn = e.target.value;
                            const c = pending.find(x => x['合約號']===cn);
                            updRow(row.id,{contractId:cn, contractInfo: c?`${c.storeName||''} · ${c.brand||''} ${c.model||''} ${c.serialNo||''}`.trim():'', name:c?`簽約：${c['合約號']}`:'', amount:''});
                          }} style={{...DIS,width:'100%'}}>
                            <option value="">— 請選擇 —</option>
                            {pending.map(c => (
                              <option key={c['合約號']} value={c['合約號']}>
                                {c['合約號']} · {c.storeName||'—'} · {c.brand||''} {c.model||''} {c.serialNo||''}
                              </option>
                            ))}
                          </select>
                          {picked && (
                            <div style={{marginTop:6,padding:'6px 10px',background:'#f0fdf4',borderRadius:6,border:'1px solid #86efac',fontSize:11,color:'#14532d'}}>
                              簽 <strong>{picked['合約號']}</strong> · {picked.storeName} · 月租 NT$ {Number(picked.rentAmt||0).toLocaleString()}
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                ):(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 52px 72px',gap:8}}>
                    <div><span style={{...CL,color:'#888'}}>品名</span>
                      {row.miscType==='送貨'
                        ?<AutoDocInput value={row.name} onChange={v=>handleNameChange(row.id,v)} onSelect={v=>handleSelect(row.id,v)} suggestions={partSuggs} dStyle={DIS}/>
                        :<input value={row.name} onChange={e=>updRow(row.id,{name:e.target.value})} style={DIS}/>
                      }
                    </div>
                    <div><span style={{...CL,color:'#888'}}>數量</span><input type="number" value={row.qty} onChange={e=>updRow(row.id,{qty:e.target.value})} style={{...DIS,textAlign:'center'}}/></div>
                    <div><span style={{...CL,color:'#888'}}>金額</span><div style={{display:'flex',alignItems:'center'}}><input type="number" value={row.amount} onChange={e=>updRow(row.id,{amount:e.target.value})} placeholder="0" style={{...DIS,textAlign:'right',flex:1,minWidth:0}}/><TaxBadge on={!!row.tax} onClick={()=>updRow(row.id,{tax:!row.tax})}/></div></div>
                  </div>
                )}
              </div>
            )}

            {/* ── +材料 ── */}
            {row._k==='material'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 52px 72px',gap:8}}>
                <div><span style={{...CL,color:'#888'}}>材料名稱</span>
                  <AutoDocInput value={row.name} onChange={v=>handleNameChange(row.id,v)} onSelect={v=>handleSelect(row.id,v)} suggestions={partSuggs} dStyle={DIS}/>
                </div>
                {/* 9. qty 預填1 */}
                <div><span style={{...CL,color:'#888'}}>數量</span><input type="number" value={row.qty} onChange={e=>updRow(row.id,{qty:e.target.value})} style={{...DIS,textAlign:'center'}}/></div>
                <div><span style={{...CL,color:'#888'}}>金額</span><div style={{display:'flex',alignItems:'center'}}><input type="number" value={row.amount} onChange={e=>updRow(row.id,{amount:e.target.value})} placeholder="0" style={{...DIS,textAlign:'right',flex:1,minWidth:0}}/><TaxBadge on={!!row.tax} onClick={()=>updRow(row.id,{tax:!row.tax})}/></div></div>
              </div>
            )}

            {/* ── +其他 ── */}
            {row._k==='other'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 80px',gap:8}}>
                <div><span style={{...CL,color:'#888'}}>描述</span><input value={row.desc} onChange={e=>updRow(row.id,{desc:e.target.value})} style={DIS}/></div>
                <div><span style={{...CL,color:'#888'}}>金額</span><div style={{display:'flex',alignItems:'center'}}><input type="number" value={row.amount} onChange={e=>updRow(row.id,{amount:e.target.value})} placeholder="0" style={{...DIS,textAlign:'right',flex:1,minWidth:0}}/><TaxBadge on={!!row.tax} onClick={()=>updRow(row.id,{tax:!row.tax})}/></div></div>
              </div>
            )}

            {/* ── +請款（引用其他未付簽單） ── */}
            {row._k==='billing'&&(
              <div style={{display:'grid',gridTemplateColumns:'auto 1fr 90px',gap:8,alignItems:'center'}}>
                <div onClick={()=>row.refSerial&&setRefDetailSerial(row.refSerial)}
                  style={{padding:'3px 9px',background:'#dcfce7',color:'#14532d',borderRadius:4,fontSize:11,fontWeight:800,whiteSpace:'nowrap',border:'1px solid #86efac',cursor:row.refSerial?'pointer':'default'}}
                  title={row.refSerial?'點擊查看原始簽單':''}>
                  {row.refSerial||'(未選)'}
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:10,color:'#888'}}>{row.refDate||''}{row.refCustomer&&row.refCustomer!==customer?` · ${row.refCustomer}`:''}</div>
                  <div style={{fontSize:12,color:'#111',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{row.refSummary||'—'}</div>
                </div>
                <div style={{textAlign:'right',fontSize:13,fontWeight:700,color:'#16a34a'}}>
                  NT$ {Number(row.amount||0).toLocaleString()}
                </div>
              </div>
            )}
          </div>

          {/* 右側：新增機器（特定情境）+ 刪除 */}
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,alignSelf:'flex-start',marginTop:2}}>
            {/* 施工：裝機/代裝/拆回/移機/搬回修理 → 顯示新增機器 */}
            {row._k==='con' && ['裝機','代裝','拆回','移機','搬回修理'].includes(row.serviceType) && (
              <button onClick={()=>setFlowModal({type:'addMachine',prefill:{'目前客戶':customer,'類型':'客人機'},onDone:(m)=>{onSubmit('machineAdd',m);updRow(row.id,{model:m['型號']||m.model||'',serial:m['機號']||m.serialNo||''});setFlowModal(null);}})}
                style={{display:'flex',alignItems:'center',gap:2,padding:'2px 8px',borderRadius:4,border:'1px solid #fb923c',background:'#fff',color:'#fb923c',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                <IPlus s={10}/>新增機器
              </button>
            )}
            {/* 維修 → 顯示新增機器 */}
            {row._k==='repair' && (
              <button onClick={()=>{
                if(!customer){alert('請先填寫客戶名稱');return;}
                setQuickMachineRowId(row.id);
              }}
                style={{display:'flex',alignItems:'center',gap:2,padding:'2px 8px',borderRadius:4,border:'1px solid #fb923c',background:'#fff',color:'#fb923c',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                <IPlus s={10}/>新增機器
              </button>
            )}
            <button onClick={()=>delRow(row.id)} style={{background:'none',border:'none',color:'#e5e7eb',cursor:'pointer',padding:2,display:'flex'}}><IClose s={13}/></button>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',background:'#d1d5db'}}>
      {/* Header */}
      <div style={{background:'#111',height:52,display:'flex',alignItems:'center',padding:'0 14px',gap:8,flexShrink:0,borderBottom:'1px solid #222'}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#aaa',display:'flex',padding:4,cursor:'pointer'}}><IBack/></button>
        <span style={{fontWeight:800,fontSize:15,color:'#f0f0f0'}}>{isEdit?'編輯工務單':'新增工務單'}</span>
        {(!isEdit || (editRecord?.['狀態']==='待辦' || editRecord?.['狀態']==='草稿'))&&<div style={{display:'flex',borderRadius:6,overflow:'hidden',border:'1px solid #333',marginLeft:8}}>
          {[['draft','待辦'],['complete','完成']].map(([m,l])=>(
            <button key={m} onClick={()=>setFormMode(m)} style={{padding:'5px 14px',fontSize:12,fontWeight:800,border:'none',cursor:'pointer',background:formMode===m?(m==='complete'?WORK_DOC_COLOR:'#444'):'transparent',color:formMode===m?'#fff':'#666'}}>{l}</button>
          ))}
        </div>}
        <div style={{flex:1}}/>
        <button onClick={submit} disabled={saving} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',background:saving?'#333':isDraft?'#333':`linear-gradient(135deg,${WORK_DOC_COLOR},#065f46)`,border:isDraft?'1px solid #555':'none',borderRadius:8,color:isDraft?'#aaa':'#fff',fontSize:13,fontWeight:700,cursor:'pointer',opacity:saving?.7:1}}>
          {saving?'處理中…':isDraft?'儲存待辦':<><ICheck/><span>{isEdit?'更新':'完成送出'}</span></>}
        </button>
      </div>

      {/* Document */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 10px 48px',WebkitOverflowScrolling:'touch'}}>
        <div style={{background:'#fff',borderRadius:10,maxWidth:680,margin:'0 auto',boxShadow:'0 8px 40px rgba(0,0,0,.2)',overflow:'hidden',fontFamily:"'Noto Sans TC','PingFang TC',sans-serif",color:'#111'}}>

          {/* 標頭 */}
          <div style={{background:WORK_DOC_COLOR,padding:'16px 18px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
            <div>
              <div style={{fontSize:8,fontWeight:800,letterSpacing:4,color:'rgba(255,255,255,.6)',marginBottom:3}}>SERVICE DOCUMENT</div>
              <div style={{fontSize:18,fontWeight:900,letterSpacing:2,color:'#fff'}}>{co.name||'統晉企業有限公司'}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.6)',marginTop:2}}>{co.slogan||'製冰機、洗碗機｜出租、維修、買賣'}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              {(()=>{
                const hasBilling = (rows||[]).some(r=>r._k==='billing');
                const hasOther = (rows||[]).some(r=>r._k!=='billing');
                const label = hasBilling && hasOther ? '簽單（含請款）'
                            : hasBilling && !hasOther ? '請款單'
                            : '工務單';
                return (
                  <div style={{fontSize:13,fontWeight:900,color:'#fff',padding:'4px 14px',background:'rgba(255,255,255,.18)',borderRadius:4,display:'inline-block',marginBottom:6}}>{label}</div>
                );
              })()}
              <div style={{fontSize:10,color:'rgba(255,255,255,.55)',marginBottom:3}}>類型隨工作明細自動判斷</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>單號：{serial}</div>
            </div>
          </div>

          {/* 客戶 + 日期 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr auto',borderBottom:CB}}>
            <div style={{padding:'8px 12px',borderRight:CB}}>
              <span style={{...CL,color:WORK_DOC_COLOR}}>客戶名稱</span>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{flex:1}}><AutoDocInput value={customer} onChange={setCustomer} onSelect={pickCustomerName} suggestions={custNames} ph="店家或公司名稱" dStyle={{...DI,fontSize:14,fontWeight:600}} inputClass="doc-cust"/></div>
                  <button type="button" onClick={()=>setQuickStoreOpen(true)} title="新增客戶資料" style={{flexShrink:0,padding:'5px 10px',background:'rgba(15,118,110,.1)',border:'1px solid rgba(15,118,110,.3)',borderRadius:6,color:'#0f766e',fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:3}}>＋ 新增</button>
                </div>
            </div>
            <div style={{display:'flex'}}>
              <div style={{padding:'8px 12px',borderRight:CB}}><span style={{...CL,color:'#888'}}>紀錄日期</span><input type="date" value={recordDate} onChange={e=>setRecordDate(e.target.value)} style={{...DIS,width:128}}/></div>
              <div style={{padding:'8px 12px',opacity:isDraft?.4:1}}><span style={{...CL,color:isDraft?'#bbb':'#888'}}>完成日期{isDraft?' (完成時填)':''}</span><input type="date" value={completionDate} onChange={e=>setCompletionDate(e.target.value)} disabled={isDraft} style={{...DIS,width:128,color:isDraft?'#ccc':'#111'}}/></div>
            </div>
          </div>

          {/* 電話 + 執行人員 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:CB}}>
            <div style={{padding:'8px 12px',borderRight:CB}}><span style={{...CL,color:'#888'}}>聯絡電話</span><DocMultiInput items={phones} onChange={setPhones}/></div>
            <div style={{padding:'8px 12px'}}><span style={{...CL,color:'#888'}}>執行人員</span><DocMultiInput items={staff} onChange={setStaff} suggestions={staffSuggs}/></div>
          </div>

          {/* 地址 */}
          <div style={{padding:'8px 12px',borderBottom:CB}}><span style={{...CL,color:'#888'}}>地址</span><DocMultiInput items={addresses} onChange={setAddresses}/></div>

          {/* 8. 移機新地址（只有移機才顯示）*/}
          {hasIkki&&<div style={{padding:'8px 12px',borderBottom:CB,background:'#eff6ff'}}>
            <span style={{...CL,color:'#1d4ed8'}}>移機新地址 <span style={{fontSize:8,color:'#ef4444'}}>（將取代舊地址）</span></span>
            <input value={newAddress} onChange={e=>setNewAddress(e.target.value)} placeholder="搬遷後完整地址" style={{...DI,borderBottomColor:'#1d4ed8'}}/>
          </div>}

          {/* 工作明細 */}
          <div style={{borderBottom:CB}}>
            <div style={{padding:'7px 12px 8px',background:'#f9fafb',borderBottom:CB}}>
              <span style={{...CL,color:WORK_DOC_COLOR,marginBottom:8,display:'block'}}>工作明細</span>
              {/* 2. Chip 不填色 */}
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {CHIP_DEFS.map(chip=>(
                  <button key={chip.k} onClick={()=>addRow(chip.k)}
                    style={{display:'flex',alignItems:'center',gap:3,padding:'4px 11px',borderRadius:20,border:'1.5px solid #d1d5db',background:'#fff',color:'#555',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .1s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='#888';e.currentTarget.style.color='#111';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='#d1d5db';e.currentTarget.style.color='#555';}}>
                    <IPlus s={11}/>{chip.label}
                  </button>
                ))}
              </div>
            </div>
            {rows.length===0
              ?<div style={{padding:'24px',textAlign:'center',color:'#bbb',fontSize:12}}>點擊上方按鈕新增工作項目</div>
              :rows.map((row,i)=>renderRow(row,i))
            }
          </div>

          {/* 備註 */}
          <div style={{padding:'7px 12px',borderBottom:CB}}>
            <span style={{...CL,color:'#bbb'}}>備註（選填）</span>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={1} style={{width:'100%',background:'#f9fafb',border:'1px solid #f3f4f6',borderRadius:4,padding:'4px 8px',fontSize:12,color:'#111',outline:'none',resize:'vertical',minHeight:32,fontFamily:'inherit',marginTop:2}}/>
          </div>

          {/* 收款 */}
          {hasPayment&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:CB,background:'#f0fdf4'}}>
            <div style={{padding:'8px 12px',borderRight:CB}}>
              <span style={{...CL,color:'#16a34a'}}>收款方式</span>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:4}}>
                {PAY_METHODS_SF.map(m=><button key={m} onClick={()=>setPayMethod(m)} style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,border:'1.5px solid',cursor:'pointer',borderColor:payMethod===m?'#16a34a':'#bbf7d0',background:payMethod===m?'#16a34a':'#fff',color:payMethod===m?'#fff':'#16a34a'}}>{m}</button>)}
              </div>
            </div>
            <div style={{padding:'8px 12px',borderRight:CB}}>
              <span style={{...CL,color:'#16a34a'}}>付款狀態</span>

// ── QuickStoreModal: 簽單內快速新增客戶（用完整 StoreForm，與客戶資料一致）
function QuickStoreModal({crmData, prefillName, onClose, onSaved}){
  // StoreForm 需要的 db 結構
  const db = useMemo(() => ({
    stores: crmData?.stores || [],
    companies: crmData?.companies || [],
    persons: crmData?.persons || [],
  }), [crmData]);

  const handleSave = (payload) => {
    try {
      const cur = JSON.parse(localStorage.getItem('crm_v3')||'{"stores":[],"companies":[],"persons":[]}');
      cur.stores = cur.stores || [];
      cur.companies = cur.companies || [];
      cur.persons = cur.persons || [];

      // 公司：existing 用 comId / new 則新增
      let companyId = '';
      if (payload.comMode === 'existing' && payload.comId) {
        companyId = payload.comId;
      } else if (payload.comMode === 'new' && payload.company.title?.trim()) {
        // 檢查是否已有同名公司
        const exists = cur.companies.find(c => (c.title||'') === payload.company.title.trim());
        if (exists) {
          companyId = exists.id;
        } else {
          const newCom = {
            id: payload.company.id || ('C'+Date.now().toString(36)),
            title: payload.company.title.trim(),
            taxId: payload.company.taxId||'',
            phone: payload.company.phone||'',
            address: payload.company.address||'',
            note: payload.company.note||'',
            personIds: payload.personIds || [],
          };
          cur.companies.push(newCom);
          companyId = newCom.id;
        }
      }

      // 新建立的聯絡人寫入 persons
      (payload.newPersons||[]).forEach(np => {
        if (!cur.persons.find(p => p.id === np.id)) cur.persons.push(np);
      });

      // 把聯絡人連結到公司（如果是公司模式）
      if (companyId) {
        const c = cur.companies.find(x => x.id === companyId);
        if (c) {
          const merged = Array.from(new Set([...(c.personIds||[]), ...(payload.personIds||[])]));
          c.personIds = merged;
        }
      }

      // 客戶
      if (cur.stores.some(s => (s.name||'') === payload.store.name && s.id !== payload.store.id)) {
        showToast('客戶名稱已存在','error');
        return;
      }
      const newStore = {
        id: payload.store.id,
        name: payload.store.name,
        phones: payload.store.phones||[],
        address: payload.store.address||'',
        note: payload.store.note||'',
        companyId: companyId,
        personIds: companyId ? [] : (payload.personIds||[]), // 若無公司，聯絡人放在 store 下
      };
      cur.stores = [newStore, ...cur.stores];

      localStorage.setItem('crm_v3', JSON.stringify(cur));
      try { 
        markDirty('客戶資料', payload.store.name, 'upsert');
        if (companyId) markDirty('客戶公司', companyId, 'upsert');
        (payload.newPersons||[]).forEach(np => markDirty('聯絡人', np.id, 'upsert'));
      } catch{}
      try { scheduleSync(); } catch{}
      onSaved(payload.store.name);
    } catch(e){ 
      console.error(e);
      showToast('儲存失敗：'+(e.message||''),'error'); 
    }
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center',overflowY:'auto'}}>
      <div style={{background:'#1a1a1a',border:'1px solid #333',borderRadius:'14px 14px 0 0',padding:'18px 18px 20px',width:'100%',maxWidth:520,maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontWeight:800,fontSize:15,color:'#eee'}}>＋ 新增客戶</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        <StoreForm onSave={handleSave} db={db} editStoreId={null} preComId={null} prefillName={prefillName}/>
      </div>
    </div>
  );
}


// ── BigSigPad: 10cm × 6cm 簽名板浮窗 ─────────────────────────────────────────
const BigSigPad = ({onSave, onClose, title='客戶簽名', borderColor='#0f766e'}) => {
  const ref = useRef(null);
  const [has, setHas] = useState(false);
  const last = useRef(null);
  // 10cm × 6cm @ 96dpi → 378 × 227 px (不過畫布內部解析度抓 2x for crisp)
  const W = 378, H = 227;

  const pos = (e, c) => {
    const r = c.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: (s.clientX - r.left) * (c.width / r.width), y: (s.clientY - r.top) * (c.height / r.height) };
  };
  const start = e => {
    e.preventDefault();
    const c = ref.current; const ctx = c.getContext('2d');
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); last.current = pos(e, c); setHas(true);
  };
  const move = e => {
    if (!last.current) return;
    e.preventDefault();
    const c = ref.current; const ctx = c.getContext('2d');
    const p = pos(e, c);
    ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last.current = p;
  };
  const end = e => { if(e) e.preventDefault(); last.current = null; };
  const clear = () => { ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height); setHas(false); };
  const save = () => { if(!has){showToast('請先簽名','error');return;} onSave(ref.current.toDataURL()); onClose(); };

  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'#fff',borderRadius:12,padding:'18px 18px 14px',boxShadow:'0 20px 60px rgba(0,0,0,.6)',maxWidth:'92vw'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontWeight:800,fontSize:15,color:'#111'}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        <div style={{position:'relative'}}>
          <canvas ref={ref} width={W*2} height={H*2}
            style={{display:'block',width:`${W}px`,height:`${H}px`,maxWidth:'100%',cursor:'crosshair',touchAction:'none',background:'#fff',border:`2px solid ${borderColor}`,borderRadius:8}}
            onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
          {!has&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',color:'#d1d5db',fontSize:13}}>請在此簽名</div>}
        </div>
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button onClick={clear} style={{flex:1,padding:'10px',background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:8,color:'#666',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>清除重簽</button>
          <button onClick={save} style={{flex:2,padding:'10px',background:has?'linear-gradient(135deg,#0f766e,#065f46)':'#ccc',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:has?'pointer':'not-allowed',fontFamily:'inherit'}}>確認簽名</button>
        </div>
      </div>
    </div>
  );
};

                {customerMachines.length>8 && <div style={{fontSize:10,color:'#92400e',textAlign:'center'}}>… 共 {customerMachines.length} 台</div>}
              </div>
            </div>}

              <div style={{fontSize:10,color:'#92400e',marginBottom:3,fontWeight:700}}>近期紀錄（{Math.min(customerHistory.length,5)}筆）</div>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>

                    <span style={{flex:1}}>{h._summary||''}</span>

            </div>}

        <div style={{borderBottom:CB}}>
          <div style={{padding:'7px 12px',background:'#f9fafb',borderBottom:CB}}>
            <span style={{...CL,color:SC,margin:0}}>工作明細</span>
          </div>
          {rows.length===0
            ?<div style={{padding:'18px 12px',color:'#bbb',fontSize:12,textAlign:'center'}}>無工作項目</div>

              const lbl = chipMeta[row._k] || '其他';

                <div key={row.id||i} style={{borderTop:i>0?CB:'none',background:i%2===0?'#fff':'#fafafa',padding:'8px 12px',display:'flex',gap:10,alignItems:'flex-start'}}>

                    {row._k==='rental'&&<>
                      {row.hasRent&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:row.hasDeposit?5:0}}>
                        <span style={{fontWeight:700,color:'#0891b2'}}>租金</span>
                        {row.rentFrom&&row.rentTo&&<span style={{color:'#666',fontSize:12}}>{row.rentFrom} ~ {row.rentTo}</span>}
                        <span style={{marginLeft:'auto',fontWeight:700}}>NT$ {Number(row.rentAmt||0).toLocaleString()}</span>
                      </div>}
                      {row.hasDeposit&&<div style={{display:'flex',gap:8}}>
                        <span style={{fontWeight:700,color:'#888'}}>押金</span>
                        <span style={{marginLeft:'auto',fontWeight:700}}>NT$ {Number(row.depositAmt||0).toLocaleString()}</span>
                      </div>}
                    </>}
                    {row._k==='con'&&<div>
                      {row.serviceType==='換機'?<>
                        <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}>
                          <span style={{fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:3,background:SC,color:'#fff'}}>裝</span>
                          <span style={{fontWeight:700}}>{row.newModel||'—'}</span>
                          <span style={{color:'#666',fontSize:12}}>{row.newSerial||''}</span>
                        </div>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <span style={{fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:3,background:'#ef4444',color:'#fff'}}>回</span>
                          <span style={{fontWeight:700}}>{row.oldModel||'—'}</span>
                          <span style={{color:'#666',fontSize:12}}>{row.oldSerial||''}</span>
                        </div>
                      </>:<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                        {row.serviceType!=='移機'&&<span style={{fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:3,background:row.dir==='裝'?SC:'#ef4444',color:'#fff'}}>{row.dir||'裝'}</span>}
                        <span style={{fontWeight:800,color:'#1d4ed8'}}>{row.serviceType||''}</span>
                        {row.model&&<span style={{fontWeight:700}}>{row.model}</span>}
                        {row.serial&&<span style={{color:'#666',fontSize:12}}>{row.serial}</span>}
                        {row.amount&&<span style={{marginLeft:'auto',fontWeight:700}}>NT$ {Number(row.amount).toLocaleString()}</span>}
                      </div>}
                    </div>}
                    {row._k==='repair'&&<>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:5}}>
                        {row.equipType&&<span style={{fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:3,background:'#d97706',color:'#fff'}}>{row.equipType}</span>}
                        {row.model&&<span style={{fontWeight:700}}>{row.model}</span>}
                        {row.serial&&<span style={{color:'#666',fontSize:12}}>{row.serial}</span>}
                      </div>
                      {(row.items||[]).map((it,j)=>(
                        <div key={it.id||j} style={{display:'flex',gap:6,paddingLeft:8,fontSize:12,marginBottom:2}}>
                          <span style={{color:'#999'}}>·</span>
                          <span style={{flex:1}}>{it.name||'(未填)'}</span>
                          {it.amount&&<span style={{color:'#16a34a',fontWeight:700}}>NT$ {Number(it.amount).toLocaleString()}</span>}
                        </div>
                      ))}
                    </>}
                    {row._k==='misc'&&<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:3,background:'#7c3aed',color:'#fff'}}>{row.miscType||'外務'}</span>
                      <span style={{fontWeight:700,flex:1}}>{row.name||'—'}</span>
                      {row.qty&&<span style={{color:'#666',fontSize:12}}>×{row.qty}</span>}
                      {row.amount&&<span style={{fontWeight:700}}>NT$ {Number(row.amount).toLocaleString()}</span>}
                    </div>}
                    {row._k==='material'&&<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,flex:1}}>{row.name||'—'}</span>
                      {row.qty&&<span style={{color:'#666',fontSize:12}}>×{row.qty}</span>}
                      {row.amount&&<span style={{fontWeight:700}}>NT$ {Number(row.amount).toLocaleString()}</span>}
                    </div>}
                    {row._k==='other'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span style={{flex:1}}>{row.desc||'—'}</span>
                      {row.amount&&<span style={{fontWeight:700}}>NT$ {Number(row.amount).toLocaleString()}</span>}
                    </div>}
                  </div>
                </div>
              );
            })
          }
        </div>

        {/* 備註 */}
        {rec['備註']&&<div style={{padding:'8px 12px',borderBottom:CB}}>
          <span style={{...CL,color:'#bbb'}}>備註</span>
          <div style={{...SUBVAL,borderBottom:'none',whiteSpace:'pre-wrap'}}>{rec['備註']}</div>
        </div>}

        {/* 收款（editable 時方式/狀態 chip 可直接切換）*/}
        {hasPayment&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:CB,background:rec['付款狀態']==='付清'?'#f0fdf4':'#fef2f2'}}>
          <div style={{padding:'8px 12px',borderRight:CB}}>
            <span style={{...CL,color:'#16a34a'}}>收款方式</span>
            {editable&&onChangePay
              ? <div style={{display:'flex',gap:4,marginTop:3,flexWrap:'wrap'}}>
                  {['現金','匯款','支票','月結'].map(m=>(
                    <button key={m} onPointerDown={e=>{e.preventDefault();onChangePay({method:m});}}
                      style={{padding:'3px 9px',fontSize:11,fontWeight:700,border:'1.5px solid',borderRadius:4,cursor:'pointer',fontFamily:'inherit',
                        borderColor:(rec['收款方式']||'')===m?'#16a34a':'#d1d5db',
                        background:(rec['收款方式']||'')===m?'#16a34a':'#fff',
                        color:(rec['收款方式']||'')===m?'#fff':'#666'}}>{m}</button>
                  ))}
                </div>
              : <div style={{...SUBVAL,borderBottom:'none',fontWeight:700}}>{rec['收款方式']||'—'}</div>
            }
          </div>
          <div style={{padding:'8px 12px',borderRight:CB}}>
            <span style={{...CL,color:'#16a34a'}}>付款狀態</span>
            {editable&&onChangePay
              ? <div style={{display:'flex',gap:4,marginTop:3}}>
                  {['未付','付清'].map(s=>(
                    <button key={s} onPointerDown={e=>{e.preventDefault();onChangePay({status:s});}}
                      style={{padding:'3px 9px',fontSize:11,fontWeight:700,border:'1.5px solid',borderRadius:4,cursor:'pointer',fontFamily:'inherit',
                        borderColor:(rec['付款狀態']||'未付')===s?(s==='付清'?'#16a34a':'#ef4444'):'#d1d5db',
                        background:(rec['付款狀態']||'未付')===s?(s==='付清'?'#16a34a':'#ef4444'):'#fff',
                        color:(rec['付款狀態']||'未付')===s?'#fff':'#666'}}>{s}</button>
                  ))}
                </div>
              : <div style={{...SUBVAL,borderBottom:'none',fontWeight:700,color:rec['付款狀態']==='付清'?'#16a34a':'#ef4444'}}>{rec['付款狀態']||'未付'}</div>
            }
          </div>
          <div style={{padding:'8px 12px'}}>
            <span style={{...CL,color:'#16a34a'}}>總金額 NT$</span>
            <div style={{fontSize:18,fontWeight:900,color:'#111',padding:'2px 0'}}>{Number(totalAmount).toLocaleString()}</div>
          </div>
        </div>}

        {/* 簽章區（僅客戶簽章）*/}
        <div style={{padding:'14px 16px',borderBottom:CB,textAlign:'center',background:'#fafafa'}}>
          <span style={{...CL,color:SC,display:'block',marginBottom:8}}>客戶 簽章</span>
          {(rec['客戶簽章']||custSig)
            ? <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <img src={rec['客戶簽章']||custSig} style={{display:'block',margin:'0 auto',maxWidth:300,height:80,objectFit:'contain',background:'#fff',border:`2px solid ${SC}`,borderRadius:8}}/>
                {(isWaiting||editable)&&(onSignCust||onResign)&&
                  <button onPointerDown={e=>{e.preventDefault();(onResign||onSignCust)();}}
                    style={{padding:'4px 12px',background:'#fff',border:`1px solid ${SC}`,borderRadius:6,color:SC,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>重新簽名</button>
                }
              </div>
            : (isWaiting && onSignCust
                ? <button onClick={onSignCust} style={{padding:'14px 28px',background:'#fff',border:`2px dashed ${SC}`,borderRadius:8,color:SC,fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:8}}>
                    ✍️ 點此開啟簽名板
                  </button>
                : <div style={{maxWidth:300,height:80,margin:'0 auto',background:'#fff',border:`2px dashed ${SC}`,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:SC,fontSize:12}}>(待簽)</div>
              )
          }
        </div>

        {/* Footer */}
        <div style={{padding:'7px 14px',background:'#f9fafb',fontSize:9,color:'#bbb'}}>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span>{co.name||''}{co.tel?` · ${co.tel}`:''}{co.address?` · ${co.address}`:''}</span>
            <span>{rec['紀錄日期']||''}</span>
          </div>
          {co.taxId&&<div style={{marginTop:2,fontWeight:700,color:'#888'}}>統一編號：{co.taxId}</div>}
        </div>
      </div>
    </div>
  );
}

// ── Shared: RecordDetail ──────────────────────────────────────────────────────
function RecordDetail({rec,type}){
  const machines=parseArr(rec['機器組'])||[];
  const phones=parseArr(rec['電話'])||[];
  const addrs=parseArr(rec['地址'])||[];
  const staff=parseArr(rec['執行人員'])||[];
  const rows=[['客戶名稱',rec['客戶名稱']],['紀錄日期',fmtDate(rec['紀錄日期'])],['完成日期',fmtDate(rec['完成日期'])],['執行人員',staff.join('、')],['電話',phones.join(' / ')],['地址',addrs.join(' / ')],type==='維修'?['客戶類型',rec['客戶類型']]:null,type==='維修'?['維修內容',rec['維修內容']]:null,rec['總金額']?['付款狀態',rec['付款狀態']]:null,rec['總金額']?['總金額','NT$ '+Number(rec['總金額']).toLocaleString()]:null,['備註',rec['備註']]].filter(r=>r&&r[1]);
  return(<div>
    {rows.map(([l,v])=><div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #1a1a1a'}}><span style={{fontSize:12,color:'#555',flexShrink:0}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:'#ccc',maxWidth:'65%',textAlign:'right',wordBreak:'break-all'}}>{v}</span></div>)}
    {machines.length>0&&<div style={{marginTop:10}}>
      <div style={{fontSize:10,fontWeight:800,color:'#444',letterSpacing:'.08em',marginBottom:7}}>{type==='施工'?'施工明細':'維修明細'}</div>
      {machines.map((m,i)=><div key={i} style={{background:'#1a1a1a',borderRadius:8,padding:'7px 11px',marginBottom:5,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:800,padding:'2px 7px',borderRadius:20,background:m.dir==='裝'?'rgba(59,130,246,.15)':'rgba(239,68,68,.15)',color:m.dir==='裝'?'#60a5fa':'#f87171'}}>{m.dir||'裝'}</span>
        <span style={{fontWeight:700,fontSize:13,color:'#ccc'}}>{m.model}</span>
        <span style={{color:'#555',fontSize:12}}>{m.serial}</span>
        {m.serviceType&&<span style={{fontSize:11,color:'#555',marginLeft:'auto'}}>{m.serviceType}</span>}
        {m.amount&&<span style={{color:'#22c55e',fontWeight:700,fontSize:12}}>NT${Number(m.amount).toLocaleString()}</span>}
      </div>)}
    </div>}
  </div>);
}

// ── Shared: BottomDetailSheet ─────────────────────────────────────────────────
function BottomDetailSheet({title,onClose,onEdit,onDelete,onMarkPaid,pm,setPm,payStatus,children}){
  const [confirmDel,setConfirmDel]=useState(false);
  return(
    <div style={{position:'fixed',inset:0,zIndex:300}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:'#111',borderRadius:'20px 20px 0 0',border:'1px solid #222',maxHeight:'88vh',display:'flex',flexDirection:'column',animation:'slideUp .25s ease'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'center',padding:'12px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:'#333'}}/></div>
        {/* Title + actions */}
        <div style={{padding:'0 18px 8px',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontWeight:800,fontSize:14,color:'#ccc',flex:1}}>{title}</span>
          <button onClick={onEdit} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:7,color:'#60a5fa',fontSize:12,fontWeight:700,cursor:'pointer'}}><IEdit/>編輯</button>
          <button onClick={()=>setConfirmDel(true)} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:7,color:'#f87171',fontSize:12,fontWeight:700,cursor:'pointer'}}><ITrash/>刪除</button>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#555',cursor:'pointer',display:'flex',padding:4}}><IClose/></button>
        </div>
        <div style={{overflowY:'auto',padding:'4px 18px 28px',flex:1}}>
          {children}
          {onMarkPaid&&payStatus!=='付清'&&<div style={{marginTop:16}}>
            <div style={{fontSize:10,fontWeight:800,color:'#444',letterSpacing:'.08em',marginBottom:8}}>標記收款</div>
            <div style={{display:'flex',gap:6,marginBottom:10}}>
              {PAY_METHODS.map(m=><button key={m} onClick={()=>setPm(m)} style={{padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:'1.5px solid',cursor:'pointer',borderColor:pm===m?'#22c55e':'#333',background:pm===m?'rgba(34,197,94,.15)':'transparent',color:pm===m?'#22c55e':'#555'}}>{m}</button>)}
            </div>
            <button onClick={onMarkPaid} style={{width:'100%',padding:'11px',background:'linear-gradient(135deg,#16a34a,#15803d)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><ICheck/>標記付清</button>
          </div>}
        </div>
      </div>
      {confirmDel&&<ConfirmDlg msg={`確定要刪除這筆紀錄？<br/><span style="font-size:11px;color:#555">此操作無法復原</span>`} onConfirm={()=>{setConfirmDel(false);onDelete();}} onCancel={()=>setConfirmDel(false)}/>}
    </div>
  );
}

// ── Construction / Maintenance / Payment Pages ────────────────────────────────
function ConstructionPage({data,onUpdatePay,onEdit,onDelete}){
  const [search,setSearch]=useState('');
  const [detail,setDetail]=useState(null);
  const [pm,setPm]=useState('現金');
  const filtered=useMemo(()=>(data||[]).filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(search.toLowerCase()))),[data,search]);
  return(<div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0f0f0f'}}>
    <div style={{padding:'8px 14px',position:'sticky',top:0,background:'#0f0f0f',zIndex:5}}>
      <div style={{position:'relative'}}><span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#444',display:'flex'}}><ISearch/></span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋施工紀錄…" style={{width:'100%',padding:'8px 12px 8px 32px',background:'#1a1a1a',border:'1px solid #222',borderRadius:9,color:'#ccc',fontSize:13,outline:'none'}}/></div>
    </div>
    <div style={{flex:1,overflowY:'auto'}}>
      {filtered.length===0?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,color:'#333',fontSize:13}}>{search?`找不到「${search}」`:'尚無施工紀錄'}</div>:
        filtered.map((r,i)=>{const paid=r['付款狀態']==='付清';const ms=parseArr(r['機器組'])||[];return(
          <div key={i} onClick={()=>{setDetail(r);setPm('現金');}} style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'12px 15px',cursor:'pointer',borderLeft:'3px solid #3b82f6'}}
            onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'} onPointerUp={e=>e.currentTarget.style.background=''} onPointerLeave={e=>e.currentTarget.style.background=''}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontWeight:700,fontSize:13,color:'#ccc'}}>{r['客戶名稱']}</span>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                {(r['狀態']==='待辦'||r['狀態']==='草稿')&&<span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'rgba(107,114,128,.15)',color:'#9ca3af',border:'1px solid #374151'}}>草稿</span>}
                <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:paid?'rgba(22,163,74,.15)':'rgba(239,68,68,.12)',color:paid?'#22c55e':'#f87171'}}>{paid?'付清':'未付'}</span>
              </div>
            </div>
            <div style={{fontSize:11,color:'#444',marginBottom:2}}>{r['單號']} · {fmtDate(r['完成日期'])}</div>
            <div style={{fontSize:12,color:'#555'}}>{ms.slice(0,2).map((m,j)=><span key={j}>{m.dir||'裝'} {m.model}{j<ms.length-1&&j<1?'、':''}</span>)}{ms.length>2&&<span> …共{ms.length}台</span>}</div>
            {r['總金額']&&<div style={{fontSize:12,color:'#22c55e',marginTop:2}}>NT$ {Number(r['總金額']).toLocaleString()}</div>}
          </div>
        );})}
    </div>
    {detail&&<BottomDetailSheet title={`施工紀錄 · ${detail['單號']}`} onClose={()=>setDetail(null)}
      onEdit={()=>{onEdit(detail,'施工');setDetail(null);}}
      onDelete={()=>{onDelete(detail['單號'],'施工');setDetail(null);showToast('已刪除','success');}}
      onMarkPaid={async()=>{await onUpdatePay(detail['單號'],'施工','付清',pm);showToast('已標記付清','success');setDetail(null);}}
      pm={pm} setPm={setPm} payStatus={detail['付款狀態']}>
      <RecordDetail rec={detail} type="施工"/>
    </BottomDetailSheet>}
  </div>);
}

    <div style={{flex:1,overflowY:'auto'}}>

        filtered.map((r,i)=>{const paid=r['付款狀態']==='付清';return(
          <div key={i} onClick={()=>{setDetail(r);setPm('現金');}} style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'12px 15px',cursor:'pointer',borderLeft:'3px solid #d97706'}}
            onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'} onPointerUp={e=>e.currentTarget.style.background=''} onPointerLeave={e=>e.currentTarget.style.background=''}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontWeight:700,fontSize:13,color:'#ccc'}}>{r['客戶名稱']}</span>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                {(r['狀態']==='待辦'||r['狀態']==='草稿')&&<span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'rgba(107,114,128,.15)',color:'#9ca3af',border:'1px solid #374151'}}>待辦</span>}
                {r['客戶類型']&&<span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'rgba(217,119,6,.15)',color:'#f59e0b'}}>{r['客戶類型']}</span>}
                <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:paid?'rgba(22,163,74,.15)':'rgba(239,68,68,.12)',color:paid?'#22c55e':'#f87171'}}>{paid?'付清':'未付'}</span>
              </div>
            </div>
            <div style={{fontSize:11,color:'#444',marginBottom:2}}>{r['單號']} · {fmtDate(r['完成日期'])}</div>
            {r['維修內容']&&<div style={{fontSize:12,color:'#555',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r['維修內容']}</div>}
            {r['總金額']&&<div style={{fontSize:12,color:'#22c55e',marginTop:2}}>NT$ {Number(r['總金額']).toLocaleString()}</div>}
          </div>
        );})}
    </div>
    {detail&&<BottomDetailSheet title={`維修紀錄 · ${detail['單號']}`} onClose={()=>setDetail(null)}
      onEdit={()=>{onEdit(detail,'維修');setDetail(null);}}
      onDelete={()=>{onDelete(detail['單號'],'維修');setDetail(null);showToast('已刪除','success');}}
      onMarkPaid={async()=>{await onUpdatePay(detail['單號'],'維修','付清',pm);showToast('已標記付清','success');setDetail(null);}}
      pm={pm} setPm={setPm} payStatus={detail['付款狀態']}>
      <RecordDetail rec={detail} type="維修"/>
    </BottomDetailSheet>}
  </div>);
}

// CRM 客戶詳情頁的「未收款」橫幅
function CustomerUnpaidBanner({customerName}){
  const [expanded, setExpanded] = useState(false);
  
  const unpaidWorks = useMemo(()=>{
    if (!customerName) return [];
    let list = [];
    try { list = JSON.parse(localStorage.getItem('tk_work')||'[]'); } catch{}
    // 排除已被別張請款型簽單以 billing row 引用的單號
    const referenced = new Set();
    (list||[]).forEach(w => {
      const rs = parseArr(w['工作明細'])||[];
      rs.forEach(r => { if(r._k==='billing' && r.refSerial) referenced.add(r.refSerial); });
    });
    return (list||[]).filter(w =>
      w['客戶名稱'] === customerName &&
      w['狀態']==='完成' &&
      w['付款狀態']==='未付' &&
      !referenced.has(w['單號'])
    );
  }, [customerName]);
  
  if (unpaidWorks.length === 0) {
    // 沒未收款 → 顯示綠色提示
    return (
      <div style={{padding:'10px 12px',background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',borderRadius:8,color:'#22c55e',fontSize:12,fontWeight:700,marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
        <span>✓</span><span>無未收款</span>
      </div>
    );
  }
  
  const sum = unpaidWorks.reduce((s,w)=>s+Number(w['總金額']||0),0);
  
  return (
    <div style={{background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.3)',borderRadius:8,marginBottom:12,overflow:'hidden'}}>
      <div style={{padding:'10px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,color:'#f87171',fontWeight:800}}>💰 未收款 {unpaidWorks.length} 筆</div>
          <div style={{fontSize:11,color:'#dc2626',marginTop:1,fontWeight:700}}>共 NT$ {sum.toLocaleString()}</div>
        </div>
        <button onClick={()=>setExpanded(!expanded)}
          style={{padding:'6px 10px',background:'rgba(220,38,38,.15)',border:'1px solid rgba(220,38,38,.3)',borderRadius:6,color:'#f87171',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
          {expanded?'收起':'查看明細'}
        </button>
      </div>
      {expanded && (
        <div style={{borderTop:'1px solid rgba(220,38,38,.2)',background:'rgba(0,0,0,.2)'}}>
          {unpaidWorks.map(w => (
            <div key={w['單號']} style={{padding:'8px 12px',borderBottom:'1px solid rgba(220,38,38,.12)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:'#f87171',fontWeight:700}}>{w['單號']}</div>
                <div style={{fontSize:10,color:'#888'}}>{fmtDate(w['完成日期']||w['紀錄日期'])}</div>
              </div>
              <div style={{fontSize:12,fontWeight:800,color:'#f87171',flexShrink:0}}>NT$ {Number(w['總金額']||0).toLocaleString()}</div>
            </div>
          ))}
          <div style={{padding:'8px 12px',fontSize:10,color:'#888',textAlign:'center',background:'rgba(0,0,0,.3)'}}>
            前往「💰 收款」頁可批次標記為付清
          </div>
        </div>
      )}
    </div>
  );
}

function PaymentPage({data,onDelete,onBatchCollect,onBilling}){
  const [tab,setTab]=useState('unpaid'); // unpaid / all / paid
  const [search,setSearch]=useState('');
  const [showSuggest,setShowSuggest]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);
  const [batchTarget,setBatchTarget]=useState(null); // { customer, items:[] }
  const [billingTarget,setBillingTarget]=useState(null); // 請款 { customer, items:[] }
  const [exporting,setExporting]=useState(false);
  const [detailSerial, setDetailSerial] = useState(null); // 點簽單看明細用
  const allWorkOrders = useMemo(()=>{
    try { return JSON.parse(localStorage.getItem('tk_work')||'[]'); } catch{ return []; }
  }, [data, detailSerial]);

  // 全部 = 所有已完成的簽單（未收+已付清混合）
  const allCompletedWorks = useMemo(()=>{
    let list = [];
    try { list = JSON.parse(localStorage.getItem('tk_work')||'[]'); } catch{}
    return (list||[])
      .filter(w => w['狀態']==='完成' && w['付款狀態'])
      .sort((a,b)=>{
        // 未付排前面，再依日期新到舊
        const pa = a['付款狀態']==='未付'?0:1;
        const pb = b['付款狀態']==='未付'?0:1;
        if (pa !== pb) return pa - pb;
        return (b['完成日期']||b['紀錄日期']||'').localeCompare(a['完成日期']||a['紀錄日期']||'');
      });
  }, [data]);
  
  // 從工務單抓「已完成 + 未付」清單，並排除已被請款的（避免重複）
  const unpaidWorks = useMemo(()=>{
    let list = [];
    try { list = JSON.parse(localStorage.getItem('tk_work')||'[]'); } catch{}

    // 從 payment 抓出「已被請款的單號」(請款單號有值的都算被請款了)
    const billedNos = new Set();
    (data||[]).forEach(p => {
      if (p['請款單號']) billedNos.add(p['單號']);
    });
    // 也排除「已被新版 billing row 引用」的單號，避免重複請款
    (list||[]).forEach(w => {
      const rs = parseArr(w['工作明細'])||[];
      rs.forEach(r => { if(r._k==='billing' && r.refSerial) billedNos.add(r.refSerial); });
    });

    return (list||[]).filter(w =>
      w['狀態']==='完成' && w['付款狀態']==='未付' && !billedNos.has(w['單號'])
    );
  }, [data]);
  
  // 已付清的工務單
  const paidWorks = useMemo(()=>{
    let list = [];
    try { list = JSON.parse(localStorage.getItem('tk_work')||'[]'); } catch{}
    return (list||[]).filter(w => 
      w['狀態']==='完成' && w['付款狀態']==='付清'
    );
  }, [data]);

  // 客戶 + 公司名稱建議清單（給搜尋輸入框推薦用）
  const customerSuggestions = useMemo(()=>{
    let crm = {};
    try { crm = JSON.parse(localStorage.getItem('crm_v3')||'{}'); } catch{}
    const names = new Set();
    (crm.stores||[]).forEach(s => { if (s.name) names.add(s.name); });
    (crm.companies||[]).forEach(c => { if (c.title) names.add(c.title); });
    return Array.from(names).sort();
  },[data]);

  // 搜尋過濾
  // 搜尋過濾 — 若搜尋的是公司名稱，會自動把該公司旗下的店家全部包含
  const searchContext = useMemo(()=>{
    const q = (search||'').trim();
    if (!q) return { isCompany: false, storeNames: [], q };
    let crm = {};
    try { crm = JSON.parse(localStorage.getItem('crm_v3')||'{}'); } catch{}
    // 是否完全等於某公司名稱？
    const com = (crm.companies||[]).find(c => (c.title||'').trim() === q);
    if (com) {
      const childStores = (crm.stores||[]).filter(s => s.companyId === com.id).map(s => s.name);
      return { isCompany: true, companyTitle: com.title, storeNames: childStores, q };
    }
    return { isCompany: false, storeNames: [], q };
  },[search]);

  const matchSearch = (r) => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    // 若搜尋目標是公司：包含旗下店家的所有簽單
    if (searchContext.isCompany) {
      const cust = String(r['客戶名稱']||'').trim();
      if (searchContext.storeNames.includes(cust)) return true;
      // 也允許搜尋字本身命中（其他欄位如單號）
    }
    return Object.values(r||{}).some(v => {
      if (Array.isArray(v)) return v.some(x => String(x).toLowerCase().includes(q));
      if (typeof v === 'object' && v) return JSON.stringify(v).toLowerCase().includes(q);
      return String(v||'').toLowerCase().includes(q);
    });
  };

  // 各 chip 的 filtered 結果
  const filteredAll = useMemo(()=>allCompletedWorks.filter(matchSearch),[allCompletedWorks,search]);
  const filteredUnpaid = useMemo(()=>unpaidWorks.filter(matchSearch),[unpaidWorks,search]);
  const filteredPaid = useMemo(()=>paidWorks.filter(matchSearch),[paidWorks,search]);

  // 計算 chip 數字
  const cAll = allCompletedWorks.length;
  const cUnpaid = unpaidWorks.length;
  const cPaid = paidWorks.length;
  
  // 未收款分組（按客戶）
  const unpaidByCustomer = useMemo(()=>{
    const map = {};
    filteredUnpaid.forEach(w => {
      const cust = w['客戶名稱']||'(未填客戶)';
      if (!map[cust]) map[cust] = [];
      map[cust].push(w);
    });
    return map;
  },[filteredUnpaid]);

  // PDF 匯出
  const doExport = async () => {
    const cust = search.trim();
    if (!cust) { showToast('請先輸入客戶名稱再匯出','error'); return; }
    
    let items = [];
    let kind = '';
    if (tab === 'unpaid') { items = filteredUnpaid; kind = '未收款'; }
    else if (tab === 'paid') { items = filteredPaid; kind = '已付清'; }
    else { 
      // 全部 = 該客戶的未付 + 已付清的簽單
      items = [...filteredUnpaid, ...filteredPaid].sort((a,b)=>{
        const da=a['完成日期']||a['紀錄日期']||''; 
        const db=b['完成日期']||b['紀錄日期']||'';
        return da.localeCompare(db);
      });
      kind = '全部';
    }
    
    if (items.length === 0) { showToast('沒有資料可匯出','error'); return; }
    
    setExporting(true);
    try {
      await generatePaymentListPDF({ 
        customer: cust, 
        kind, 
        items, 
        isCompany: searchContext.isCompany,
        companyTitle: searchContext.companyTitle 
      });
    } catch(e) {
      showToast('匯出失敗：'+(e.message||''),'error');
    }
    setExporting(false);
  };

  // 收款合計（已收項目；未收項目顯示應收）
  const total = useMemo(()=>{
    if (tab==='all') return filteredAll.reduce((s,r)=>s+Number(r['總金額']||0),0);
    if (tab==='unpaid') return filteredUnpaid.reduce((s,r)=>s+Number(r['總金額']||0),0);
    return filteredPaid.reduce((s,r)=>s+Number(r['總金額']||0),0);
  },[tab,filteredAll,filteredUnpaid,filteredPaid]);

  return(<div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0f0f0f'}}>
    <div style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'10px 14px',flexShrink:0,position:'sticky',top:0,zIndex:5}}>
      {/* Header：標題 + 匯出按鈕 */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <span style={{fontWeight:800,fontSize:15,color:'#ccc',flex:1}}>收款紀錄</span>
        <button onClick={doExport} disabled={exporting||!search.trim()}
          title={!search.trim()?'請先輸入客戶名稱再匯出':'匯出 PDF'}
          style={{display:'flex',alignItems:'center',gap:5,padding:'7px 14px',background:search.trim()?'linear-gradient(135deg,#dc2626,#991b1b)':'#333',border:'none',borderRadius:8,color:search.trim()?'#fff':'#777',fontSize:13,fontWeight:700,cursor:search.trim()?'pointer':'not-allowed',opacity:exporting?.6:1}}>
          📤 {exporting?'匯出中…':'匯出'}
        </button>
      </div>
      {/* Search */}
      <div style={{position:'relative',marginBottom:8}}>
        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#444',display:'flex',pointerEvents:'none'}}><ISearch/></span>
        <input value={search}
          onChange={e=>{setSearch(e.target.value); setShowSuggest(true);}}
          onFocus={()=>{ if(search.trim()) setShowSuggest(true); }}
          onBlur={()=>setTimeout(()=>setShowSuggest(false), 150)}
          placeholder="搜尋客戶、公司、單號、金額…"
          style={{width:'100%',padding:'8px 12px 8px 32px',background:'#1a1a1a',border:'1px solid #222',borderRadius:9,color:'#ccc',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
        {showSuggest && search.trim() && (()=>{
          const q = search.trim().toLowerCase();
          const matches = customerSuggestions.filter(n => n.toLowerCase().includes(q) && n.toLowerCase() !== q).slice(0,8);
          if (matches.length === 0) return null;
          return (
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:8,zIndex:50,maxHeight:240,overflowY:'auto',boxShadow:'0 6px 20px rgba(0,0,0,.5)'}}>
              {matches.map(n => (
                <div key={n} onMouseDown={()=>{ setSearch(n); setShowSuggest(false); }}
                  style={{padding:'8px 12px',cursor:'pointer',color:'#ccc',fontSize:13,borderBottom:'1px solid #222'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#2a2a2a'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  {n}
                </div>
              ))}
            </div>
          );
        })()}
      </div>
      {/* Filter chips */}
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {[['unpaid','未收',cUnpaid],['paid','已付清',cPaid],['all','全部',cAll]].map(([v,l,cnt])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,border:'1px solid',cursor:'pointer',fontFamily:'inherit',
              borderColor:tab===v?'#dc2626':'#2a2a2a',
              background:tab===v?'rgba(220,38,38,.12)':'transparent',
              color:tab===v?'#ef4444':'#555'}}>
            {l} {cnt>0&&<span style={{fontSize:10}}>{cnt}</span>}
          </button>
        ))}
        <div style={{flex:1,textAlign:'right',fontSize:11,color:tab==='unpaid'?'#f87171':tab==='paid'?'#22c55e':'#aaa',fontWeight:700}}>
          {tab==='all' && cAll>0 && <>共 {filteredAll.length} 筆 · NT$ {total.toLocaleString()}</>}
          {tab==='unpaid' && cUnpaid>0 && <>應收 NT$ {total.toLocaleString()}</>}
          {tab==='paid' && cPaid>0 && <>NT$ {total.toLocaleString()}</>}
        </div>
      </div>
    </div>
    
    <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
      {/* === 全部 === 已完成簽單，紅未收 / 綠已付清 === */}
      {tab==='all' && (filteredAll.length===0
        ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,color:'#333',fontSize:13}}>{search?`找不到「${search}」的簽單`:'尚無已完成簽單'}</div>
        :filteredAll.map((w,i)=>{
          const unpaid = w['付款狀態']==='未付';
          const color = unpaid ? '#f87171' : '#22c55e';
          return (
            <div key={w['單號']||i} onClick={()=>setDetailSerial(w['單號'])}
              style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'12px 15px',borderLeft:`3px solid ${color}`,cursor:'pointer'}}
              onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'}
              onPointerUp={e=>e.currentTarget.style.background='#111'}
              onPointerLeave={e=>e.currentTarget.style.background='#111'}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3,gap:8}}>
                <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:700,fontSize:13,color:'#ccc'}}>{w['客戶名稱']}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:99,background:unpaid?'rgba(220,38,38,.15)':'rgba(34,197,94,.15)',color:color,whiteSpace:'nowrap'}}>{unpaid?'未收':'付清'}</span>
                </div>
                <span style={{fontWeight:800,fontSize:14,color:color,whiteSpace:'nowrap'}}>NT$ {Number(w['總金額']||0).toLocaleString()}</span>
              </div>
              <div style={{fontSize:11,color:'#444'}}>{w['單號']} · {fmtDate(w['完成日期']||w['紀錄日期'])}{!unpaid&&w['收款方式']?` · ${w['收款方式']}`:''}</div>
              {!unpaid&&w['收款日期']&&<div style={{fontSize:10,color:'#22c55e',marginTop:2}}>✓ 收款日 {fmtDate(w['收款日期'])}</div>}
            </div>
          );
        }))}
        
      {tab==='paid' && (filteredPaid.length===0
        ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,color:'#333',fontSize:13}}>{search?`找不到「${search}」的已付清簽單`:'尚無已付清簽單'}</div>
        :filteredPaid.map((w,i)=>(
          <div key={w['單號']||i} onClick={()=>setDetailSerial(w['單號'])}
            style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'12px 15px',borderLeft:'3px solid #22c55e',cursor:'pointer'}}
            onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'}
            onPointerUp={e=>e.currentTarget.style.background='#111'}
            onPointerLeave={e=>e.currentTarget.style.background='#111'}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontWeight:700,fontSize:13,color:'#ccc'}}>{w['客戶名稱']}</span>
              <span style={{fontWeight:800,fontSize:14,color:'#22c55e'}}>NT$ {Number(w['總金額']||0).toLocaleString()}</span>
            </div>
            <div style={{fontSize:11,color:'#444'}}>{w['單號']} · {fmtDate(w['完成日期']||w['紀錄日期'])} · {w['收款方式']||'—'}</div>
            {w['收款日期']&&<div style={{fontSize:11,color:'#22c55e',marginTop:2}}>✓ 收款日 {fmtDate(w['收款日期'])}</div>}
          </div>
        )))}

      {/* === 未收款分組顯示 === */}
      {tab==='unpaid' && (Object.keys(unpaidByCustomer).length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:200,color:'#333',fontSize:13,gap:10}}>
          <div style={{fontSize:36}}>🎉</div>
          <div>{search?`找不到「${search}」的未收款`:'目前沒有未收款的簽單'}</div>
        </div>
        :Object.keys(unpaidByCustomer).map(cust=>{
          const items = unpaidByCustomer[cust];
          const sum = items.reduce((s,w)=>s+Number(w['總金額']||0),0);
          return (
            <div key={cust} style={{borderBottom:'1px solid #1a1a1a'}}>
              {/* 客戶分組標頭 */}
              <div style={{padding:'10px 15px',background:'#0a0a0a',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,position:'sticky',top:0}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:'#f87171'}}>{cust}</div>

                    style={{padding:'6px 12px',background:'#fff',border:'1px solid #fb923c',borderRadius:7,color:'#fb923c',fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                    📋 請款
                  </button>
                  <button onClick={()=>setBatchTarget({customer:cust,items})}
                    style={{padding:'6px 12px',background:'linear-gradient(135deg,#dc2626,#991b1b)',border:'none',borderRadius:7,color:'#fff',fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                    💰 批次收款
                  </button>
                </div>
              </div>
              {/* 該客戶的未收簽單 */}
              {items.map(w=>(
                <div key={w['單號']} onClick={()=>setDetailSerial(w['單號'])}
                  style={{background:'#111',padding:'10px 15px 10px 20px',borderLeft:'3px solid #f87171',borderBottom:'1px solid #161616',cursor:'pointer'}}
                  onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'}
                  onPointerUp={e=>e.currentTarget.style.background='#111'}
                  onPointerLeave={e=>e.currentTarget.style.background='#111'}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>

                    <span style={{fontWeight:800,fontSize:13,color:'#f87171'}}>NT$ {Number(w['總金額']||0).toLocaleString()}</span>

                  {(()=>{
                    const detail = summarizeWorkRows(w['工作明細']);
                    return detail ? <div style={{fontSize:11,color:'#888',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{detail}</div> : null;
                  })()}

              ))}

          );
        }))}
    </div>
    
    {confirmDel&&<ConfirmDlg msg={`確定刪除 <strong>${confirmDel['客戶名稱']}</strong> 的收款紀錄？<br/><span style="font-size:11px;color:#888">對應簽單會自動改回「未付」狀態</span>`} onConfirm={()=>{onDelete(confirmDel['單號']||confirmDel['收款ID'],'payment');setConfirmDel(null);showToast('已刪除','success');}} onCancel={()=>setConfirmDel(null)}/>}
    
    {batchTarget&&<BatchPaymentSheet target={batchTarget} onClose={()=>setBatchTarget(null)} onConfirm={async (selected, method, date, note)=>{
      await onBatchCollect(selected, method, date, note);
      setBatchTarget(null);
      showToast(`✓ 已收清 ${selected.length} 筆，共 NT$ ${selected.reduce((s,w)=>s+Number(w['總金額']||0),0).toLocaleString()}`,'success');
    }}/>}
    {billingTarget&&<BillingSheet target={billingTarget} onClose={()=>setBillingTarget(null)} onConfirm={(selected)=>{
      if(onBilling) onBilling(billingTarget.customer, selected);
      setBillingTarget(null);
    }}/>}
    {detailSerial && <BillingRefModal serial={detailSerial} workOrders={allWorkOrders} onClose={()=>setDetailSerial(null)}/>}
  </div>);
}

// 請款 Sheet — 勾選未收簽單，產生新請款單
function BillingSheet({target, onClose, onConfirm}){
  const [selectedIds, setSelectedIds] = useState(()=>new Set(target.items.map(w=>w['單號'])));
  
  const toggle = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const toggleAll = () => {
    if (selectedIds.size === target.items.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(target.items.map(w=>w['單號'])));
  };
  
  const selected = target.items.filter(w => selectedIds.has(w['單號']));
  const sum = selected.reduce((s,w)=>s+Number(w['總金額']||0), 0);
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1a1a',border:'1px solid #333',borderRadius:'14px 14px 0 0',padding:'18px 18px 20px',width:'100%',maxWidth:520,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexShrink:0}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#eee'}}>📋 請款 — {target.customer}</div>
            <div style={{fontSize:11,color:'#666',marginTop:2}}>勾選要請款的簽單，按確認後會開一張新請款單</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        
        <div style={{flex:1,overflowY:'auto',marginBottom:14,border:'1px solid #2a2a2a',borderRadius:8,background:'#0f0f0f'}}>
          <div onClick={toggleAll} style={{padding:'10px 14px',borderBottom:'1px solid #1a1a1a',background:'#0a0a0a',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${selectedIds.size===target.items.length?'#fb923c':'#444'}`,background:selectedIds.size===target.items.length?'#fb923c':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {selectedIds.size===target.items.length&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
            </div>
            <span style={{fontSize:11,color:'#888',fontWeight:700}}>全選（{target.items.length} 張）</span>
          </div>
          {target.items.map(w => {
            const sel = selectedIds.has(w['單號']);
            return (
              <div key={w['單號']} onClick={()=>toggle(w['單號'])}
                style={{padding:'10px 14px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',gap:10,cursor:'pointer',background:sel?'rgba(251,146,60,.08)':'transparent'}}>
                <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${sel?'#fb923c':'#444'}`,background:sel?'#fb923c':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {sel&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:sel?'#fb923c':'#aaa',fontWeight:700}}>{w['單號']}</div>
                  <div style={{fontSize:10,color:'#666'}}>{w['完成日期']||w['紀錄日期']}</div>
                </div>
                <div style={{fontSize:13,color:sel?'#fb923c':'#aaa',fontWeight:800}}>NT$ {Number(w['總金額']||0).toLocaleString()}</div>
              </div>
            );
          })}
        </div>
        
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,padding:'10px 12px',background:'#0a0a0a',borderRadius:8,border:'1px solid #2a2a2a'}}>
          <span style={{fontSize:11,color:'#888'}}>請款金額合計</span>
          <span style={{fontSize:16,fontWeight:900,color:'#fb923c'}}>NT$ {sum.toLocaleString()}</span>
        </div>

        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={onClose} style={{flex:1,padding:'12px',background:'#222',border:'1px solid #333',borderRadius:8,color:'#888',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>取消</button>
          <button onClick={()=>onConfirm(selected)}
            disabled={selected.length===0}
            style={{flex:2,padding:'12px',background:selected.length===0?'#333':'linear-gradient(135deg,#fb923c,#ea580c)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:selected.length===0?'not-allowed':'pointer',fontFamily:'inherit',opacity:selected.length===0?.5:1}}>

  );
