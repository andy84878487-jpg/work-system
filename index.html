// ── 從試算表拉取所有資料 + 合併到本地 ──
// 規則：
// 1. 試算表上有但 APP 沒的 → 加入本地
// 2. APP 上的 dirty queue（剛改未推）→ 不被覆蓋
// 3. 試算表沒有但 APP 有的（且不在 dirty queue）→ 保留本地（保守，不主動刪）
async function pullFromSheet(){
  const co = getCompany();
  if(!co.appsScriptUrl) throw new Error('未設定 Apps Script URL');
  const resp = await fetch(co.appsScriptUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ mode:'pullAll' })
  });
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const txt = await resp.text();
  const result = JSON.parse(txt);
  if (!result.ok || !result.data) throw new Error(result.error||'pullAll failed');
  
  const sheets = result.data;
  const syncState = getSyncState();
  const dirty = syncState.dirty || [];
  
  // 把 dirty 內的 (table, id) 整理成 Set，這些 ID 在拉取時要跳過（保留本地未推送的版本）
  const dirtyIds = {};
  dirty.forEach(d => {
    if (!dirtyIds[d.table]) dirtyIds[d.table] = new Set();
    dirtyIds[d.table].add(String(d.id));
  });
  
  const stats = { added: 0, updated: 0, skipped: 0 };
  
  // ── 1. 客戶公司 + 客戶資料 + 聯絡人 → 寫入 crm_v3 ──
  const crmRaw = localStorage.getItem('crm_v3') || '{"stores":[],"companies":[],"persons":[]}';
  const crm = JSON.parse(crmRaw);
  crm.stores = crm.stores || [];
  crm.companies = crm.companies || [];
  crm.persons = crm.persons || [];
  
  // 客戶公司
  const sheetCompanies = sheets['客戶公司'] || [];
  const dirtyCompanyIds = dirtyIds['客戶公司'] || new Set();
  sheetCompanies.forEach((row, rowIdx) => {
    const title = String(row['公司名稱']||'').trim();
    if (!title) return; // 沒名字就跳過
    
    // ID 優先用試算表上的；空的話：先看 APP 內是否已有同名公司，有就沿用、沒有再產生唯一 ID
    let id = String(row['公司ID']||'').trim();
    if (!id) {
      const sameTitle = crm.companies.find(c => (c.title||'') === title);
      if (sameTitle) {
        id = sameTitle.id;
      } else {
        id = 'C' + Date.now().toString(36) + rowIdx.toString(36) + Math.random().toString(36).slice(2,5);
      }
    }
    
    if (dirtyCompanyIds.has(id)) { stats.skipped++; return; }
    
    const existing = crm.companies.find(c => c.id === id);
    const personIds = String(row['聯絡人IDs']||'').split(/[,\s]+/).filter(Boolean);
    if (existing) {
      existing.title = title;
      existing.taxId = String(row['統一編號']||'');
      existing.phone = String(row['電話']||'');
      existing.address = String(row['地址']||'');
      existing.note = row['備註']||'';
      existing.personIds = personIds;
      stats.updated++;
    } else {
      crm.companies.push({
        id, title, taxId: String(row['統一編號']||''),
        phone: String(row['電話']||''), address: String(row['地址']||''),
        note: row['備註']||'', personIds,
      });
      stats.added++;
    }
  });
  
  // 客戶資料 — 主鍵是「客戶名稱」
  const sheetStores = sheets['客戶資料'] || [];
  const dirtyStoreNames = dirtyIds['客戶資料'] || new Set();
  sheetStores.forEach((row, rowIdx) => {
    const name = String(row['客戶名稱']||'').trim();
    if (!name) return;
    if (dirtyStoreNames.has(name)) { stats.skipped++; return; }
    
    // 客戶ID 優先用試算表上的；空的話產生「絕對唯一」的 ID（不能用名稱前綴，會撞）
    const sheetId = String(row['客戶ID']||'').trim();
    const id = sheetId || ('S' + Date.now().toString(36) + rowIdx.toString(36) + Math.random().toString(36).slice(2,5));
    const existing = crm.stores.find(s => (s.name||s['店家名稱']) === name);
    const phones = String(row['電話']||'').split(/[,\s]+/).filter(Boolean);
    const personIds = String(row['聯絡人IDs']||'').split(/[,\s]+/).filter(Boolean);
    if (existing) {
      existing.id = existing.id || id;
      existing.name = name;
      existing.phones = phones;
      existing.address = String(row['地址']||'');
      existing.companyId = String(row['所屬公司ID']||'');
      existing.personIds = personIds;
      existing.note = row['備註']||'';
      stats.updated++;
    } else {
      crm.stores.push({
        id, name, phones, address: String(row['地址']||''),
        companyId: String(row['所屬公司ID']||''), personIds,
        note: row['備註']||'', createdAt: String(row['建立日期']||''),
      });
      stats.added++;
    }
  });
  
  // 聯絡人 — 主鍵是「聯絡人ID」
  const sheetPersons = sheets['聯絡人'] || [];
  const dirtyPersonIds = dirtyIds['聯絡人'] || new Set();
  sheetPersons.forEach(row => {
    const id = String(row['聯絡人ID']||'').trim();
    if (!id) return;
    if (dirtyPersonIds.has(id)) { stats.skipped++; return; }
    
    const existing = crm.persons.find(p => p.id === id);
    if (existing) {
      existing.name = row['姓名']||'';
      existing.role = row['職稱']||'';
      existing.info = String(row['聯絡資訊']||'');
      existing.note = row['備註']||'';
      stats.updated++;
    } else {
      crm.persons.push({
        id, name: row['姓名']||'', role: row['職稱']||'',
        info: String(row['聯絡資訊']||''), note: row['備註']||''
      });
      stats.added++;
    }
  });
  
  localStorage.setItem('crm_v3', JSON.stringify(crm));
  
  // ── 2. 機器清單 → machines_v1（保持 {machines, opts} 結構）──
  const machRaw = localStorage.getItem('machines_v1') || '{}';
  let machRoot = {};
  try { machRoot = JSON.parse(machRaw); } catch{}
  // 兼容舊格式：如果是純陣列（早期 pullFromSheet 寫成的）→ 升級為 {machines, opts}
  if (Array.isArray(machRoot)) machRoot = { machines: machRoot };
  if (!machRoot.machines || !Array.isArray(machRoot.machines)) machRoot.machines = [];
  
  const sheetMachines = sheets['機器清單'] || [];
  const dirtyMachIds = dirtyIds['機器清單'] || new Set();
  sheetMachines.forEach(row => {
    const serialNo = String(row['機號']||'').trim();
    if (!serialNo) return;
    if (dirtyMachIds.has(serialNo)) { stats.skipped++; return; }
    
    const existing = machRoot.machines.find(m => (m['機號']||m.serialNo) === serialNo);
    const newRec = {
      brand: row['廠牌']||'', model: row['型號']||row['機型']||'',
      serialNo: serialNo,
      iceType: row['冰型']||'', capacity: row['磅數']||'',
      voltage: row['電壓']||'', cooling: row['散熱']||'', coolant: row['冷媒']||'',
      type: row['類型']||'', customer: String(row['目前客戶']||''),
      endDate: row['到期日期']||'',
    };
    if (existing) {
      Object.assign(existing, newRec);
      stats.updated++;
    } else {
      machRoot.machines.push({ id: 'M'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), ...newRec });
      stats.added++;
    }
  });
  localStorage.setItem('machines_v1', JSON.stringify(machRoot));
  
  // ── 3. 製冰機/材料/維修 報價 → quotation_v1 ──
  const quoteRaw = localStorage.getItem('quotation_v1') || '{"iceMachines":[],"parts":[],"repairs":[],"brands":[]}';
  const quote = JSON.parse(quoteRaw);
  quote.iceMachines = quote.iceMachines || [];
  quote.parts = quote.parts || [];
  quote.repairs = quote.repairs || [];
  
  // 製冰機報價 — 複合主鍵 廠牌|機型
  const sheetIce = sheets['製冰機 報價'] || [];
  const dirtyIceKeys = dirtyIds['製冰機 報價'] || new Set();
  sheetIce.forEach(row => {
    const brand = String(row['廠牌']||'').trim();
    const model = String(row['機型']||'').trim();
    if (!brand || !model) return;
    const compositeKey = brand + '|' + model;
    if (dirtyIceKeys.has(compositeKey)) { stats.skipped++; return; }
    
    const existing = quote.iceMachines.find(q => q.brand === brand && q.model === model);
    // 試算表上 chip 欄位是用「/」連接的字串，本地端要還原成陣列（DetailSheet 期望 array）
    const splitArr = s => String(s||'').split('/').map(x=>x.trim()).filter(Boolean);
    const newRec = {
      brand, model,
      iceType: splitArr(row['冰型']), capacity: splitArr(row['磅數']),
      voltage: splitArr(row['電壓']), cooling: splitArr(row['散熱']),
      coolant: splitArr(row['冷媒']), iceStorage: row['儲冰量']||'',
      width: '', depth: '', height: '',
      rent: row['租金']||'', rentSendMonths: row['租送 月數']||'',
      rentDel: row['租送 租金']||'', deposit: row['租送 押金']||'',
      price: row['售價']||'',
      newStock: row['新機庫存']||'', rentStock: row['待租庫存']||'',
      stopped: !!row['停售'], note: row['附註']||'',
    };
    // 解析寬深高
    const wdh = String(row['寬深高']||'').split(/[×x]/);
    if (wdh.length === 3) { newRec.width = wdh[0]; newRec.depth = wdh[1]; newRec.height = wdh[2]; }
    
    if (existing) { Object.assign(existing, newRec); stats.updated++; }
    else { quote.iceMachines.push({ id: 'Q'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), ...newRec }); stats.added++; }
  });
  
  // 材料報價 — 主鍵「名稱」
  const sheetParts = sheets['材料 報價'] || [];
  const dirtyPartNames = dirtyIds['材料 報價'] || new Set();
  sheetParts.forEach(row => {
    const name = String(row['名稱']||'').trim();
    if (!name) return;
    if (dirtyPartNames.has(name)) { stats.skipped++; return; }
    const existing = quote.parts.find(p => p.name === name);
    const newRec = { name, price: row['價格']||'', stock: row['庫存']||'', status: row['狀態']||'', note: row['附註']||'' };
    if (existing) { Object.assign(existing, newRec); stats.updated++; }
    else { quote.parts.push({ id: 'P'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), ...newRec }); stats.added++; }
  });
  
  // 維修報價 — 主鍵「名稱」
  const sheetRepairs = sheets['維修 報價'] || [];
  const dirtyRepairNames = dirtyIds['維修 報價'] || new Set();
  sheetRepairs.forEach(row => {
    const name = String(row['名稱']||'').trim();
    if (!name) return;
    if (dirtyRepairNames.has(name)) { stats.skipped++; return; }
    const existing = quote.repairs.find(r => r.name === name);
    const newRec = { name, price: row['價格']||'', stock: row['庫存']||'', status: row['狀態']||'', note: row['附註']||'' };
    if (existing) { Object.assign(existing, newRec); stats.updated++; }
    else { quote.repairs.push({ id: 'R'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), ...newRec }); stats.added++; }
  });
  
  localStorage.setItem('quotation_v1', JSON.stringify(quote));
  
  // ── 4. 簽單 → tk_work ──
  // 試算表新結構：每張單第一列含主檔欄位、後續列只有明細
  // 「狀態」依「完成日期」是否有填判定（待辦 / 完成）
  const workRaw = localStorage.getItem('tk_work') || '[]';
  let workOrders = [];
  try { workOrders = JSON.parse(workRaw); } catch{}
  if (!Array.isArray(workOrders)) workOrders = [];
  
  const sheetSign = sheets['簽單'] || [];
  const dirtySignIds = dirtyIds['簽單'] || new Set();
  
  // 按單號分組
  const groupedByNo = {};
  sheetSign.forEach(row => {
    const no = String(row['單號']||'').trim();
    if (!no) return;
    if (!groupedByNo[no]) groupedByNo[no] = [];
    groupedByNo[no].push(row);
  });
  
  // dirty 的單跳過（保留本地版本，含 delete — 防止已刪的紀錄被 pull 重新塞回本地）
  // 注意：簽單分頁是用「單號|序號」當複合主鍵，但 markDirty 用單號當 id
  const dirtySignWO = new Set();
  dirty.forEach(d => { 
    if (d.table === '簽單') {
      // 從複合 key 中取單號部分（upsert 跟 delete 都要保護）
      const no = String(d.id||'').split('|')[0];
      if (no) dirtySignWO.add(no);
    }
  });
  
  Object.entries(groupedByNo).forEach(([no, rows]) => {
    if (dirtySignWO.has(no)) { stats.skipped++; return; }
    
    // 排序：依序號
    rows.sort((a,b) => Number(a['序號']||0) - Number(b['序號']||0));
    const masterRow = rows[0];
    
    // 從主檔列讀
    const completionDate = String(masterRow['完成日期']||'').trim();
    const status = completionDate ? '完成' : '待辦';
    
    // 把明細列轉回 APP 的工作明細 JSON
    const detailsList = [];
    rows.forEach(r => {
      const typeLabel = String(r['類型']||'').trim();
      if (!typeLabel) return; // 完全空白的行（沒明細的占位列）
      
      const _k = {'施工':'con','維修':'repair','租賃':'rental','外務':'misc','材料':'material','其他':'other'}[typeLabel];
      if (!_k) return;
      
      if (_k === 'rental') {
        const svcType = String(r['服務類型']||'').trim();
        const isRent = svcType === '月租金' || String(r['品名']||'') === '月租金';
        const isDep  = svcType === '押金' || String(r['品名']||'') === '押金';
        // 同單號內若已有 rental row → 合併（同筆 rental 同時有租金跟押金）
        let existingRental = detailsList.find(d => d._k === 'rental' && (d.model||'') === (r['機型']||'') && (d.serial||'') === (r['機號']||''));
        if (!existingRental) {
          existingRental = { _k:'rental', id:'r'+Math.random().toString(36).slice(2,8), model:r['機型']||'', serial:r['機號']||'', hasRent:false, rentAmt:'', rentTax:false, hasDeposit:false, depositAmt:'', rentFrom:'', rentTo:'' };
          detailsList.push(existingRental);
        }
        if (isRent) {
          existingRental.hasRent = true;
          existingRental.rentAmt = String(r['金額']||'');
          existingRental.rentTax = !!r['含稅'];
          existingRental.rentFrom = String(r['租期起']||'');
          existingRental.rentTo = String(r['租期迄']||'');
        }
        if (isDep) {
          existingRental.hasDeposit = true;
          existingRental.depositAmt = String(r['金額']||'');
        }
      } else if (_k === 'repair') {
        // 同單號同機型機號的維修 → 合併到同一筆，items 累加
        let existingRep = detailsList.find(d => d._k === 'repair' && (d.model||'') === (r['機型']||'') && (d.serial||'') === (r['機號']||''));
        if (!existingRep) {
          existingRep = { _k:'repair', id:'r'+Math.random().toString(36).slice(2,8), model:r['機型']||'', serial:r['機號']||'', equipType:'', items:[] };
          detailsList.push(existingRep);
        }
        existingRep.items.push({ id:'i'+Math.random().toString(36).slice(2,8), name:String(r['品名']||''), amount:String(r['金額']||''), tax:!!r['含稅'] });
      } else {
        // 施工/外務/材料/其他：一行一筆
        const detail = {
          _k, id:'r'+Math.random().toString(36).slice(2,8),
          serviceType: String(r['服務類型']||''),
          model: String(r['機型']||''),
          serial: String(r['機號']||''),
          name: String(r['品名']||''),
          desc: String(r['品名']||''),
          miscType: String(r['服務類型']||''),
          qty: String(r['數量']||''),
          amount: String(r['金額']||''),
          tax: !!r['含稅'],
          dir: '裝',
          dai: false,
          newModel:'', newSerial:'', oldModel:'', oldSerial:'',
        };
        detailsList.push(detail);
      }
    });
    
    const existing = workOrders.find(w => w['單號'] === no);
    const woData = {
      '單號': no,
      '狀態': status,
      '客戶名稱': String(masterRow['客戶名稱']||''),
      '紀錄日期': String(masterRow['紀錄日期']||''),
      '完成日期': completionDate,
      '執行人員': String(masterRow['執行人員']||'').split(/[,、\s]+/).filter(Boolean),
      '工作明細': JSON.stringify(detailsList),
      '總金額': String(masterRow['總金額']||''),
      '收款方式': String(masterRow['收款方式']||''),
      '付款狀態': String(masterRow['付款狀態']||''),
      '收款日期': String(masterRow['收款日期']||''),
      '備註': String(masterRow['備註']||''),
    };
    
    if (existing) {
      // 保留本地的電話 / 地址 / 簽章（試算表沒這些欄位）
      Object.assign(existing, woData);
      stats.updated++;
    } else {
      workOrders.push({
        ...woData,
        '電話': [],
        '地址': [],
      });
      stats.added++;
    }
  });
  localStorage.setItem('tk_work', JSON.stringify(workOrders));
  
  // ── 5. 收款 → tk_pay ──
  const payRaw = localStorage.getItem('tk_pay') || '[]';
  let payments = [];
  try { payments = JSON.parse(payRaw); } catch{}
  if (!Array.isArray(payments)) payments = [];
  
  const sheetPay = sheets['收款'] || [];
  const dirtyPayNos = dirtyIds['收款'] || new Set();
  sheetPay.forEach(row => {
    const no = String(row['單號']||'').trim();
    if (!no) return;
    if (dirtyPayNos.has(no)) { stats.skipped++; return; }
    
    const existing = payments.find(p => p['單號'] === no);
    const newRec = {
      '單號': no,
      '客戶名稱': String(row['客戶名稱']||''),
      '服務日期': String(row['服務日期']||''),
      '應收金額': String(row['應收金額']||''),
      '付款狀態': String(row['付款狀態']||'未付'),
      '收款方式': String(row['收款方式']||''),
      '收款日期': String(row['收款日期']||''),
      '請款單號': String(row['請款單號']||''),
      '備註': String(row['備註']||''),
    };
    if (existing) { Object.assign(existing, newRec); stats.updated++; }
    else { payments.push(newRec); stats.added++; }
  });
  localStorage.setItem('tk_pay', JSON.stringify(payments));
  
  // ── 6. 合約 → tk_contracts ──
  const conRaw = localStorage.getItem('tk_contracts') || '[]';
  let contracts = [];
  try { contracts = JSON.parse(conRaw); } catch{}
  if (!Array.isArray(contracts)) contracts = [];
  
  const sheetCon = sheets['合約'] || [];
  const dirtyConIds = dirtyIds['合約'] || new Set();
  sheetCon.forEach(row => {
    const id = String(row['合約ID']||row['合約號']||'').trim();
    if (!id) return;
    if (dirtyConIds.has(id)) { stats.skipped++; return; }
    
    // 從「狀態」反推合約類型：
    //   租送機/已期滿/已解約 → 'rentSend'
    //   出租中/已退租 → 'rental'
    //   待簽/已簽（老資料）/空 → 保留本地既有值（找不到就 'rental'）
    const status = String(row['狀態']||'').trim();
    const existing = contracts.find(c => (c['合約號']||c.id) === id);
    let ctType;
    if (status === '租送機' || status === '已期滿' || status === '已解約') {
      ctType = 'rentSend';
    } else if (status === '出租中' || status === '已退租') {
      ctType = 'rental';
    } else {
      // 待簽 / 老資料的「已簽」 / 空 → 用本地原值（沒有就 rental）
      ctType = existing?.contractType || 'rental';
    }
    
    // 完整欄位映射
    // 乙方簽章：試算表上存的是 data URL (data:image/...)；本地的 partyBSig 也是 data URL。
    //   - 試算表有值 → 同步到本地 (跨裝置都能看到簽名)
    //   - 試算表空 → 保留本地原值 (避免覆蓋掉還沒推上去的)
    const sheetSig = String(row['乙方簽章URL']||'').trim();
    const partyBSig = sheetSig && sheetSig !== '(待上傳)' ? sheetSig : (existing?.partyBSig || '');
    const fields = {
      '合約號': id,
      contractType: ctType,
      '狀態': row['狀態']||'',
      '建立日期': row['建立日期']||'',
      signedDate: row['簽立日期']||'',
      storeName: row['客戶名稱']||'',
      brand: row['廠牌']||'',
      model: row['機型']||'',
      serialNo: row['機號']||'',
      capacity: row['磅數'] ? String(row['磅數'])+'磅' : '',
      startDate: row['起租日']||'',
      installCompletionDate: row['裝機完成日']||'',
      lastBilledTo: row['上次計費迄日']||'',
      rentAmt: row['月租金']||'',
      depositAmt: row['押金']||'',
      payDay: row['繳租日']||'',
      payMethod: row['付款方式']||'',
      bankAccount: row['匯款帳號']||'',
      terminatedDate: row['終止日期']||'',
      pdfUrl: row['PDF URL']||'',
      note: row['備註']||'',
      partyBSig,
    };
    
    if (existing) {
      Object.assign(existing, fields);
      stats.updated++;
    } else {
      contracts.push({ ...fields, id });
      stats.added++;
    }
  });
  localStorage.setItem('tk_contracts', JSON.stringify(contracts));
  
  // ── 7. 職員名單 ──
  if (sheets['職員名單']) {
    const cur = getCompany();
    setCompany({...cur, staff: sheets['職員名單']});
  }
  
  return stats;
}

// ── SyncPage：同步管理頁 ──────────────────────────────────────────
function SyncPage(){
  const [co, setCo] = useState(getCompany());
  const [syncState, setSyncStateLocal] = useState(getSyncState());
  const [busy, setBusy] = useState(false);
  const [log, setLog] = useState([]);
  const [syncTesting, setSyncTesting] = useState(false);
  
  const refresh = () => {
    setCo(getCompany());
    setSyncStateLocal(getSyncState());
  };

  const upd = (k, v) => {
    const cur = getCompany();
    const next = {...cur, [k]: v};
    setCompany(next);
    setCo(next);
  };

  const fmtTime = iso => {
    if(!iso) return '從未同步';
    try { const d = new Date(iso); return d.toLocaleString('zh-TW'); } catch { return iso; }
  };

  const doFullSync = async () => {
    if(!co.appsScriptUrl) { showToast('請先填入 Apps Script URL','error'); return; }
    setBusy(true);
    setLog(l=>['→ 開始同步…',...l]);
    try {
      // 1. 推送 dirty queue + 既有資料
      const pushResult = await pushToSheet('upsert');
      const sum = pushResult.summary||{};
      let totalAdd = 0, totalUpd = 0;
      Object.values(sum).forEach(s=>{ totalAdd+=(s.added||s.appended||0); totalUpd+=(s.updated||0); });
      
      let totalDel = 0;
      const delResult = pushResult.deleteResult||{};
      Object.values(delResult).forEach(s=>{ if(typeof s === 'object') totalDel+=(s.deleted||0); });
      
      const delMsg = totalDel > 0 ? `、刪除 ${totalDel}` : '';
      setLog(l=>[`✓ 推送：新增 ${totalAdd}、更新 ${totalUpd}${delMsg}`,...l]);
      
      // 2. 拉取試算表所有資料（雙向同步）
      setLog(l=>['→ 拉取試算表…',...l]);
      const pullStats = await pullFromSheet();
      setLog(l=>[`✓ 拉取：新增 ${pullStats.added}、更新 ${pullStats.updated}${pullStats.skipped>0?`、跳過 ${pullStats.skipped}`:''}`,...l]);
      
      showToast(`✓ 同步完成`,'success');
      refresh();
    } catch(e){
      setLog(l=>[`✗ 失敗：${e.message}`,...l]);
      showToast('同步失敗：'+e.message,'error');
    }
    setBusy(false);
  };
  
  const doPullStaff = async () => {
    if(!co.appsScriptUrl) { showToast('請先設定 Apps Script URL','error'); return; }
    setBusy(true);
    setLog(l=>['→ 拉取職員名單…',...l]);
    try {
      const staff = await pullStaffFromSheet();
      setLog(l=>[`✓ 取得 ${staff.length} 位職員`,...l]);
      showToast(`✓ 已拉取 ${staff.length} 位職員`,'success');
      refresh();
    } catch(e){
      setLog(l=>[`✗ 失敗：${e.message}`,...l]);
      showToast('拉取失敗：'+e.message,'error');
    }
    setBusy(false);
  };

  const testConn = async () => {
    if(!co.appsScriptUrl) { showToast('請先填入 Apps Script URL','error'); return; }
    setSyncTesting(true);
    try {
      const resp = await fetch(co.appsScriptUrl, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({mode:'ping'})});
      const txt = await resp.text();
      if (txt.includes('pong')||resp.ok) showToast('✓ 連線成功','success');
      else showToast('連線失敗：'+txt.slice(0,80),'error');
    } catch(e){ showToast('連線失敗：'+(e.message||'').slice(0,80),'error'); }
    setSyncTesting(false);
  };

  const dirty = syncState.dirty||[];
  const lbl = {fontSize:11,fontWeight:700,color:'#555',letterSpacing:'0.05em',display:'block',marginBottom:4};
  const si = {width:'100%',background:'#1a1a1a',border:'1px solid #2e2e2e',borderRadius:8,padding:'10px 12px',color:'#ccc',fontSize:13,outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:12};

  return (
    <div style={{height:'100%',overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
      <div style={{maxWidth:560,margin:'0 auto',padding:'16px 16px 80px'}}>
      {/* 設定區塊 */}
      <div style={{background:'#111',borderRadius:12,padding:'18px',border:'1px solid #222',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:800,color:'#888',letterSpacing:'.08em',marginBottom:14}}>⚙️ 同步設定</div>
        <label style={lbl}>Apps Script URL</label>
        <input value={co.appsScriptUrl||''} onChange={e=>upd('appsScriptUrl',e.target.value)} style={si} placeholder="https://script.google.com/macros/s/.../exec"/>
        <label style={lbl}>Drive 資料夾 ID（選填，存放 PDF 與簽章）</label>
        <input value={co.driveFolderId||''} onChange={e=>upd('driveFolderId',e.target.value)} style={si} placeholder="1abc...xyz（從資料夾網址複製）"/>

        <button onClick={testConn} disabled={syncTesting||!co.appsScriptUrl}
          style={{width:'100%',padding:'10px',background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:8,color:'#60a5fa',fontSize:12,fontWeight:700,cursor:(syncTesting||!co.appsScriptUrl)?'not-allowed':'pointer',fontFamily:'inherit',opacity:syncTesting?.5:1}}>
          {syncTesting?'測試中…':'🔌 測試連線'}
        </button>
      </div>

      {/* 同步狀態 + 動作 */}
      <div style={{background:'#111',borderRadius:12,padding:'18px',border:'1px solid #222',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:800,color:'#888',letterSpacing:'.08em',marginBottom:14}}>☁️ 同步狀態</div>
        
        {!co.appsScriptUrl && <div style={{padding:'10px 12px',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:7,fontSize:12,color:'#fbbf24',marginBottom:14}}>
          ⚠️ 請先在上方填入 Apps Script URL
        </div>}
        
        <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #222',fontSize:12}}>
          <span style={{color:'#888'}}>上次同步</span>
          <span style={{color:'#ccc'}}>{fmtTime(syncState.lastSyncAt)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:dirty.filter(d=>d.op==='delete').length>0?'1px solid #222':'none',fontSize:12}}>
          <span style={{color:'#888'}}>待同步筆數</span>
          <span style={{color:dirty.length>0?'#fbbf24':'#666',fontWeight:dirty.length>0?700:400}}>{dirty.length}</span>
        </div>
        {(dirty.filter(d=>d.op==='delete').length>0)&&<div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',fontSize:12}}>
          <span style={{color:'#888'}}>　└ 待刪除</span>
          <span style={{color:'#f87171',fontWeight:700}}>{dirty.filter(d=>d.op==='delete').length}</span>
        </div>}
        
        {dirty.length>0 && <details style={{marginTop:8}}>
          <summary style={{fontSize:11,color:'#666',cursor:'pointer',padding:'6px 0',userSelect:'none'}}>查看待同步明細</summary>
          <div style={{background:'#0a0a0a',borderRadius:6,padding:'8px 10px',marginTop:4,maxHeight:200,overflowY:'auto',fontSize:10,fontFamily:'monospace'}}>
            {dirty.map((d,i)=>(
              <div key={i} style={{padding:'2px 0',color:d.op==='delete'?'#f87171':'#888'}}>
                {d.op==='delete'?'✗':'•'} {d.table} / {d.id}
              </div>
            ))}
          </div>
        </details>}

        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:14}}>
          <button onClick={doFullSync} disabled={busy||!co.appsScriptUrl}
            style={{padding:'12px',background:co.appsScriptUrl?'linear-gradient(135deg,#dc2626,#991b1b)':'#222',border:'none',borderRadius:9,color:'#fff',fontSize:14,fontWeight:800,cursor:(busy||!co.appsScriptUrl)?'not-allowed':'pointer',fontFamily:'inherit',opacity:busy?.5:1}}>
            {busy?'同步中…':'☁️ 立即同步'}
          </button>
          <button onClick={async ()=>{
            if(!co.appsScriptUrl) { showToast('請先填入 Apps Script URL','error'); return; }
            if(!window.confirm('將比對試算表與本地資料，把試算表上「本地不存在」的列刪掉。確認執行？')) return;
            setBusy(true);
            setLog(l=>['→ 強制清理：拉取試算表…',...l]);
            try {
              // 1. 拉取試算表全部資料
              const resp = await fetch(co.appsScriptUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({mode:'pullAll'})});
              const result = await resp.json();
              if(!result.ok) throw new Error(result.error||'pullAll failed');
              const sheets = result.data||{};
              // 2. 比對本地資料
              const ls = (k,def='[]')=>{try{return JSON.parse(localStorage.getItem(k)||def);}catch{return JSON.parse(def);}};
              const crm = ls('crm_v3','{"stores":[],"companies":[],"persons":[]}');
              const machData = ls('machines_v1','{"machines":[]}');
              const quote = ls('quotation_v1','{"iceMachines":[],"parts":[],"repairs":[]}');
              const workOrders = ls('tk_work','[]');
              const contracts = ls('tk_contracts','[]');
              const payment = ls('tk_pay','[]');
              const localIds = {
                '簽單': new Set(workOrders.map(w=>String(w['單號']||'').trim()).filter(Boolean)),
                '合約': new Set(contracts.map(c=>String(c['合約號']||'').trim()).filter(Boolean)),
                '客戶資料': new Set((crm.stores||[]).map(s=>String(s.name||'').trim()).filter(Boolean)),
                '客戶公司': new Set((crm.companies||[]).map(c=>String(c.id||('C'+(c.title||'').slice(0,4))).trim()).filter(Boolean)),
                '聯絡人': new Set((crm.persons||[]).filter(p=>{
                  const linked = (crm.stores||[]).some(s=>(s.personIds||[]).includes(p.id)) || (crm.companies||[]).some(c=>(c.personIds||[]).includes(p.id));
                  return linked;
                }).map(p=>String(p.id).trim()).filter(Boolean)),
                '機器清單': new Set((machData.machines||[]).map(m=>String(m['機號']||m.serialNo||'').trim()).filter(Boolean)),
                '材料 報價': new Set((quote.parts||[]).map(p=>String(p.name||'').trim()).filter(Boolean)),
                '維修 報價': new Set((quote.repairs||[]).map(r=>String(r.name||'').trim()).filter(Boolean)),
                '收款': new Set((payment||[]).map(p=>String(p['單號']||'').trim()).filter(Boolean)),
              };
              const compositeIce = new Set((quote.iceMachines||[]).map(q=>(String(q.brand||'').trim()+'|'+String(q.model||'').trim())).filter(s=>s!=='|'));

              // 3. 找出多餘的 ID
              const orphans = [];
              const pkOf = {'客戶公司':'公司ID','客戶資料':'客戶名稱','聯絡人':'聯絡人ID','機器清單':'機號','合約':'合約ID','材料 報價':'名稱','維修 報價':'名稱','收款':'單號'};
              ['客戶公司','客戶資料','聯絡人','機器清單','合約','材料 報價','維修 報價','收款'].forEach(tbl=>{
                const rows = sheets[tbl]||[];
                const seen = new Set();
                rows.forEach(r=>{
                  const id = String(r[pkOf[tbl]]||'').trim();
                  if(!id || seen.has(id)) return;
                  seen.add(id);
                  if(!localIds[tbl].has(id)) orphans.push({table:tbl,id});
                });
              });
              // 簽單：用單號去重
              const sheetSignNos = new Set();
              (sheets['簽單']||[]).forEach(r=>{
                const no = String(r['單號']||'').trim();
                if(no) sheetSignNos.add(no);
              });
              sheetSignNos.forEach(no=>{ if(!localIds['簽單'].has(no)) orphans.push({table:'簽單',id:no}); });
              // 製冰機報價：複合鍵
              (sheets['製冰機 報價']||[]).forEach(r=>{
                const k = String(r['廠牌']||'').trim()+'|'+String(r['機型']||'').trim();
                if(k!=='|' && !compositeIce.has(k)) orphans.push({table:'製冰機 報價',id:k});
              });

              setLog(l=>[`→ 找到 ${orphans.length} 筆試算表多餘列`,...l]);
              if(orphans.length===0){ showToast('試算表沒有多餘資料','success'); setBusy(false); return; }

              // 4. 送出刪除請求
              setLog(l=>['→ 送出刪除指令…',...l]);
              const delResp = await fetch(co.appsScriptUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({mode:'upsert',data:{},deletes:orphans})});
              const delResult = await delResp.json();
              console.log('[強制清理] 結果',delResult);
              let totalDel = 0;
              Object.values(delResult.deleteResult||{}).forEach(s=>{if(typeof s==='object')totalDel+=(s.deleted||0);});
              setLog(l=>[`✓ 完成：實際刪除 ${totalDel} 筆`,...l]);
              showToast(`✓ 已清除 ${totalDel} 筆多餘列`,'success');
            } catch(e){
              setLog(l=>[`✗ 失敗：${e.message}`,...l]);
              showToast('清理失敗：'+e.message,'error');
            }
            setBusy(false);
          }} disabled={busy||!co.appsScriptUrl}
            style={{padding:'10px',background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,color:'#fbbf24',fontSize:12,fontWeight:700,cursor:(busy||!co.appsScriptUrl)?'not-allowed':'pointer',fontFamily:'inherit',opacity:busy?.5:1}}>
            🧹 強制清理試算表多餘列
          </button>
        </div>
      </div>

      {log.length>0 && <div style={{background:'#0a0a0a',borderRadius:10,padding:'12px',border:'1px solid #1a1a1a',fontSize:11,fontFamily:'monospace',color:'#888'}}>
        <div style={{fontSize:10,fontWeight:700,color:'#666',marginBottom:6,letterSpacing:'.08em'}}>同步紀錄</div>
        {log.slice(0,30).map((l,i)=><div key={i} style={{padding:'2px 0',color:l.startsWith('✓')?'#5eead4':l.startsWith('✗')?'#f87171':l.startsWith('  [server]')?'#666':'#888',fontSize:l.startsWith('  [server]')?10:11}}>{l}</div>)}
      </div>}
      </div>
    </div>
  );
}

function App() {
  // 一次性資料遷移：轉帳 → 匯款
  React.useEffect(() => { migrateTransferToRemittance(); }, []);
  
  const [tab, setTab]               = React.useState("sign");
  const [currentUser, setCurrentUser] = React.useState(()=>getAuth());
  
  // 自動背景同步：登入後立刻拉一次、之後每 5 分鐘 push+pull

    if(!currentUser) return;
    const co = getCompany();
    if(!co.appsScriptUrl) return; // 沒設 URL → 不同步
    
    const tick = async (isInitial) => {
      // 用 _syncing 全域鎖避免跟 scheduleSync 衝突；若進行中就排稍後重試
      if (window._syncing) {
        console.log('[自動同步] 偵測到其他同步進行中，跳過此次');
        return;
      }
      window._syncing = true;
      try {
        // 推送 dirty queue（含 delete 指令）
        const s = getSyncState();
        const dirty = s.dirty||[];
        if (dirty.length > 0 || isInitial) {
          await pushToSheet('upsert');
        }
        // 拉取試算表更新到本地
        await pullFromSheet();
        console.log('[自動同步] 完成', new Date().toISOString());
        // 通知 UI 重新讀資料
        try { window.dispatchEvent(new CustomEvent('tk-sync-done')); } catch{}
        // 若 push 完還有待刪資料 → 排重試
        try {
          const after = getSyncState();
          if ((after.dirty||[]).some(d => d.op === 'delete')) {
            console.log('[自動同步] 仍有待刪資料 → 10 秒後重試');
            setTimeout(()=>scheduleSync(0), 10000);
          }
        } catch{}
      } catch(e){
        console.warn('[自動同步] 失敗', e.message);
      } finally {
        window._syncing = false;
      }
    };
    
    const intervalId = setInterval(()=>tick(false), 5*60*1000);
    // 啟動 3 秒後先跑一次完整同步（含 pull）
    const initialId = setTimeout(()=>tick(true), 3000);
    
    return () => { clearInterval(intervalId); clearTimeout(initialId); };
  }, [currentUser]);

  React.useEffect(() => {

      try {
        const list = JSON.parse(localStorage.getItem('tk_contracts')||'[]');
        const co = getCompany();
        const rsMonths = parseInt(co.rentSendMonths||24);
        const today = new Date(); today.setHours(0,0,0,0);
        let changed = false;
        const newList = list.map(c => {
          if (c.contractType !== 'rentSend') return c;
          if (c['狀態'] !== '租送機') return c;
          if (!c.startDate) return c;
          // 計算到期日
          const sd = new Date(String(c.startDate).replace(/\//g,'-'));
          if (isNaN(sd.getTime())) return c;
          const expireDate = new Date(sd);
          expireDate.setMonth(expireDate.getMonth() + rsMonths);

            changed = true;

            return { ...c, '狀態': '已期滿' };
          }
          return c;
        });

  // 批次收款：把多張未收簽單一次標為付清，並產生對應的多筆收款紀錄
  const handleBatchCollect = React.useCallback(async (selectedItems, method, date, note) => {
    // 1. 更新每張簽單為付清
    const ids = new Set(selectedItems.map(w => w['單號']));
    const newWorks = workOrders.map(w => 
      ids.has(w['單號']) 
        ? {...w, '付款狀態':'付清', '收款方式':method, '收款日期':date}
        : w
    );
    setWorkOrders(newWorks);
    lsSet('tk_work', newWorks);
    
    // 2. 對應的收款紀錄改為付清（用「單號」對應）
    // 同時：若被收款的是請款單，連帶把對應的來源簽單也標記付清
    const cascadedNos = new Set();
    (payment||[]).forEach(p => {
      if (ids.has(p['請款單號'])) {
        // 這筆 p 是「被請款」的紀錄，請款單號 ∈ ids 表示請款單剛剛被收清
        cascadedNos.add(p['單號']);
      }
    });
    
    const allPaidNos = new Set([...ids, ...cascadedNos]);
    const newPayList = payment.map(p => 
      allPaidNos.has(p['單號'])
        ? {...p, '付款狀態':'付清', '收款方式':method, '收款日期':date, '備註': note||p['備註']||''}
        : p
    );
    setPayment(newPayList);
    lsSet('tk_pay', newPayList);
    
    // 連帶更新來源簽單（tk_work）的付款狀態
    if (cascadedNos.size > 0) {
      const cascadedWorks = newWorks.map(w =>
        cascadedNos.has(w['單號'])
          ? {...w, '付款狀態':'付清', '收款方式':method, '收款日期':date}
          : w
      );
      setWorkOrders(cascadedWorks);
      lsSet('tk_work', cascadedWorks);
    }

    try {
      ids.forEach(id => {
        markDirty('簽單', id, 'upsert');
        markDirty('收款', id, 'upsert');
      });
      cascadedNos.forEach(id => {

  const handleBilling = React.useCallback(async (customer, selectedItems) => {
    if(!selectedItems || selectedItems.length===0) return;
    const billingRows = selectedItems.map(w => ({
      _k: 'billing',
      id: 'r' + Math.random().toString(36).slice(2,8),
      refSerial: w['單號']||'',
      refDate: w['完成日期']||w['紀錄日期']||'',
      refSummary: summarizeWorkRows(w['工作明細']) || (w['備註']||''),
      refCustomer: w['客戶名稱']||'',
      amount: String(w['總金額']||0),
    }));

    // 抓 phones / addresses：若客戶是公司，從 CRM 合併底下所有店家的資訊
    let phones = [], addresses = [];
    try {
      const crm = JSON.parse(localStorage.getItem('crm_v3')||'{}');
      const company = (crm.companies||[]).find(c => (c.title||c['公司名稱'])===customer);
      const store   = (crm.stores||[]).find(s => (s.name||s['店家名稱'])===customer);
      if(company){
        const sisters = (crm.stores||[]).filter(s => s.companyId===company.id);
        phones    = [...new Set(sisters.flatMap(s => parseArr(s.phones||s['電話'])).filter(Boolean))];
        addresses = [...new Set(sisters.flatMap(s => parseArr(s.address||s['地址'])).filter(Boolean))];
      } else if(store){
        phones    = parseArr(store.phones||store['電話']).filter(Boolean);
        addresses = parseArr(store.address||store['地址']).filter(Boolean);
      }
    } catch{}
    // 兜底：從第一張被引用的簽單拿
    const first = selectedItems[0];
    if(phones.length===0)    phones    = parseArr(first?.['電話']).filter(Boolean);
    if(addresses.length===0) addresses = parseArr(first?.['地址']).filter(Boolean);

    setSignPrefill({
      customer,
      phones,
      addresses,
      rows: billingRows,
    });
    setEditRecord(null);
    setSignOpen(true);
    setTab('sign');
    showToast(`已預填 ${selectedItems.length} 張請款明細，請確認後送出`, 'info');
  }, []);

          note:'',schedTime:'',status:'已完成',doneDate:completed['完成日期'],handler:(parseArr(rec['執行人員'])||[]).join('、')
        },...(all.construction||[])];
        await storeHelper.set('journal_v1',JSON.stringify(all));
      }
      if(repRows.length>0){
        const cd = await storeHelper.get('journal_v1');
        const all = cd?.value?JSON.parse(cd.value):{construction:[],repair:[],misc:[]};
        all.repair = [{
          id:'R'+Date.now().toString(36),repairId:rec['單號'],
          logDate:completed['完成日期'],customer:cust,
          model:repRows[0]?.model||'',serialNo:repRows[0]?.serial||'',
          category:repRows[0]?.equipType||'',
          repairItems:repRows.flatMap(r=>(r.items||[]).map(it=>({id:Math.random().toString(36).substr(2,8),text:it.name}))),
          handler:(parseArr(rec['執行人員'])||[]).join('、'),status:'已完成',doneDate:completed['完成日期']
        },...(all.repair||[])];
        await storeHelper.set('journal_v1',JSON.stringify(all));
      }
      if(miscRows.length>0){
        const cd = await storeHelper.get('journal_v1');
        const all = cd?.value?JSON.parse(cd.value):{construction:[],repair:[],misc:[]};
        all.misc = [{
          id:'M'+Date.now().toString(36),miscId:rec['單號'],
          logDate:completed['完成日期'],customer:cust,
          workItems:miscRows.map(r=>({id:Math.random().toString(36).substr(2,8),workType:r.miscType,desc:r.name,qty:r.qty})),
          note:'',schedTime:'',handler:(parseArr(rec['執行人員'])||[]).join('、'),status:'已完成',doneDate:completed['完成日期']
        },...(all.misc||[])];
        await storeHelper.set('journal_v1',JSON.stringify(all));
      }

    // 連動更新機器與合約（與 SignForm 完成路徑同步）
    try {
      await syncStateFromSignRows({
        customer: rec['客戶名稱']||'',
        completionDate: completed['完成日期']||'',

  const handleUpdatePay = React.useCallback(async (serial, type, status, method) => {
    if(type==='工務'){
      // 找出這張單裡的請款明細所引用的單號（cascade 連動付清用）
      const recBefore = workOrders.find(r=>r['單號']===serial);
      const billingRefs = (() => {
        if(!recBefore || status!=='付清') return [];
        const rs = parseArr(recBefore['工作明細'])||[];
        return rs.filter(r=>r._k==='billing' && r.refSerial).map(r=>r.refSerial);
      })();
      const cascadeSet = new Set(billingRefs);

      let l=workOrders.map(r=>{
        if(r['單號']===serial) return {...r,付款狀態:status,收款方式:method,收款日期:status==='付清'?todayStr():(r['收款日期']||'')};
        if(cascadeSet.has(r['單號'])) return {...r,付款狀態:'付清',收款方式:method,收款日期:todayStr()};
        return r;
      });
      setWorkOrders(l);lsSet('tk_work',l);
      try { markDirty('簽單', serial, 'upsert'); } catch{}
      cascadeSet.forEach(no => { try { markDirty('簽單', no, 'upsert'); } catch{} });
      // 改為付清時：產生 / 更新收款紀錄
      const rec=workOrders.find(r=>r['單號']===serial);
      if(rec && status==='付清' && (rec['付款狀態']||'未付')!=='付清'){
        // 用 upsertPayment 確保「單號」唯一（已存在就更新、沒有就新增）
        const payRec = {
          '單號': serial,
          '客戶名稱': rec['客戶名稱']||'',
          '服務日期': rec['完成日期']||rec['紀錄日期']||todayStr(),
          '應收金額': String(rec['總金額']||''),
          '付款狀態': '付清',
          '收款方式': method,
          '收款日期': todayStr(),
          '請款單號': '',
          '備註': '',
        };
        const idx = payment.findIndex(p => p['單號'] === serial);
        let np = idx >= 0
          ? payment.map((p,i) => i === idx ? {...p, ...payRec} : p)
          : [payRec, ...payment];
        // cascade：被請款引用的單號也連動更新收款紀錄
        if(cascadeSet.size > 0){
          np = np.map(p => cascadeSet.has(p['單號'])
            ? {...p, '付款狀態':'付清', '收款方式':method, '收款日期':todayStr(), '請款單號': serial}
            : p);
        }
        setPayment(np); lsSet('tk_pay', np);
        try { markDirty('收款', serial, 'upsert'); } catch{}
        cascadeSet.forEach(no => { try { markDirty('收款', no, 'upsert'); } catch{} });
        // 推進合約 lastBilledTo（自身 + cascade 到的租賃簽單）
        const cascadedRecs = [...cascadeSet].map(no => workOrders.find(r=>r['單號']===no)).filter(Boolean);
        advanceLastBilledTo([rec, ...cascadedRecs]);
      }
      return;
    }
    const isCon=type==='施工';
    const list=isCon?construction:maintenance;
    const setFn=isCon?setConstruction:setMaintenance;
    const newList=list.map(r=>r['單號']===serial?{...r,付款狀態:status,收款方式:method,收款日期:status==='付清'?todayStr():(r['收款日期']||'')}:r);
    setFn(newList); lsSet(isCon?'tk_con':'tk_maint',newList);
    try { markDirty('簽單', serial, 'upsert'); } catch{}
    const rec=list.find(r=>r['單號']===serial);
    if(rec && status==='付清' && (rec['付款狀態']||'未付')!=='付清'){
      const payRec = {
        '單號': serial,
        '客戶名稱': rec['客戶名稱']||'',
        '服務日期': rec['完成日期']||rec['紀錄日期']||todayStr(),
        '應收金額': String(rec['總金額']||''),

        '收款方式': method,
        '收款日期': todayStr(),
        '請款單號': '',
        '備註': '',
      };
      const idx = payment.findIndex(p => p['單號'] === serial);
      const np = idx >= 0
        ? payment.map((p,i) => i === idx ? {...p, ...payRec} : p)
        : [payRec, ...payment];

      try { markDirty('收款', serial, 'upsert'); } catch{}
    }

              <div style={{fontSize:10,color:'#666'}}>{currentUser.role==='admin'?'管理員':currentUser.role==='accounting'?'帳務員':'工程師'}</div>
            </div>
            <button onClick={handleLogout} style={{padding:'6px 12px',background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:6,color:'#f87171',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>登出</button>
          </div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {MORE_ITEMS.map(it=>(
              <button key={it.key} onClick={()=>{setTab(it.key);setDrawerOpen(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 10px',background:tab===it.key?'rgba(220,38,38,.12)':'#1a1a1a',border:`1px solid ${tab===it.key?'#dc2626':'#222'}`,borderRadius:10,color:tab===it.key?'#ef4444':'#555',cursor:'pointer'}}>
                <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={it.d}/></svg>
                <span style={{fontSize:12,fontWeight:700}}>{it.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
