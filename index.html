// 批次收款 Sheet
function BatchPaymentSheet({target, onClose, onConfirm}){
  const [selectedIds, setSelectedIds] = useState(()=>new Set(target.items.map(w=>w['單號'])));
  const [method, setMethod] = useState('現金');
  // 用 ISO 格式給 input[type=date]，提交時轉回 YYYY/MM/DD
  const [date, setDate] = useState(()=>{
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
  const [note, setNote] = useState('');
  const [busy, setBusy] = useState(false);

  const toggle = id => {
    const s = new Set(selectedIds);
    if (s.has(id)) s.delete(id); else s.add(id);
    setSelectedIds(s);
  };
  
  const selectedItems = target.items.filter(w => selectedIds.has(w['單號']));
  const sum = selectedItems.reduce((s,w)=>s+Number(w['總金額']||0),0);

  const submit = async () => {
    if (selectedItems.length === 0) { showToast('請至少選一筆','error'); return; }
    setBusy(true);
    try {
      // 把 ISO date (2026-05-04) 轉成系統用的 2026/05/04
      const dateStr = date ? date.replace(/-/g,'/') : todayStr();
      await onConfirm(selectedItems, method, dateStr, note);
    } catch(e) { showToast('失敗：'+(e.message||''),'error'); }
    setBusy(false);
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1a1a',border:'1px solid #333',borderRadius:'14px 14px 0 0',padding:'18px 18px 20px',width:'100%',maxWidth:520,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexShrink:0}}>
          <span style={{fontWeight:800,fontSize:15,color:'#eee'}}>💰 批次收款 — {target.customer}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        
        <div style={{fontSize:11,color:'#888',marginBottom:8,flexShrink:0}}>選擇要收的簽單：</div>
        
        <div style={{flex:1,overflowY:'auto',marginBottom:14,border:'1px solid #2a2a2a',borderRadius:8,background:'#0f0f0f'}}>
          {target.items.map(w=>{
            const sel = selectedIds.has(w['單號']);
            return (
              <div key={w['單號']} onClick={()=>toggle(w['單號'])}
                style={{padding:'10px 12px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',gap:10,cursor:'pointer',background:sel?'rgba(34,197,94,.08)':'transparent'}}>
                <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${sel?'#22c55e':'#444'}`,background:sel?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {sel&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:11,color:'#888',fontWeight:700}}>{w['單號']}</span>
                    <span style={{fontSize:11,color:'#666'}}>{fmtDate(w['完成日期']||w['紀錄日期'])}</span>
                  </div>
                  {(()=>{
                    const items = parseArr(w['工作明細']);
                    const types = [...new Set(items.map(it=>it._k||it.type).filter(Boolean))];
                    const typeLabels = {rental:'租賃',con:'施工',repair:'維修',misc:'外務',material:'材料',other:'其他',billing:'請款'};
                    return types.length>0 ? <div style={{fontSize:11,color:'#666',marginTop:2}}>{types.map(t=>typeLabels[t]||t).join(' · ')}</div> : null;
                  })()}
                </div>
                <div style={{fontWeight:800,fontSize:13,color:sel?'#22c55e':'#666',flexShrink:0}}>
                  NT$ {Number(w['總金額']||0).toLocaleString()}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{padding:'10px 12px',background:'#0a0a0a',borderRadius:8,marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,border:'1px solid #2a2a2a'}}>
          <span style={{fontSize:12,color:'#888'}}>已選 {selectedItems.length} / {target.items.length} 筆</span>
          <span style={{fontSize:15,fontWeight:900,color:'#22c55e'}}>共 NT$ {sum.toLocaleString()}</span>
        </div>

        <div style={{marginBottom:10,flexShrink:0}}>
          <label style={{display:'block',fontSize:10,color:'#888',marginBottom:4,fontWeight:700,letterSpacing:'.05em'}}>收款方式</label>
          <div style={{display:'flex',gap:5}}>
            {['現金','匯款','支票'].map(m=>(
              <button key={m} onClick={()=>setMethod(m)}
                style={{flex:1,padding:'8px',borderRadius:7,border:'1.5px solid',cursor:'pointer',borderColor:method===m?'#22c55e':'#333',background:method===m?'rgba(34,197,94,.15)':'transparent',color:method===m?'#22c55e':'#666',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>{m}</button>
            ))}
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:10,flexShrink:0}}>
          <div style={{flex:1}}>
            <label style={{display:'block',fontSize:10,color:'#888',marginBottom:4,fontWeight:700,letterSpacing:'.05em'}}>收款日期</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{width:'100%',padding:'8px 10px',background:'#0f0f0f',border:'1px solid #333',borderRadius:6,color:'#ccc',fontSize:13,outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
          </div>
        </div>

        <div style={{marginBottom:14,flexShrink:0}}>
          <label style={{display:'block',fontSize:10,color:'#888',marginBottom:4,fontWeight:700,letterSpacing:'.05em'}}>備註（選填）</label>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="如：5月份統一結算"
            style={{width:'100%',padding:'8px 10px',background:'#0f0f0f',border:'1px solid #333',borderRadius:6,color:'#ccc',fontSize:13,outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
        </div>

        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={onClose} style={{flex:1,padding:'12px',background:'#222',border:'1px solid #333',borderRadius:8,color:'#888',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>取消</button>
          <button onClick={submit} disabled={busy||selectedItems.length===0}
            style={{flex:2,padding:'12px',background:selectedItems.length>0?'linear-gradient(135deg,#dc2626,#991b1b)':'#333',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:selectedItems.length>0?'pointer':'not-allowed',fontFamily:'inherit',opacity:busy?.5:1}}>
            {busy?'處理中…':`💰 全部標為付清 (${selectedItems.length})`}
          </button>
        </div>
      </div>
    </div>
  );
}

// 收款清單 PDF 匯出
async function generatePaymentListPDF({customer, kind, items, isCompany, companyTitle}){
  const {jsPDF} = window.jspdf;
  const co = getCompany();
  const today = todayStr();
  
  const typeLabels = {rental:'租賃',con:'施工',repair:'維修',misc:'外務',material:'材料',other:'其他',billing:'請款'};
  
  // 計算總額
  const total = items.reduce((s,w)=>s+Number(w['總金額']||0),0);
  
  // HTML 模板（轉 PDF 用）
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;color:#000;padding:40px;font-family:"Microsoft JhengHei","PingFang TC",sans-serif;font-size:13px;line-height:1.5';
  
  let body = '';
  // 含稅小徽章
  const taxBadge = (tax) => tax ? ` <span style="display:inline-block;padding:1px 5px;background:#fef3c7;color:#92400e;font-size:9px;font-weight:700;border-radius:3px;margin-left:4px">含稅</span>` : '';
  
  items.forEach(w => {
    const detailItems = parseArr(w['工作明細']);
    const dateStr = fmtDate(w['完成日期']||w['紀錄日期']);
    const types = [...new Set(detailItems.map(it=>it._k||it.type).filter(Boolean))];
    const typeStr = types.map(t=>typeLabels[t]||t).join('/');
    const storeName = w['客戶名稱']||'';
    
    // 主列：公司模式多一欄「店家」（4 欄；非公司 3 欄）
    const colspan = isCompany ? 4 : 3;
    body += `<tr style="border-bottom:1px solid #ddd">
      <td style="padding:10px 8px;vertical-align:top;font-family:monospace;color:#666">${w['單號']||''}</td>
      <td style="padding:10px 8px;vertical-align:top">${dateStr}</td>` +
      (isCompany ? `<td style="padding:10px 8px;vertical-align:top;font-weight:700">${storeName}</td>` : '') +
      `<td style="padding:10px 8px;vertical-align:top;text-align:right;font-weight:700">$${Number(w['總金額']||0).toLocaleString()}</td>
    </tr>`;
    
    // 工作明細子列（縮排）
    detailItems.forEach(it => {
      const k = it._k || it.type;
      
      // 維修 — 有 items[]
      if (k === 'repair' || (Array.isArray(it.items) && it.items.length > 0 && k!=='misc' && k!=='material')) {
        if (it.equipType || it.model || it.serial || it.machine) {
          const mchInfo = [it.equipType, it.model, it.serial].filter(Boolean).join(' ') || it.machine || '';
          if (mchInfo) {
            body += `<tr style="background:#fafafa">
              <td colspan="${colspan}" style="padding:3px 8px 3px 32px;font-size:10px;color:#888">└─ 機器：${mchInfo}</td>
            </tr>`;
          }
        }
        (it.items||[]).forEach(si => {
          if (!si.name && !si.amount) return;
          body += `<tr style="background:#fafafa">
            <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ ${si.name||''}${taxBadge(si.tax)}</td>
            <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">${si.amount?'$'+Number(si.amount).toLocaleString():''}</td>
          </tr>`;
        });
        return;
      }
      
      // 施工
      if (k === 'con') {
        const lbl = [it.serviceType, it.model||it.newModel, it.serial||it.newSerial].filter(Boolean).join(' ') || '施工';
        body += `<tr style="background:#fafafa">
          <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ ${lbl}${taxBadge(it.tax)}</td>
          <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">${it.amount?'$'+Number(it.amount).toLocaleString():''}</td>
        </tr>`;
        return;
      }
      
      // 外務 / 材料
      if (k === 'misc' || k === 'material') {
        const name = it.name || (k==='misc'?(it.miscType||'外務'):'材料');
        const qtyStr = it.qty && Number(it.qty)>1 ? ` x${it.qty}` : '';
        body += `<tr style="background:#fafafa">
          <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ ${name}${qtyStr}${taxBadge(it.tax)}</td>
          <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">${it.amount?'$'+Number(it.amount).toLocaleString():''}</td>
        </tr>`;
        return;
      }
      
      // 其他
      if (k === 'other') {
        body += `<tr style="background:#fafafa">
          <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ ${it.desc||'其他'}${taxBadge(it.tax)}</td>
          <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">${it.amount?'$'+Number(it.amount).toLocaleString():''}</td>
        </tr>`;
        return;
      }
      
      // 租賃
      if (k === 'rental') {
        if (it.rentFrom || it.rentTo) {
          body += `<tr style="background:#fafafa">
            <td colspan="${colspan}" style="padding:3px 8px 3px 32px;font-size:10px;color:#888">└─ 租期：${it.rentFrom||'?'} ~ ${it.rentTo||'?'}</td>
          </tr>`;
        }
        if (it.hasRent && it.rentAmt) {
          body += `<tr style="background:#fafafa">
            <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ 租金${taxBadge(it.rentTax)}</td>
            <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">$${Number(it.rentAmt).toLocaleString()}</td>
          </tr>`;
        }
        if (it.hasDeposit && it.depositAmt) {
          body += `<tr style="background:#fafafa">
            <td colspan="${colspan-1}" style="padding:4px 8px 4px 32px;font-size:11px;color:#666">└─ 押金</td>
            <td style="padding:4px 8px;font-size:11px;color:#666;text-align:right">$${Number(it.depositAmt).toLocaleString()}</td>
          </tr>`;
        }
        return;
      }
    });
  });
  
  // 表頭
  const headerCols = isCompany 
    ? `<th style="padding:8px;text-align:left;font-size:11px;letter-spacing:1px">單號</th>
       <th style="padding:8px;text-align:left;font-size:11px;letter-spacing:1px">日期</th>
       <th style="padding:8px;text-align:left;font-size:11px;letter-spacing:1px">店家</th>
       <th style="padding:8px;text-align:right;font-size:11px;letter-spacing:1px">金額</th>`

       <th style="padding:8px;text-align:right;font-size:11px;letter-spacing:1px">金額</th>`;
  
  const colspanFooter = isCompany ? 3 : 2;
  
  // 副標題：公司模式列出旗下店家數
  const subtitle = isCompany 
    ? `<div style="font-size:11px;color:#666;margin-top:4px">公司：${companyTitle||customer}　涵蓋 ${new Set(items.map(w=>w['客戶名稱'])).size} 家店　共 ${items.length} 張簽單</div>`
    : '';
  
  div.innerHTML = `
    <div style="text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #000">
      <div style="font-size:18px;font-weight:900;letter-spacing:3px">${co.name||'統晉企業'}</div>
      <div style="font-size:14px;font-weight:700;margin-top:6px">收款清單 — ${customer}</div>
      <div style="font-size:11px;color:#666;margin-top:4px">區間：${kind}（截至 ${today}）</div>
      ${subtitle}
    </div>
    
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
      <thead>
        <tr style="border-bottom:2px solid #000;background:#f5f5f5">${headerCols}</tr>
      </thead>
      <tbody>${body}</tbody>
      <tfoot>
        <tr style="border-top:2px solid #000;font-weight:900;font-size:14px">
          <td colspan="${colspanFooter}" style="padding:12px 8px;text-align:right">合計</td>
          <td style="padding:12px 8px;text-align:right;color:${kind==='未收款'?'#dc2626':'#16a34a'}">$${total.toLocaleString()}</td>
        </tr>
      </tfoot>
    </table>
    
    <div style="margin-top:30px;padding-top:14px;border-top:1px solid #ddd;font-size:11px;color:#666;line-height:1.7">
      <div><strong>${co.name||''}</strong></div>
      ${co.tel?`<div>電話：${co.tel}　${co.mobile?'行動：'+co.mobile:''}</div>`:''}
      ${co.address?`<div>地址：${co.address}</div>`:''}
      ${co.bankAccount?`<div>匯款帳號：${co.bankAccount}</div>`:''}
      <div style="margin-top:10px;color:#999">列印日期：${today}</div>
    </div>
  `;
  
  document.body.appendChild(div);
  try {
    const canvas = await html2canvas(div, {scale:2, backgroundColor:'#fff', useCORS:true});
    const pdf = new jsPDF('p','mm','a4');
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();
    const imgH = canvas.height * pdfW / canvas.width;
    
    if (imgH <= pdfH) {
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92), 'JPEG', 0, 0, pdfW, imgH);
    } else {
      // 多頁
      let position = 0;
      while (position < imgH) {
        if (position > 0) pdf.addPage();
        pdf.addImage(canvas.toDataURL('image/jpeg',0.92), 'JPEG', 0, -position, pdfW, imgH);
        position += pdfH;
      }
    }
    
    const filename = `${customer}_${kind}_${today.replace(/\//g,'')}.pdf`;
    pdf.save(filename);
    showToast('✓ PDF 已產生','success');
  } finally {
    document.body.removeChild(div);
  }
}

// ── WorkItemList — sortable list of work items ────────────────────────────────
const WorkItemList = ({ items, onChange }) => {
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const onDragEnd = () => {
    if (dragIdx !== null && overIdx !== null && dragIdx !== overIdx) {
      const next = [...items];
      const [moved] = next.splice(dragIdx, 1);
      next.splice(overIdx, 0, moved);
      onChange(next);
    }
    setDragIdx(null); setOverIdx(null);
  };

  const addItem = () => onChange([...items, { id:uidJ(), workType:"裝機", model:"", serialNo:"", oldModel:"", oldSerial:"" }]);
  const removeItem = (i) => { if (items.length <= 1) return; onChange(items.filter((_,j) => j!==i)); };
  const updateItem = (i, val) => onChange(items.map((x,j) => j===i ? val : x));

  return (
    <div>
      {items.map((item, i) => (
        <WorkItemRow key={item.id} item={item} index={i} total={items.length}
          onUpdate={v => updateItem(i, v)}
          onRemove={() => removeItem(i)}
          onDragStart={() => setDragIdx(i)}
          onDragEnter={() => setOverIdx(i)}
          onDragEnd={onDragEnd}
          isDragging={dragIdx===i}
          isOver={overIdx===i && dragIdx!==i}
        />
      ))}
      <button onClick={addItem}
        style={{ display:"flex", alignItems:"center", gap:6, width:"100%", padding:"9px 14px", background:"#1a1a1a", border:"1px dashed #2e2e2e", borderRadius:8, color:"#555", fontSize:12, fontWeight:700, cursor:"pointer", marginBottom:12 }}>
        <IPlus s={13} /> 新增工作項目
      </button>
    </div>
  );
};

const MiscWorkItemRow = ({ item, index, total, onUpdate, onRemove, onDragStart, onDragEnter, onDragEnd, isDragging, isOver }) => {
  const clr = MISC_WORK_COLOR[item.workType] || "#888";
  return (
    <div draggable onDragStart={onDragStart} onDragEnter={onDragEnter} onDragEnd={onDragEnd} onDragOver={e=>e.preventDefault()}
      style={{ background:"#141414", borderRadius:10, marginBottom:8, border:`1px solid ${isOver?"#dc2626":"#2a2a2a"}`, opacity:isDragging?0.4:1 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px 8px" }}>
        <span style={{ ...SJ.iconBtn, color:"#333", cursor:"grab", flexShrink:0 }}><IHandle /></span>

        <select value={item.workType} onChange={e=>onUpdate({...item,workType:e.target.value})}
          style={{ ...SJ.sel, flex:1, color:clr, fontWeight:700, background:"#1e1e1e", border:`1px solid ${clr}44` }}>
          {MISC_WORK_TYPES.map(t=><option key={t} value={t} style={{color:MISC_WORK_COLOR[t]}}>{t}</option>)}
        </select>
        {total>1&&<button onClick={onRemove} style={{...SJ.iconBtn,color:"#555",flexShrink:0}}><IClose/></button>}
      </div>
    </div>
  );
};

const MiscWorkItemList = ({ items, onChange }) => {
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const onDragEnd = () => {
    if(dragIdx!==null&&overIdx!==null&&dragIdx!==overIdx){const next=[...items];const[m]=next.splice(dragIdx,1);next.splice(overIdx,0,m);onChange(next);}
    setDragIdx(null);setOverIdx(null);
  };
  const addItem = () => onChange([...items,{id:uidJ(),workType:"領貨"}]);
  const removeItem = i => {if(items.length<=1)return;onChange(items.filter((_,j)=>j!==i));};
  const updateItem = (i,val) => onChange(items.map((x,j)=>j===i?val:x));
  return (
    <div>
      {items.map((item,i)=>(
        <MiscWorkItemRow key={item.id} item={item} index={i} total={items.length}
          onUpdate={v=>updateItem(i,v)} onRemove={()=>removeItem(i)}
          onDragStart={()=>setDragIdx(i)} onDragEnter={()=>setOverIdx(i)} onDragEnd={onDragEnd}
          isDragging={dragIdx===i} isOver={overIdx===i&&dragIdx!==i} />
      ))}
      <button onClick={addItem} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"9px 14px",background:"#1a1a1a",border:"1px dashed #2e2e2e",borderRadius:8,color:"#555",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:12}}>
        <IPlus s={13}/> 新增工作項目
      </button>
    </div>
  );
};

              <button onClick={()=>copyText(item.miscId)} style={{...SJ.iconBtn,color:"#555",padding:2}}><ICopy/></button>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onEdit}   style={{...SJ.iconBtn,color:"#666",background:"#1a1a1a",borderRadius:8,padding:8}}><IEdit/></button>
            <button onClick={onDelete} style={{...SJ.iconBtn,color:"#dc2626",background:"#1a1a1a",borderRadius:8,padding:8}}><ITrash/></button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 20px 32px"}}>
          <DRow3 label="紀錄日期"   val={fmtDate(item.logDate)}/>
          <DRow3 label="希望處理時間" val={item.schedTime} color="#fb923c"/>
          <DRow3 label="備註"       val={item.note} color="#fb923c"/>
          <DRow3 label="指派人員"   val={item.handler}/>
          <DRow3 label="完成日期"   val={item.doneDate?fmtDate(item.doneDate):null} color="#4ade80"/>
          <div style={{margin:"14px 0"}}>
            {items.map((w,i)=>{const clr=MISC_WORK_COLOR[w.workType]||"#888";return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#181818",borderRadius:8,padding:"10px 14px",marginBottom:6,border:"1px solid #222"}}>
                <span style={{fontSize:11,color:"#444",width:18}}>{i+1}</span>
                <span style={{fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:20,background:clr+"22",border:`1px solid ${clr}44`,color:clr}}>{w.workType}</span>
              </div>
            );})}
          </div>
          <button onClick={onToggleDone} style={{width:"100%",padding:"10px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",border:"1px solid",
            ...(item.status===MISC_STATUS.DONE?{background:"#0a1f0f",borderColor:"#166534",color:"#4ade80"}:{background:"#1e1e1e",borderColor:"#2e2e2e",color:"#555"})}}>
            {item.status===MISC_STATUS.DONE?"✓ 已完成":"○ 待處理 — 點此標記完成"}
          </button>
        </div>
      </div>
    </div>
  );
};

// ConstructionApp
// ══════════════════════════════════════════════════════════════════════════════
function ConstructionApp() {
  const [records, setRecords]           = useState([]);
  const [repairRecords, setRepairRecords] = useState([]);
  const [miscRecords, setMiscRecords]   = useState([]);
  const [ready, setReady]               = useState(false);
  const [mainTab, setMainTab]           = useState("construction");
  const [view, setView]                 = useState("list");
  const [subTab, setSubTab]             = useState("pending");
  const [search, setSearch]             = useState("");
  const [editItem, setEditItem]         = useState(null);
  const [detailItem, setDetailItem]     = useState(null);
  const [delTarget, setDelTarget]       = useState(null);

  useEffect(() => {
    (async () => {
      try { const r = await storeHelper.get(JOURNAL_KEY); if (r?.value) { const d=JSON.parse(r.value); setRecords(d.construction||[]); setRepairRecords(d.repair||[]); setMiscRecords(d.misc||[]); } } catch {}
      setReady(true);
    })();
  }, []);

  const persist = useCallback(async (data) => {
    setRecords(data);
    try { const r=await storeHelper.get(JOURNAL_KEY); const all=r?.value?JSON.parse(r.value):{}; all.construction=data; await storeHelper.set(JOURNAL_KEY,JSON.stringify(all)); } catch {}
  }, []);
  const persistRepair = useCallback(async (data) => {
    setRepairRecords(data);
    try { const r=await storeHelper.get(JOURNAL_KEY); const all=r?.value?JSON.parse(r.value):{}; all.repair=data; await storeHelper.set(JOURNAL_KEY,JSON.stringify(all)); } catch {}
  }, []);
  const persistMisc = useCallback(async (data) => {
    setMiscRecords(data);
    try { const r=await storeHelper.get(JOURNAL_KEY); const all=r?.value?JSON.parse(r.value):{}; all.misc=data; await storeHelper.set(JOURNAL_KEY,JSON.stringify(all)); } catch {}
  }, []);

  const handleSave = (item) => { const nd=[...records]; const i=nd.findIndex(x=>x.id===item.id); if(i>=0)nd[i]=item;else nd.push(item); persist(nd); setView("list"); setEditItem(null); };
  const handleSaveRepair = (item) => { const nd=[...repairRecords]; const i=nd.findIndex(x=>x.id===item.id); if(i>=0)nd[i]=item;else nd.push(item); persistRepair(nd); setView("list"); setEditItem(null); };
  const handleSaveMisc = (item) => { const nd=[...miscRecords]; const i=nd.findIndex(x=>x.id===item.id); if(i>=0)nd[i]=item;else nd.push(item); persistMisc(nd); setView("list"); setEditItem(null); };

  const handleDelete = () => {
    if(mainTab==="repair") persistRepair(repairRecords.filter(x=>x.id!==delTarget.id));
    else if(mainTab==="misc") persistMisc(miscRecords.filter(x=>x.id!==delTarget.id));
    else persist(records.filter(x=>x.id!==delTarget.id));
    setDelTarget(null); setDetailItem(null);
  };
  const handleToggleDone = (item) => {
    if(mainTab==="repair"){
      const nd=[...repairRecords]; const i=nd.findIndex(x=>x.id===item.id); if(i<0)return;
      nd[i]={...nd[i],status:nd[i].status===REPAIR_STATUS.DONE?REPAIR_STATUS.PENDING:REPAIR_STATUS.DONE,doneDate:nd[i].status===REPAIR_STATUS.DONE?"":today()};
      persistRepair(nd); setDetailItem(nd[i]);
    } else if(mainTab==="misc"){
      const nd=[...miscRecords]; const i=nd.findIndex(x=>x.id===item.id); if(i<0)return;
      nd[i]={...nd[i],status:nd[i].status===MISC_STATUS.DONE?MISC_STATUS.PENDING:MISC_STATUS.DONE,doneDate:nd[i].status===MISC_STATUS.DONE?"":today()};
      persistMisc(nd); setDetailItem(nd[i]);
    } else {
      const nd=[...records]; const i=nd.findIndex(x=>x.id===item.id); if(i<0)return;
      nd[i]={...nd[i],status:nd[i].status===STATUS.DONE?STATUS.PENDING:STATUS.DONE,doneDate:nd[i].status===STATUS.DONE?"":today()};
      persist(nd); setDetailItem(nd[i]);
    }
  };

  const lq=search.toLowerCase();
  const isRepair = mainTab==="repair";
  const isMisc   = mainTab==="misc";

  const allC=records.filter(r=>!search||r.customer?.toLowerCase().includes(lq)||r.constructionId?.toLowerCase().includes(lq)||r.handler?.toLowerCase().includes(lq)||(r.workItems||[]).some(w=>w.workType?.toLowerCase().includes(lq)||w.model?.toLowerCase().includes(lq)||w.serialNo?.toLowerCase().includes(lq)));
  const pendingC=allC.filter(r=>r.status!==STATUS.DONE).sort((a,b)=>(a.logDate||"").localeCompare(b.logDate||""));
  const doneC=allC.filter(r=>r.status===STATUS.DONE).sort((a,b)=>(b.doneDate||b.logDate||"").localeCompare(a.doneDate||a.logDate||""));

  const allR=repairRecords.filter(r=>!search||r.customer?.toLowerCase().includes(lq)||r.repairId?.toLowerCase().includes(lq)||r.handler?.toLowerCase().includes(lq)||r.model?.toLowerCase().includes(lq)||(r.repairItems||[]).some(w=>w.text?.toLowerCase().includes(lq)));
  const pendingR=allR.filter(r=>r.status!==REPAIR_STATUS.DONE).sort((a,b)=>(a.logDate||"").localeCompare(b.logDate||""));
  const doneR=allR.filter(r=>r.status===REPAIR_STATUS.DONE).sort((a,b)=>(b.doneDate||b.logDate||"").localeCompare(a.doneDate||a.logDate||""));

  const allM=miscRecords.filter(r=>!search||r.customer?.toLowerCase().includes(lq)||r.miscId?.toLowerCase().includes(lq)||r.handler?.toLowerCase().includes(lq)||(r.workItems||[]).some(w=>w.workType?.toLowerCase().includes(lq)));
  const pendingM=allM.filter(r=>r.status!==MISC_STATUS.DONE).sort((a,b)=>(a.logDate||"").localeCompare(b.logDate||""));
  const doneM=allM.filter(r=>r.status===MISC_STATUS.DONE).sort((a,b)=>(b.doneDate||b.logDate||"").localeCompare(a.doneDate||a.logDate||""));

  const pending = isMisc?pendingM:isRepair?pendingR:pendingC;
  const done    = isMisc?doneM   :isRepair?doneR   :doneC;
  const list    = subTab==="pending"?pending:done;
  const pendingLabel = isMisc?"待處理":isRepair?"待維修":"待施工";

  if(!ready) return <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:14,background:"#0f0f0f"}}>載入中…</div>;

  return (
    <div style={SJ.app}>
      <header style={SJ.hdr}>
        <div style={SJ.hdrIn}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><div style={SJ.logo}/><span style={SJ.logoTxt}>工務日誌</span></div>
          {view==="list" && <>
            <div style={{...SJ.searchWrap,flex:1,maxWidth:380}}>
              <span style={SJ.searchIco}><ISearch/></span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋客戶、機型、工作類型…" style={SJ.searchInp}/>
              {search&&<button onClick={()=>setSearch("")} style={{...SJ.iconBtn,position:"absolute",right:8,color:"#555"}}><IClose/></button>}
            </div>
            <button onClick={()=>{setEditItem(null);setView("form");}} style={SJ.primBtn}><IPlus s={14}/><span>{isMisc?"新增外務":isRepair?"新增維修":"新增紀錄"}</span></button>
          </>}
        </div>
      </header>

      {view==="list" && (
        <div style={{borderBottom:"1px solid #1e1e1e",padding:"0 20px",display:"flex",flexShrink:0,background:"#111",alignItems:"center"}}>
          {[["construction","施工紀錄"],["repair","維修紀錄"],["misc","外務紀錄"]].map(([k,t])=>(
            <button key={k} onClick={()=>{ setMainTab(k); setSubTab("pending"); setView("list"); setSearch(""); }}
              style={{padding:"10px 16px",background:"none",border:"none",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",color:mainTab===k?"#fff":"#333",borderBottom:mainTab===k?"2px solid #dc2626":"2px solid transparent"}}>
              {t}
            </button>
          ))}
          <div style={{flex:1}}/>
          <div style={{display:"flex",gap:4}}>
            {[[`pending`,pendingLabel,pending.length,"#f87171"],["done","已完成",done.length,"#4ade80"]].map(([k,l,cnt,clr])=>(
              <button key={k} onClick={()=>setSubTab(k)}
                style={{padding:"6px 14px",background:subTab===k?"#1e1e1e":"none",border:subTab===k?"1px solid #2e2e2e":"1px solid transparent",borderRadius:8,fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",color:subTab===k?clr:"#444"}}>
                {l} <span style={{fontSize:11}}>{cnt}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
        {view==="list" && (
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{color:"#444",fontSize:12,marginBottom:12}}>共 {list.length} 筆{search&&` (搜尋「${search}」)`}</div>
            {(isMisc?miscRecords:isRepair?repairRecords:records).length===0?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,color:"#333"}}>
                <div style={{fontSize:44,marginBottom:16}}>{isMisc?"🚗":isRepair?"🔧":"🔨"}</div>
                <div style={{marginBottom:20,fontSize:14}}>尚無{isMisc?"外務":isRepair?"維修":"施工"}紀錄</div>
                <button onClick={()=>setView("form")} style={SJ.primBtn}><IPlus s={14}/><span>新增第一筆</span></button>
              </div>
            ):list.length===0?(
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:"#333",fontSize:14}}>
                {search?`找不到符合「${search}」的結果`:`目前沒有${subTab==="pending"?pendingLabel:"已完成"}的紀錄`}
              </div>
            ):isMisc
              ? list.map(item=><MiscCard key={item.id} item={item} onClick={()=>setDetailItem(item)}/>)
              : isRepair
                ? list.map(item=><RepairCard key={item.id} item={item} onClick={()=>setDetailItem(item)}/>)
                : list.map(item=><ConstructionCard key={item.id} item={item} onClick={()=>setDetailItem(item)}/>)
            }
          </div>
        )}
        {view==="form" && isMisc && <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",minHeight:0}}><MiscForm initial={editItem} onSave={handleSaveMisc} onBack={()=>{setView("list");setEditItem(null);}}/></div>}
        {view==="form" && isRepair && <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",minHeight:0}}><RepairForm initial={editItem} onSave={handleSaveRepair} onBack={()=>{setView("list");setEditItem(null);}}/></div>}
        {view==="form" && !isRepair && !isMisc && <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",minHeight:0}}><ConstructionForm initial={editItem} onSave={handleSave} onBack={()=>{setView("list");setEditItem(null);}}/></div>}
      </div>

      {detailItem && isMisc   && <MiscDetailSheet   item={detailItem} onEdit={()=>{setEditItem(detailItem);setDetailItem(null);setView("form");}} onDelete={()=>setDelTarget(detailItem)} onToggleDone={()=>handleToggleDone(detailItem)} onClose={()=>setDetailItem(null)}/>}
      {detailItem && isRepair && <RepairDetailSheet item={detailItem} onEdit={()=>{setEditItem(detailItem);setDetailItem(null);setView("form");}} onDelete={()=>setDelTarget(detailItem)} onToggleDone={()=>handleToggleDone(detailItem)} onClose={()=>setDetailItem(null)}/>}
      {detailItem && !isRepair && !isMisc && <JDetailSheet item={detailItem} onEdit={()=>{setEditItem(detailItem);setDetailItem(null);setView("form");}} onDelete={()=>setDelTarget(detailItem)} onToggleDone={()=>handleToggleDone(detailItem)} onClose={()=>setDetailItem(null)}/>}

      {delTarget&&(
        <div style={SJ.overlay} onClick={()=>setDelTarget(null)}>
          <div style={{...SJ.modal,maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <div style={SJ.mHead}><span style={SJ.mTitle}>確認刪除</span><button onClick={()=>setDelTarget(null)} style={SJ.iconBtn}><IClose/></button></div>
            <div style={SJ.mBody}>
              <div style={{color:"#aaa",fontSize:14,marginBottom:20}}>確定要刪除 <strong style={{color:"#f87171"}}>「{delTarget.customer}」</strong> 的施工紀錄？</div>
              <div style={{display:"flex",gap:8}}><button onClick={()=>setDelTarget(null)} style={SJ.cancelBtn}>取消</button><button onClick={handleDelete} style={{...SJ.saveBtn,background:"#7f1d1d"}}>確認刪除</button></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SignListPage ─────────────────────────────────────────────────────────────
// ── Work Order Action Sheet（工程師全螢幕操作介面） ────────────────────────
function WorkOrderActionSheet({rec, onClose, onEdit, onDelete, onUpdatePay, onCompleteWithSig, machData, construction, maintenance, staffSig, setStaffSig, custSig, setCustSig}){
  const SC = (typeof getCompany==='function' ? getCompany().signColor : null) || DEFAULT_SIGN_COLOR;
  const isWaiting = rec['狀態']==='待辦' || rec['狀態']==='草稿';
  const [pm, setPm] = React.useState(rec['收款方式']||'現金');
  const [ps, setPs] = React.useState(rec['付款狀態']||'未付');
  const [completing, setCompleting] = React.useState(false);
  const [sigPadOpen, setSigPadOpen] = React.useState(false);
  // 偵測有無變動
  const pmChanged = pm !== (rec['收款方式']||'現金');
  const psChanged = ps !== (rec['付款狀態']||'未付');

  // 客戶名下機器
  const customerMachines = React.useMemo(()=>{
    if(!isWaiting || !rec['客戶名稱']) return [];
    const all = machData?.machines || machData || [];
    return all.filter(m=>String(m['目前客戶']||m.customer||'').trim()===rec['客戶名稱']);
  },[rec, machData, isWaiting]);

  // 該客戶的近期紀錄（從工務日誌）
  const customerHistory = React.useMemo(()=>{
    if(!isWaiting || !rec['客戶名稱']) return [];
    const cust = rec['客戶名稱'];
    const cons = (construction||[]).filter(c=>c.customer===cust&&c.id!==rec.id).map(c=>({...c,_summary:'施工 '+(c.workItems||[]).map(w=>w.workType+' '+(w.model||'')).join('、')}));
    const reps = (maintenance||[]).filter(c=>c.customer===cust).map(c=>({...c,'紀錄日期':c.logDate,_summary:'維修 '+c.model+' '+(c.repairItems||[]).map(r=>r.text).join('、')}));
    return [...cons,...reps].sort((a,b)=>(b['紀錄日期']||'').localeCompare(a['紀錄日期']||'')).slice(0,5);
  },[rec, construction, maintenance, isWaiting]);

  const showPayArea = !isWaiting && !!rec['總金額'];
  const canComplete = isWaiting && !!custSig;

  const doComplete = async()=>{
    if(!custSig){ showToast('請先取得客戶簽章','error'); return; }
    setCompleting(true);
    try {
      await onCompleteWithSig(rec, null, custSig);
      onClose();
    } catch(e){ showToast(e.message||'失敗','error'); }
    setCompleting(false);
  };

  const dlPDF = async()=>{
    try {
      const fd = {
        serial:rec['單號'], customer:rec['客戶名稱'],
        recordDate:rec['紀錄日期'], completionDate:rec['完成日期'],
        phones:parseArr(rec['電話'])||[], addresses:parseArr(rec['地址'])||[],
        staff:parseArr(rec['執行人員'])||[],
        rows: parseArr(rec['工作明細'])||[],
        note:rec['備註']||'',
        payMethod:rec['收款方式']||'', payStatus:rec['付款狀態']||'',
        totalAmount:rec['總金額']||''
      };
      await generatePDF(fd, rec['執行人簽章']||staffSig, rec['客戶簽章']||custSig);
      showToast('✓ PDF 已下載','success');
    } catch(e){ showToast('PDF 失敗','error'); }
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,background:'#1a1a1a',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'#111',padding:'10px 14px',display:'flex',alignItems:'center',gap:8,flexShrink:0,borderBottom:'1px solid #222'}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#aaa',display:'flex',padding:4,cursor:'pointer'}}><IBack/></button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:'#f0f0f0'}}>{rec['客戶名稱']}</div>
          <div style={{fontSize:10,color:'#666'}}>{rec['單號']} · {isWaiting?'待辦':'完成'}</div>
        </div>
        <button onClick={dlPDF} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(107,114,128,.15)',border:'1px solid rgba(107,114,128,.3)',borderRadius:6,color:'#9ca3af',fontSize:11,fontWeight:700,cursor:'pointer'}}>📄 PDF</button>
        <button onClick={onEdit} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:6,color:'#60a5fa',fontSize:11,fontWeight:700,cursor:'pointer'}}><IEdit/>{isWaiting?'修改':'編輯'}</button>
        <button onClick={onDelete} style={{display:'flex',padding:6,background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:6,color:'#f87171',cursor:'pointer'}}><ITrash/></button>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto'}}>
        <WorkOrderViewer
          rec={rec}
          editable={true}
          onSignStaff={null}
          onSignCust={isWaiting?(()=>setSigPadOpen(true)):null}
          onChangePay={async({method,status})=>{
            const newMethod = method!==undefined ? method : (rec['收款方式']||'現金');
            const newStatus = status!==undefined ? status : (rec['付款狀態']||'未付');
            await onUpdatePay(rec['單號'],'工務',newStatus,newMethod);
            showToast('✓ 已更新','success');
          }}
          onResign={()=>{
            // 重新簽名：清空 + 開 SigPad
            if(setCustSig)setCustSig(null);
            setSigPadOpen(true);
          }}
          customerMachines={customerMachines}
          customerHistory={customerHistory}
          custSig={custSig}
        />
      </div>
      {sigPadOpen && <BigSigPad
        title={`${rec['客戶名稱']} 簽名`}
        borderColor={SC}
        onSave={async(dataUrl)=>{
          setCustSig(dataUrl);
          if(!isWaiting){
            // 完成單重簽 — 直接寫回 tk_work
            try{
              const list = JSON.parse(localStorage.getItem('tk_work')||'[]');
              const idx = list.findIndex(r=>r['單號']===rec['單號']);
              if(idx>=0){
                list[idx] = {...list[idx], '客戶簽章': dataUrl};
                localStorage.setItem('tk_work', JSON.stringify(list));
                try{ scheduleSync(); }catch{}
                showToast('✓ 簽章已更新','success');
                onClose();
              }
            }catch{}
          }
        }}
        onClose={()=>setSigPadOpen(false)}/>}

      {/* Bottom action bar */}
      <div style={{flexShrink:0,background:'#0f0f0f',borderTop:'1px solid #222',padding:'10px 14px'}}>
        {isWaiting ? (
          <button onClick={doComplete} disabled={!canComplete||completing}
            style={{width:'100%',padding:'14px',background:canComplete?`linear-gradient(135deg,${SC},${SC}cc)`:'#333',border:'none',borderRadius:10,color:'#fff',fontSize:15,fontWeight:800,cursor:canComplete?'pointer':'not-allowed',display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:completing?.6:1}}>
            {completing?'處理中…':<><ICheck/>{canComplete?'完成送出':'請取得客戶簽章後送出'}</>}
          </button>
        ) : (
          <button onClick={dlPDF} style={{width:'100%',padding:'12px',background:'linear-gradient(135deg,#374151,#1f2937)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,fontFamily:'inherit'}}>📄 下載 PDF 給客戶</button>
        )}
      </div>
    </div>
  );
}

function SignListPage({construction, maintenance, workOrders, onNew, onEdit, onDelete, onUpdatePay, onCompleteWithSig, machData, currentUser, onAssign}) {
  const [search,  setSearch]  = React.useState('');
  const [filter,  setFilter]  = React.useState('draft');
  const [detail,  setDetail]  = React.useState(null);
  const [detType, setDetType] = React.useState(null);
  const [pm,      setPm]      = React.useState('現金');
  const [confirmDel, setConfirmDel] = React.useState(null);
  const [staffSig, setStaffSig] = React.useState(null);
  const [custSig,  setCustSig]  = React.useState(null);
  const [assignTarget, setAssignTarget] = React.useState(null); // {rec, type}
  
  const isAdmin = currentUser?.role === 'admin';
  const myName = currentUser?.name || '';

  // 合併施工+維修+工務，各自帶 _type
  const allRecords = React.useMemo(() => {
    const cons   = (construction||[]).map(r=>({...r, _type:'施工'}));
    const maints = (maintenance||[]).map(r=>({...r, _type:'維修'}));
    const works  = (workOrders||[]).map(r=>({...r, _type:'工務'}));
    let merged = [...cons, ...maints, ...works].sort((a,b)=>{
      const da = a['紀錄日期']||a['單號']||'';
      const db2 = b['紀錄日期']||b['單號']||'';
      return db2.localeCompare(da);
    });

    // 非管理員 → 只看自己被指派的單；未指派的單也看不到
    if (!isAdmin && myName) {
      merged = merged.filter(r => {
        const staff = parseArr(r['執行人員']);
        return staff.includes(myName);
      });
      // 完成單只顯示近 7 天
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7); cutoff.setHours(0,0,0,0);
      merged = merged.filter(r => {
        if(r['狀態'] !== '完成') return true; // 待辦不限時
        const ds = r['完成日期']||r['紀錄日期']||'';
        if(!ds) return false;
        const d = new Date(String(ds).replace(/\//g,'-'));
        return !isNaN(d.getTime()) && d >= cutoff;
      });
    }

    return merged;
  }, [construction, maintenance, workOrders, isAdmin, myName]);

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase();
    return allRecords.filter(r => {
      if(filter === 'draft' && r['狀態'] !== '待辦')   return false;
      if(filter === 'done'  && r['狀態'] !== '完成')   return false;
      if(!q) return true;
      return [r['客戶名稱'], r['單號'], r['完成日期'], r['紀錄日期'],
        ...(parseArr(r['機器組'])||[]).map(m=>m.model)
      ].some(v=>String(v||'').toLowerCase().includes(q));
    });
  }, [allRecords, search, filter]);

  const drafts = allRecords.filter(r=>r['狀態']==='待辦').length;
  const done   = allRecords.filter(r=>r['狀態']==='完成').length;

  const openDetail = (r) => { setDetail(r); setDetType(r._type); setPm('現金'); };

  const handleDel = () => {
    const delType = confirmDel._type==='工務'?'工務':confirmDel._type==='施工'?'施工':'維修';
    onDelete(confirmDel['單號'], delType);
    setConfirmDel(null);
    setDetail(null);
    showToast('已刪除','success');
  };

  // 統一色：所有簽單都用同一色（之前的施工/維修/工務區分是 legacy）
  const SIGN_COLOR = (typeof getCompany==='function' ? getCompany().signColor : null) || DEFAULT_SIGN_COLOR;
  // 依工作明細自動判斷標籤：含 billing+其他 → 簽單(含請款)；只有 billing → 請款單；其餘 → 工務單
  const labelOfRec = (r) => {
    const rs = parseArr(r['工作明細'])||[];
    if(rs.length === 0) return r._type==='施工'||r._type==='維修' ? r._type+'單' : '工務單';
    const hasB = rs.some(x=>x._k==='billing');
    const hasO = rs.some(x=>x._k!=='billing');
    if(hasB && hasO) return '簽單(含請款)';
    if(hasB && !hasO) return '請款單';
    return '工務單';
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0f0f0f'}}>
      {/* Header */}
      <div style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'10px 14px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontWeight:800,fontSize:15,color:'#ccc',flex:1}}>簽單紀錄</span>
          <button onClick={onNew} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 14px',background:'linear-gradient(135deg,#dc2626,#991b1b)',border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            <IPlus s={14}/>新增簽單
          </button>
        </div>
        {/* Search */}
        <div style={{position:'relative',marginBottom:8}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#444',display:'flex'}}><ISearch/></span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋客戶、單號、機型…"
            style={{width:'100%',padding:'8px 12px 8px 32px',background:'#1a1a1a',border:'1px solid #222',borderRadius:9,color:'#ccc',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
        </div>
        {/* Filter tabs */}
        <div style={{display:'flex',gap:6}}>
          {[['draft','待辦',drafts],['done','完成',done],['all','全部',allRecords.length]].map(([v,l,cnt])=>(
            <button key={v} onClick={()=>setFilter(v)}
              style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,border:'1px solid',cursor:'pointer',
                borderColor:filter===v?'#dc2626':'#2a2a2a',
                background:filter===v?'rgba(220,38,38,.12)':'transparent',
                color:filter===v?'#ef4444':'#555'}}>
              {l} {cnt>0&&<span style={{fontSize:10}}>{cnt}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:'auto'}}>
        {filtered.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:12,color:'#333'}}>
            <div style={{fontSize:36}}>✍️</div>
            <div style={{fontSize:13}}>{search?`找不到「${search}」`:filter==='draft'?'沒有待辦':filter==='done'?'沒有完成的簽單':'還沒有任何簽單'}</div>
            {!search&&filter==='all'&&<button onClick={onNew} style={{display:'flex',alignItems:'center',gap:5,padding:'9px 20px',background:'linear-gradient(135deg,#dc2626,#991b1b)',border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}><IPlus s={14}/>新增第一張</button>}
          </div>
        ) : filtered.map((r,i) => {
          const isDraft = r['狀態']==='待辦';
          const paid    = r['付款狀態']==='付清';
          const ms      = parseArr(r['機器組'])||[];
          const tagText = labelOfRec(r);
          const tagColor = tagText==='請款單' ? '#16a34a' : tagText==='簽單(含請款)' ? '#d97706' : SIGN_COLOR;
          return (
            <div key={r['單號']||i} onClick={()=>openDetail(r)}
              style={{background:'#111',borderBottom:'1px solid #1a1a1a',padding:'11px 14px',cursor:'pointer',
                borderLeft:`3px solid ${isDraft?'#374151':tagColor}`}}
              onPointerDown={e=>e.currentTarget.style.background='#1a1a1a'}
              onPointerUp={e=>e.currentTarget.style.background=''}
              onPointerLeave={e=>e.currentTarget.style.background=''}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                {/* 類型標籤（依工作明細自動判斷） */}
                <span style={{fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:3,background:tagColor+'22',color:tagColor,border:`1px solid ${tagColor}44`}}>{tagText}</span>
                {/* 狀態標籤 */}
                {isDraft
                  ? <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:3,background:'#1f2937',color:'#9ca3af',border:'1px solid #374151'}}>待辦</span>
                  : <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:3,background:paid?'rgba(22,163,74,.12)':'rgba(239,68,68,.08)',color:paid?'#22c55e':'#f87171',border:`1px solid ${paid?'#16a34a44':'#ef444433'}`}}>{paid?'付清':'未付'}</span>
                }
                <span style={{fontSize:11,color:'#444',marginLeft:'auto'}}>{fmtDate(isDraft?r['紀錄日期']:r['完成日期'])}</span>
              </div>
              <div style={{fontWeight:700,fontSize:14,color:'#ccc',marginBottom:3}}>{r['客戶名稱']||'—'}</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11,color:'#555'}}>{r['單號']}</span>
                {(()=>{
                  const rs = parseArr(r['工作明細'])||[];
                  if(rs.length>0){
                    const briefs = rs.slice(0,3).map(briefRowSummary).filter(Boolean);
                    return <span style={{fontSize:12,color:'#888'}}>{briefs.join('・')}{rs.length>3 && '…'}</span>;
                  }
                  if(ms.length>0){
                    return <span style={{fontSize:12,color:'#666'}}>
                      {ms.slice(0,2).map((m,j)=><span key={j}>{m.dir||'裝'} {m.model}{j<Math.min(ms.length,2)-1?'、':''}</span>)}
                      {ms.length>2&&<span> …共{ms.length}台</span>}
                    </span>;
                  }
                  return null;
                })()}
                {r['總金額']&&<span style={{fontSize:12,color:'#22c55e',marginLeft:'auto'}}>NT$ {Number(r['總金額']).toLocaleString()}</span>}
              </div>
              {/* 執行人員 + 派單按鈕（只有管理員看得到派單按鈕）*/}
              {(()=>{
                const staff = parseArr(r['執行人員']);
                if (staff.length === 0 && !isAdmin) return null;
                return (
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:5,paddingTop:5,borderTop:'1px dashed #1f1f1f'}}>
                    <span style={{fontSize:10,color:'#666'}}>👥</span>
                    {staff.length > 0 ? (
                      <span style={{fontSize:11,color:'#aaa'}}>{staff.join('、')}</span>
                    ) : (
                      <span style={{fontSize:11,color:'#666',fontStyle:'italic'}}>未指派</span>
                    )}
                    {isAdmin && (
                      <button onClick={(e)=>{e.stopPropagation(); setAssignTarget({rec:r, type:r._type});}}
                        style={{marginLeft:'auto',padding:'2px 8px',background:'rgba(96,165,250,.12)',border:'1px solid rgba(96,165,250,.3)',borderRadius:4,color:'#60a5fa',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                        派單
                      </button>
                    )}
                  </div>
                );
              })()}
            </div>
          );
        })}
      </div>

      {/* Detail sheet — 工務單用全螢幕互動模式（工程師視角）*/}
      {detail&&detail._type==='工務'&&(()=>{
        // 從 workOrders 找最新的 record（修付款狀態時 workOrders 會更新，這裡跟著刷新）
        const latest = workOrders.find(r=>r['單號']===detail['單號']);
        const liveRec = latest ? {...latest, _type:'工務'} : detail;
        return (
        <WorkOrderActionSheet
          rec={liveRec}
          onClose={()=>{setDetail(null);setStaffSig(null);setCustSig(null);}}
          onEdit={()=>{onEdit(detail,detail._type);setDetail(null);setStaffSig(null);setCustSig(null);}}
          onDelete={()=>setConfirmDel(detail)}
          onUpdatePay={onUpdatePay}
          onCompleteWithSig={onCompleteWithSig}
          machData={machData}
          construction={construction}
          maintenance={maintenance}
          staffSig={staffSig} setStaffSig={setStaffSig}
          custSig={custSig} setCustSig={setCustSig}
        />
      );})()}
      {/* 一般紀錄使用底部 sheet */}
      {detail&&detail._type!=='工務'&&(
        <div style={{position:'fixed',inset:0,zIndex:300}} onClick={()=>setDetail(null)}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(4px)'}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'#111',borderRadius:'20px 20px 0 0',border:'1px solid #222',maxHeight:'88vh',display:'flex',flexDirection:'column',animation:'slideUp .25s ease'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'center',padding:'12px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:'#333'}}/></div>
            <div style={{padding:'0 18px 8px',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:800,fontSize:14,color:'#ccc',flex:1}}>{detail['客戶名稱']} · {detail['單號']}</span>
              <button onClick={()=>{onEdit(detail,detail._type);setDetail(null);}} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:7,color:'#60a5fa',fontSize:12,fontWeight:700,cursor:'pointer'}}><IEdit/>{(detail['狀態']==='待辦'||detail['狀態']==='草稿')?'繼續填寫':'編輯'}</button>
              <button onClick={()=>setConfirmDel(detail)} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:7,color:'#f87171',fontSize:12,fontWeight:700,cursor:'pointer'}}><ITrash/>刪除</button>
              <button onClick={()=>setDetail(null)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',display:'flex',padding:4}}><IClose/></button>
            </div>
            <div style={{overflowY:'auto',padding:'4px 18px 28px',flex:1}}>
              <RecordDetail rec={detail} type={detail._type}/>
              {detail['付款狀態']!=='付清'&&(detail['狀態']==='完成'||detail['狀態']==='待辦')&&!!detail['總金額']&&<div style={{marginTop:16}}>
                <div style={{fontSize:10,fontWeight:800,color:'#444',letterSpacing:'.08em',marginBottom:8}}>標記收款</div>
                <div style={{display:'flex',gap:6,marginBottom:10}}>
                  {PAY_METHODS.map(m=><button key={m} onClick={()=>setPm(m)} style={{padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:'1.5px solid',cursor:'pointer',borderColor:pm===m?'#22c55e':'#333',background:pm===m?'rgba(34,197,94,.15)':'transparent',color:pm===m?'#22c55e':'#555'}}>{m}</button>)}
                </div>
                <button onClick={async()=>{await onUpdatePay(detail['單號'],detail._type==='施工'?'施工':'維修','付清',pm);showToast('已標記付清','success');setDetail(null);}} style={{width:'100%',padding:'11px',background:'linear-gradient(135deg,#16a34a,#15803d)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><ICheck/>標記付清</button>
              </div>}
            </div>
          </div>
        </div>
      )}
      {confirmDel&&<ConfirmDlg msg={`確定刪除 <strong>${confirmDel['客戶名稱']}</strong> 的${confirmDel._type}單？`} onConfirm={handleDel} onCancel={()=>setConfirmDel(null)}/>}
      {assignTarget && <AssignSheet 
        target={assignTarget}
        onClose={()=>setAssignTarget(null)}
        onConfirm={(newStaff)=>{
          onAssign(assignTarget.rec['單號'], assignTarget.type, newStaff);
          setAssignTarget(null);
          showToast('✓ 已更新派單','success');
        }}/>}
    </div>
  );
}

// 派單 Sheet — 多選職員
function AssignSheet({target, onClose, onConfirm}){
  const co = getCompany();
  const allStaff = (co.staff||[]).map(s => s.name||'').filter(Boolean);
  const [selected, setSelected] = useState(()=>parseArr(target.rec['執行人員']));
  
  const toggle = (name) => {
    setSelected(prev => prev.includes(name) ? prev.filter(n=>n!==name) : [...prev, name]);
  };
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1a1a',border:'1px solid #333',borderRadius:'14px 14px 0 0',padding:'18px 18px 20px',width:'100%',maxWidth:520,maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexShrink:0}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#eee'}}>👥 派單 — {target.rec['客戶名稱']||'—'}</div>
            <div style={{fontSize:11,color:'#666',marginTop:2}}>單號 {target.rec['單號']}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',padding:4,display:'flex'}}><IClose/></button>
        </div>
        
        <div style={{fontSize:11,color:'#888',marginBottom:8,flexShrink:0}}>選擇執行人員（可多選）</div>
        
        <div style={{flex:1,overflowY:'auto',marginBottom:14,border:'1px solid #2a2a2a',borderRadius:8,background:'#0f0f0f'}}>
          {allStaff.length === 0 ? (
            <div style={{padding:'24px',textAlign:'center',color:'#666',fontSize:12}}>
              職員名單為空<br/>
              <span style={{fontSize:10}}>請先在試算表「職員名單」分頁新增員工，下次同步後可派單</span>
            </div>
          ) : allStaff.map(name => {
            const sel = selected.includes(name);
            return (
              <div key={name} onClick={()=>toggle(name)}
                style={{padding:'10px 12px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',gap:10,cursor:'pointer',background:sel?'rgba(96,165,250,.08)':'transparent'}}>
                <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${sel?'#60a5fa':'#444'}`,background:sel?'#60a5fa':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {sel&&<span style={{color:'#fff',fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
                <span style={{fontSize:13,color:sel?'#60a5fa':'#aaa',fontWeight:sel?700:500}}>{name}</span>
              </div>
            );
          })}
        </div>

        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={onClose} style={{flex:1,padding:'12px',background:'#222',border:'1px solid #333',borderRadius:8,color:'#888',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>取消</button>
          <button onClick={()=>onConfirm(selected)}
            style={{flex:2,padding:'12px',background:'linear-gradient(135deg,#3b82f6,#1e40af)',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
            ✓ 確認派單（{selected.length} 位）
          </button>
        </div>
      </div>
    </div>
  );
}

const COMPANY_KEY   = 'tk_company';
const CONTRACT_KEY  = 'tk_contracts';

const DEFAULT_COMPANY = {
  name:        '',
  systemTitle: 'XX企業',
  slogan:      '',
  address:     '',
  tel:         '',
  taxId:       '',
  bankAccount: '',
  mobile:      '',
  owner:       '',
  // 簽單主色（標頭、邊框、各種強調）
  signColor:   '#0f766e',
  // 合約主色：租賃合約 / 租送合約 分開
  contractRentColor:     '#0f766e',
  contractRentSendColor: '#a16207',
  // 公司大小章（合約甲方簽章；base64 dataURL）
  companyStamp: '',
  // 租送預設
  rentSendMonths: '24',
  rentSendBreakNoRefund: '6',   // 租送：未滿 X 個月解約 → 押金不退
  rentSendBreakHalfRefund: '12',// 租送：未滿 Y 個月解約 → 押金扣一半
  // 維修條款日數
  repairResponseDays: '3',  // 接獲通知後 N 個工作天內到場修復
  repairReplaceDays: '3',   // 到場後 N 日內提供換機
  // 雲端同步設定（預設 URL，第一次開啟即可登入）
  appsScriptUrl: 'https://script.google.com/macros/s/AKfycbz9h77y8u2ns7mDSizBsrELnF5Kmw6zaBc7A41e3jQxpg7SF4O6BMa3RfTTdtadyct7/exec',
  driveFolderId: '',
  autoSync: true,
  // 職員名單（之後可從試算表同步覆蓋）
  staff: [],
};

const getCompany = ()=>{
  try{ const v=localStorage.getItem(COMPANY_KEY); return v?{...DEFAULT_COMPANY,...JSON.parse(v)}:DEFAULT_COMPANY; }
  catch{ return DEFAULT_COMPANY; }
};
const setCompany = (data)=>{ try{ localStorage.setItem(COMPANY_KEY,JSON.stringify(data)); }catch{} };
const getContracts = ()=>{ try{ const v=localStorage.getItem(CONTRACT_KEY); return v?JSON.parse(v):[]; }catch{ return []; } };
const setContracts = (list)=>{ try{ localStorage.setItem(CONTRACT_KEY,JSON.stringify(list)); }catch{} try{ scheduleSync(); }catch{} };

const contractSerial = (list)=>{
  const d=new Date(), ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const pfx='L'+ds; let max=0;
  (list||[]).forEach(c=>{const id=c['合約號']||'';if(id.startsWith(pfx)){const n=parseInt(id.slice(pfx.length))||0;if(n>max)max=n;}});
  return pfx+String(max+1).padStart(3,'0');
};

    &emsp;有下列不可抗力情形之一，致機器毀損者，乙方不負賠償責任，但乙方應於知悉後二十四小時內通知甲方：<br/>

    &emsp;乙方發現機器有任何異常損壞時，應立即通知甲方，不得自行或委託第三方拆修，違者所生之費用及損失由乙方自行負擔。本契約書正本一式兩份，視同機器保管憑證，雙方各執一份為憑。</p>
    <p style="margin-bottom:4px">${isRentSend
      ? `五、租約期滿並結清款項前，該機器所有權屬甲方，非經甲方書面同意，<strong>乙方不得擅自遷移或轉讓</strong>。乙方違約致損害甲方權益時，願賠償損失及甲方一切訴訟費用，並拋棄先訴抗辯權。`

      <div>負</div><div>責</div><div>人</div>
    </div>

  </div>
  <div style="text-align:center;font-size:13px;margin:14px 0 4px;letter-spacing:2px">中　華　民　國　${roYear}　${roMonth}　${roDay}</div>`;

  document.body.appendChild(div);
  try {
    const canvas = await html2canvas(div,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const imgData = canvas.toDataURL('image/jpeg',.92);
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pW=pdf.internal.pageSize.getWidth(), pH=pdf.internal.pageSize.getHeight();
    const iW=pW-16, iH=iW*(canvas.height/canvas.width);
    if(iH<=pH-16){
      pdf.addImage(imgData,'JPEG',8,8,iW,iH);
    } else {
      let y=8, srcRatio=canvas.width/iW, pageH=pH-16;
      let totalRendered=0;
      while(totalRendered < canvas.height){
        const sliceH=Math.min(pageH*srcRatio, canvas.height-totalRendered);
        const c2=document.createElement('canvas');
        c2.width=canvas.width; c2.height=sliceH;
        c2.getContext('2d').drawImage(canvas,0,totalRendered,canvas.width,sliceH,0,0,canvas.width,sliceH);
        pdf.addImage(c2.toDataURL('image/jpeg',.92),'JPEG',8,y,iW,sliceH/srcRatio);
        totalRendered+=sliceH;
        if(totalRendered<canvas.height){pdf.addPage();y=8;}
      }
    }
    pdf.save(`租賃契約_${ct.storeName||''}_${ct['合約號']||''}.pdf`);
  } finally { document.body.removeChild(div); }
}

// Contract helper components
const ContractSEC=(label, color)=>(
  <div style={{textAlign:'center',fontWeight:900,fontSize:14,letterSpacing:4,borderTop:`2px solid ${color||'#0080FF'}`,borderBottom:`2px solid ${color||'#0080FF'}`,padding:'7px 0',margin:'0',background:color||'#46A3FF',color:'#fff'}}>{label}</div>
);
const ContractFieldRow=({label,children,last,CB})=>(
  <tr style={{borderBottom:last?'none':(CB||'1px solid #ddd')}}>
