);

function ContractForm({onClose, onSave, editContract, crmData, machData, quoteDb, contractType}){
  // 'rental' | 'rentSend'，編輯時優先取 editContract 的值
  const ctType = (editContract?.contractType) || contractType || 'rental';
  const isRentSend = ctType === 'rentSend';
  const co = getCompany();
  // 合約主色（依類型）
  const CC = isRentSend ? (co.contractRentSendColor||'#a16207') : (co.contractRentColor||'#0f766e');
  // 租送契約相關
  const rsMonths     = parseInt(co.rentSendMonths||24);
  const rsNoRefund   = parseInt(co.rentSendBreakNoRefund||6);
  const rsHalfRefund = parseInt(co.rentSendBreakHalfRefund||12);
  // 維修日數
  const repairResp   = parseInt(co.repairResponseDays||3);
  const repairRepl   = parseInt(co.repairReplaceDays||3);
  const isEdit = !!editContract;
  const contracts = getContracts();
  const [saving,setSaving] = useState(false);

  // 狀態（UI 只切「待簽 / 已簽」；儲存時依合約類型轉成最終狀態）
  // 編輯既有合約時：若狀態是出租中/已退租/租送機/已期滿/已解約等 → 視為「已簽」
  const _initStatus = editContract?.['狀態']||'待簽';
  const [contractNo]       = useState(editContract?.['合約號']||contractSerial(contracts));
  const [status,setStatus] = useState(_initStatus === '待簽' ? '待簽' : '已簽');
  // 編輯時保留原始最終狀態（如果使用者沒改 status，保留它；改成待簽則丟棄）
  const _origFinalStatus = useRef(editContract?.['狀態']||'').current;

  // 機器
  const [brand,setBrand]     = useState(editContract?.brand||'');
  const [model,setModel]     = useState(editContract?.model||'');
  const [capacity,setCapacity] = useState(editContract?.capacity||'');
  const [serialNo,setSerialNo] = useState(editContract?.serialNo||'');
  const [machSearch,setMachSearch] = useState('');

  // 租約
  const [startDate,setStartDate] = useState((editContract?.startDate||dateInput()).replace(/\//g,'-'));
  const [rentAmt,setRentAmt]     = useState(editContract?.rentAmt||'');
  const [depositAmt,setDepositAmt] = useState(editContract?.depositAmt||'');
  const [payDay,setPayDay]       = useState(String(editContract?.payDay||'1'));
  const [payMethod,setPayMethod] = useState(editContract?.payMethod||'現金');
  const [bankAccount,setBankAccount] = useState(editContract?.bankAccount||co.bankAccount||'');
  const [useYears,setUseYears]   = useState(editContract?.useYears||'10');

  // 乙方
  const [storeName,setStoreName]     = useState(editContract?.storeName||'');
  const [storePhone,setStorePhone]   = useState(editContract?.storePhone||'');
  const [storeAddress,setStoreAddress] = useState(editContract?.storeAddress||'');
  const [partyBName,setPartyBName]   = useState(editContract?.partyBName||'');
  const [partyBAddress,setPartyBAddress] = useState(editContract?.partyBAddress||'');
  const [partyBPhone,setPartyBPhone] = useState(editContract?.partyBPhone||'');
  const [partyBTax,setPartyBTax]     = useState(editContract?.partyBTax||'');
  const [partyBOwner,setPartyBOwner] = useState(editContract?.partyBOwner||'');

  // 負責人
  const [ownerName,setOwnerName]       = useState(editContract?.ownerName||'');
  const [ownerPhone,setOwnerPhone]     = useState(editContract?.ownerPhone||'');
  const [ownerIdNo,setOwnerIdNo]       = useState(editContract?.ownerIdNo||'');
  const [ownerAddress,setOwnerAddress] = useState(editContract?.ownerAddress||'');
  const [partyBSig,setPartyBSig] = useState(editContract?.partyBSig||null);
  const [sigPadOpen,setSigPadOpen] = useState(false);

  // 自動代入機器資料
  // 租賃 → 待出租 + 全新機；租送 → 只能全新機
  const allMachines = machData?.machines||machData||[];
  const custMachines = allMachines.filter(m=>{
    const t = m['類型']||m['type']||m.status||'';
    if (isRentSend) return t === '全新機';
    return t === '待出租' || t === '全新機';
  });

  const pickMachine = (m)=>{
    setBrand(m['廠牌']||m.brand||'');
    setModel(m['型號']||m.model||'');
    setCapacity(m['容量']||m.capacity||'');
    setSerialNo(m['機號']||m.serialNo||'');
    // 從報價單 iceMachines 找對應機型
    const mo = m['型號']||m.model||'';
    const priceRow = (quoteDb?.iceMachines||[]).find(p=>{
      const pm = p['型號']||p.model||'';
      return pm && (pm===mo || mo.includes(pm) || pm.includes(mo));
    });
    if(priceRow){
      if (isRentSend) {
        // 租送：用「租送租金」rentDel + 「租送押金」deposit
        const rent = Number(priceRow.rentDel || priceRow['租送租金'] || priceRow.rent || 0);
        const dep  = Number(priceRow.deposit || priceRow['租送押金'] || 0);
        if(rent) setRentAmt(String(rent));
        if(dep)  setDepositAmt(String(dep));
      } else {
        // 一般租賃：押金 = 租金 × 2
        const rent = Number(priceRow.rent || priceRow['月租金'] || priceRow['租金'] || 0);
        if(rent){ setRentAmt(String(rent)); setDepositAmt(String(rent * 2)); }
      }
    }
  };

  // 從客戶帶入
  const pickCustomer = (storeName)=>{
    setStoreName(storeName);
    const s=(crmData?.stores||[]).find(x=>(x.name||x['店家名稱'])===storeName);
    if(!s)return;
    const ps=parseArr(s.phones||s['電話']); if(ps.length)setStorePhone(ps[0]);
    const as=parseArr(s.address||s['地址']); if(as.length)setStoreAddress(as[0]);
    // 公司
    const co2=(crmData?.companies||[]).find(c=>c.id===s.companyId);
    if(co2){setPartyBName(co2.title||co2['公司名稱']||'');setPartyBAddress(co2.address||'');setPartyBPhone(co2.phone||'');setPartyBTax(co2.taxId||'');}
    // 聯絡人 — 優先取職稱含「負責人」的
    const pids=_arr(co2?.personIds).length?_arr(co2.personIds):_arr(s.personIds);
    const persons=crmData?.persons||[];
    const linkedPersons = pids.map(id=>persons.find(p=>p.id===id)).filter(Boolean);
    const ownerP = linkedPersons.find(p => String(p.role||p['職稱']||'').includes('負責人')) || linkedPersons[0];
    if(ownerP){
      setOwnerName(ownerP.name||'');
      // 「聯絡資訊」用 ` / ` 分隔：第一段是電話、第二段是地址
      const info = String(ownerP.info||ownerP['聯絡資訊']||'');
      const parts = info.split(/\s*\/\s*/).filter(Boolean);
      setOwnerPhone(parts[0]||'');
      setOwnerAddress(parts.slice(1).join(' / ')||'');
      setOwnerIdNo(ownerP.idNo||ownerP['身分證號']||'');
      setPartyBOwner(ownerP.name||'');
    }
  };

  const custNames = useMemo(()=>[...(crmData?.stores||[]).map(s=>s.name||s['店家名稱']).filter(Boolean)],[crmData]);

  useEffect(()=>{
    if(!storeName||!crmData) return;
    // Auto-fill when storeName matches exactly
    const s=(crmData?.stores||[]).find(x=>(x.name||x['店家名稱'])===storeName);
    if(s && !storePhone && !storeAddress){
      pickCustomer(storeName);
    }
  },[storeName,crmData]);

  const save=async()=>{
    if(!storeName.trim()){showToast('請填入承租人','error');return;}
    if(!model.trim()){showToast('請填入機型','error');return;}
    setSaving(true);
    let ct;
    try{
      // 若為新客戶，新增到客戶清單；若有公司資料、負責人資料也一併建立
      const existing=(crmData?.stores||[]).find(x=>(x.name||x['店家名稱'])===storeName);
      if(!existing&&storeName.trim()){
        try{
          const cr=await storeHelper.get('crm_v3');
          const all=cr?.value?JSON.parse(cr.value):{stores:[],companies:[],persons:[]};
          all.stores = all.stores||[];
          all.companies = all.companies||[];
          all.persons = all.persons||[];
          
          // 1. 公司：partyBName 有值 → 找看看公司是否已存在，沒有就建立
          let companyId = '';
          if (partyBName.trim()) {
            const sameCo = all.companies.find(c => (c.title||c['公司名稱']) === partyBName.trim());
            if (sameCo) {
              companyId = sameCo.id;
            } else {
              const newCo = {
                id: 'C'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
                title: partyBName.trim(),
                taxId: partyBTax||'',
                phone: partyBPhone||'',
                address: partyBAddress||'',
                personIds: [],
                note: '',
              };
              all.companies = [newCo, ...all.companies];
              companyId = newCo.id;
              try { markDirty('客戶公司', newCo.id, 'upsert'); } catch{}
            }
          }
          
          // 2. 聯絡人（負責人）：ownerName 有值 → 建立
          let personId = '';
          if (ownerName.trim()) {
            // 把電話 + 地址合併成「聯絡資訊」字串（用 ` / ` 分隔）
            const infoParts = [ownerPhone, ownerAddress].map(s=>String(s||'').trim()).filter(Boolean);
            const newP = {
              id: 'P'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
              name: ownerName.trim(),
              role: '負責人',
              info: infoParts.join(' / '),
              idNo: ownerIdNo||'',
              note: '',
            };
            all.persons = [newP, ...all.persons];
            personId = newP.id;
            try { markDirty('聯絡人', newP.id, 'upsert'); } catch{}
            
            // 把聯絡人 ID 加到公司
            if (companyId) {
              const co2 = all.companies.find(c => c.id === companyId);
              if (co2) {
                co2.personIds = [personId, ..._arr(co2.personIds)];
                try { markDirty('客戶公司', co2.id, 'upsert'); } catch{}
              }
            }
          }
          
          // 3. 店家：含 companyId 跟 personIds
          const newStore = {
            id: uid(),
            name: storeName,
            phones: storePhone ? [storePhone] : [],
            address: storeAddress||'',
            companyId: companyId,
            personIds: personId ? [personId] : [],
            note: '',
          };
          all.stores = [newStore, ...all.stores];
          try { markDirty('客戶資料', storeName, 'upsert'); } catch{}
          
          await storeHelper.set('crm_v3', JSON.stringify(all));
        }catch(e){ console.warn('建立 CRM 失敗', e); }
      }
      // 把 UI 上的「已簽」轉成最終狀態
      // - 待簽 → 待簽
      // - 已簽 + 編輯時保留原最終狀態（出租中/已退租/租送機/已期滿/已解約）→ 保留
      // - 已簽 + 新建合約 → 租賃='出租中'、租送='租送機'
      let finalStatus = status;
      if (status === '已簽') {
        if (_origFinalStatus && _origFinalStatus !== '待簽') {
          // 編輯既有合約且狀態原本就不是「待簽」→ 保留原值
          finalStatus = _origFinalStatus;
        } else {
          // 第一次簽立 → 給「初始」狀態
          finalStatus = isRentSend ? '租送機' : '出租中';
        }
      }
      ct={
        '合約號':contractNo,'狀態':finalStatus,'建立日期':todayStr(),
        contractType: ctType, // 'rental' | 'rentSend'
        brand,model,capacity,serialNo,startDate:fmtDate(startDate),
        rentAmt,depositAmt,payDay:String(payDay),payMethod,bankAccount,useYears,
        storeName,storePhone,storeAddress,
        partyBName,partyBAddress,partyBPhone,partyBTax,partyBOwner,
        ownerName,ownerPhone,ownerIdNo,ownerAddress,
      };
      let list=getContracts();
      if(isEdit){ list=list.map(c=>c['合約號']===contractNo?ct:c); }
      else { list=[ct,...list]; }
      setContracts(list);
      try { markDirty('合約', contractNo, 'upsert'); } catch{}
      if(status==='已簽'&&serialNo){
        try{
          const mc=await storeHelper.get('machines_v1');
          const all=mc?.value?JSON.parse(mc.value):{machines:[]};
          const midx=all.machines.findIndex(m=>(m['機號']||m.serialNo||'')===serialNo);
          if(midx>=0){all.machines[midx]={...all.machines[midx],'類型':'出租中','目前客戶':storeName};}
          await storeHelper.set('machines_v1',JSON.stringify(all));
          try { markDirty('機器清單', serialNo, 'upsert'); } catch{}
        }catch{}
      }
      // 先關閉再顯示 toast / 產生 PDF
      if(onSave)onSave(ct);
      if(status==='已簽'){
        showToast('✓ 已簽立，正在產生 PDF…','success');
        setTimeout(async()=>{try{await generateContractPDF(ct);showToast('✓ PDF 已下載','success');}catch{showToast('PDF 失敗','error');}},400);
      } else {
        showToast('✓ 已儲存為待簽','success');
      }
    }catch(e){
      showToast(e.message||'儲存失敗','error');
      setSaving(false);
    }
  };

  // PDF-style form styles
  const CL={fontSize:9,fontWeight:800,letterSpacing:'0.1em',display:'block',marginBottom:3,color:'#888'};
  const CB='1px solid #ddd';
  const CBd='1px solid #000';  // dark border for contract table
  const INL={background:'transparent',border:'none',borderBottom:'1px solid #aaa',outline:'none',fontFamily:'inherit',fontSize:13,color:'#111',padding:'2px 4px',width:'100%',boxSizing:'border-box'};
  const INLw=(w)=>({...INL,width:w});
  const INLB={...INL,fontWeight:700};  // bold input


  const roDate = startDate ? (()=>{
    const d=new Date(startDate);
    return {y:d.getFullYear()-1911, m:d.getMonth()+1, day:d.getDate()};
  })() : {y:'　　',m:'　　',day:'　　'};

  return(
    <div style={{position:'fixed',inset:0,zIndex:400,display:'flex',flexDirection:'column',background:'#c8c8c8'}}>
      {/* Header bar */}
      <div style={{background:'#111',height:52,display:'flex',alignItems:'center',padding:'0 14px',gap:8,flexShrink:0,borderBottom:'1px solid #222'}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#aaa',display:'flex',padding:4,cursor:'pointer'}}><IBack/></button>
        <span style={{fontWeight:800,fontSize:15,color:'#f0f0f0',flex:1}}>{isRentSend?'租送契約書':'租賃契約書'}</span>
        <div style={{display:'flex',borderRadius:6,overflow:'hidden',border:'1px solid #333'}}>
          {[['待簽','待簽'],[isRentSend?'簽立':'簽立','已簽']].map(([l,v])=>(
            <button key={v} onClick={()=>setStatus(v)}
              style={{padding:'5px 14px',fontSize:12,fontWeight:800,border:'none',cursor:'pointer',fontFamily:'inherit',
                background:status===v?(v==='已簽'?(isRentSend?'#a16207':'#0f766e'):'#444'):'transparent',
                color:status===v?'#fff':'#666'}}>{l}</button>
          ))}
        </div>
        <button onClick={save} disabled={saving}
          style={{display:'flex',alignItems:'center',gap:5,padding:'8px 16px',border:'none',borderRadius:8,color:saving?'#aaa':'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
            background:saving?'#333':status==='已簽'?'linear-gradient(135deg,#dc2626,#991b1b)':'linear-gradient(135deg,#444,#222)'}}>
          {saving?'處理中…':status==='已簽'?<><ICheck/>簽立合約</>:'儲存待簽'}
        </button>
      </div>

      {/* Contract document */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 10px 48px'}}>
        <div style={{background:'#fff',borderRadius:10,maxWidth:740,margin:'0 auto',boxShadow:'0 8px 40px rgba(0,0,0,.2)',overflow:'hidden',fontFamily:"'Noto Sans TC','PingFang TC',serif",color:'#111'}}>

          {/* 大標題 */}
          <div style={{textAlign:'center',padding:'24px 20px 16px',borderBottom:CB,background:CC}}>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:10,marginBottom:4,color:'#fff'}}>{isRentSend?'租 送 契 約 書':'租 賃 契 約 書'}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.65)'}}>合約號：{contractNo}</div>
          </div>

          {/* 立約人 + 承租人 — 同一排 */}
          <div style={{padding:'14px 24px',borderBottom:CB}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:800,fontSize:13,flexShrink:0}}>立約人</span>
              <span style={{flex:1,borderBottom:'1px solid #666',padding:'3px 6px',fontSize:13,color:'#333',minWidth:120}}>{co.name}</span>
              <span style={{fontSize:11,color:'#888',whiteSpace:'nowrap'}}>（甲方）</span>
              <span style={{fontWeight:800,fontSize:13,flexShrink:0,marginLeft:6}}>承租人</span>
              <div style={{flex:1,minWidth:120}}>
                <AutoDocInput value={storeName} onChange={setStoreName} onSelect={pickCustomer} suggestions={custNames} ph="店家名稱" dStyle={{...INL,fontSize:13,fontWeight:600}}/>
              </div>
              <span style={{fontSize:11,color:'#888',whiteSpace:'nowrap'}}>（乙方）</span>
            </div>
          </div>

          {/* 租期 */}
          <div style={{padding:'10px 24px',borderBottom:CB,fontSize:13,lineHeight:1.8}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              <span>自民國</span>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={{...INL,width:130,display:'inline-block'}}/>
              <span>{isRentSend ? `起，乙方向甲方租賃，租期 ${rsMonths} 個月，租約期滿並結清款項後，機器所有權歸乙方所有：` : '起，乙方向甲方租賃，租期不定，至任一方依本契約規定終止為止：'}</span>
            </div>
          </div>

          {/* 機器資訊 - 輸入框下拉推薦 */}
          {(()=>{
            const [mSearch,setMSearch] = [machSearch,setMachSearch];
            const mOpen = mSearch.trim().length>0;
            const mFiltered = custMachines.filter(m=>{
              const q=mSearch.toLowerCase();
              return !q||(m['廠牌']||m.brand||'').toLowerCase().includes(q)||(m['型號']||m.model||'').toLowerCase().includes(q)||(m['機號']||m.serialNo||'').toLowerCase().includes(q);
            }).slice(0,12);
            return(
              <div style={{padding:'10px 16px',borderBottom:'1px solid #e5e5e5',background:'#f9f9f9',position:'relative'}}>
                <div style={{fontSize:10,fontWeight:800,color:'#0f766e',marginBottom:6,letterSpacing:2}}>選擇機器（待出租 / 全新機）</div>
                <div style={{position:'relative'}}>
                  <input value={mSearch} onChange={e=>setMSearch(e.target.value)}
                    placeholder={custMachines.length===0?(isRentSend?'無全新機器':'無待出租 / 全新機器'):'搜尋廠牌、機型、機號…'}
                    disabled={custMachines.length===0}
                    style={{width:'100%',background:'#fff',border:'1px solid #ddd',borderRadius:7,padding:'9px 12px',fontSize:13,outline:'none',fontFamily:'inherit',boxSizing:'border-box',color:'#111'}}/>
                  {mOpen&&mFiltered.length>0&&(
                    <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #ddd',borderRadius:'0 0 7px 7px',zIndex:50,maxHeight:220,overflowY:'auto',boxShadow:'0 4px 16px rgba(0,0,0,.1)'}}>
                      {mFiltered.map((m,i)=>(
                        <div key={i}
                          onPointerDown={e=>{e.preventDefault();pickMachine(m);setMSearch('');}}
                          style={{padding:'9px 12px',cursor:'pointer',borderBottom:'1px solid #f3f4f6',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12}}
                          onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                          <span style={{fontWeight:700}}>{m['廠牌']||m.brand||''} {m['型號']||m.model||''}</span>
                          <span style={{color:'#888'}}>{m['機號']||m.serialNo||''}{(m['容量']||m.capacity)?' · '+(m['容量']||m.capacity):''}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* 機器表格（契約樣式）*/}
          <table style={{width:'100%',borderCollapse:'collapse',borderTop:'2px solid #333',borderBottom:'2px solid #333'}}>
            <tbody>
              {[['廠　牌',<input value={brand} onChange={e=>setBrand(e.target.value)} style={INL}/>],
                ['磅　數',<input value={capacity} onChange={e=>setCapacity(e.target.value)} style={INL}/>],
                ['機　型',<input value={model} onChange={e=>setModel(e.target.value)} style={INL}/>],
                ['機　號',<input value={serialNo} onChange={e=>setSerialNo(e.target.value)} style={INL}/>],
              ].map(([l,input],i,arr)=>(
                <tr key={l} style={{borderBottom:i<arr.length-1?'1px solid #ddd':'none'}}>
                  <td style={{width:120,fontWeight:800,fontSize:13,padding:'8px 16px',background:'#f8f8f8',letterSpacing:2,whiteSpace:'nowrap'}}>{l}</td>
                  <td style={{padding:'6px 12px'}}>{input}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{fontSize:11,color:'#888',padding:'6px 16px',borderBottom:CB,fontStyle:'italic'}}>（如更換設備，以工務單為準）</div>

          {/* 條款內容 */}
          {ContractSEC('條　款　內　容', CC)}
          <div style={{padding:'14px 24px',fontSize:13,lineHeight:2,borderBottom:CB}}>
            <p style={{marginBottom:10}}>
              一、租金每月
              <input type="number" value={rentAmt} onChange={e=>setRentAmt(e.target.value)} style={{...INLw(90),textAlign:'center',display:'inline-block',margin:'0 4px'}}/>
              元新台幣（未稅），每月
              <select value={payDay} onChange={e=>setPayDay(e.target.value)} style={{...INL,width:52,display:'inline-block',margin:'0 4px',textAlign:'center'}}>{Array.from({length:31},(_,i)=><option key={i+1} value={String(i+1)}>{i+1}</option>)}</select>
              日前由乙方付給甲方，付款方式為
              <select value={payMethod} onChange={e=>setPayMethod(e.target.value)} style={{...INL,width:70,display:'inline-block',margin:'0 4px'}}>
                <option>現金</option><option>匯款</option>
              </select>
              {payMethod==='匯款'&&<>，匯款帳號：<input value={bankAccount} onChange={e=>setBankAccount(e.target.value)} style={{...INLw(160),display:'inline-block',margin:'0 4px'}} placeholder="銀行 帳號"/></>}
              {isRentSend ? '。逾期未付者，甲方得催告乙方於七日內付清，屆期仍未付清者，甲方得終止本契約並取回機器，保證金不予退還。' : '。逾期未付者，每逾一日按未付金額千分之三計算遲延利息，甲方得催告乙方於七日內付清，屆期仍未付清者，甲方得終止本契約並取回機器。'}
            </p>
            <p style={{marginBottom:10}}>
              二、保證金為新台幣
              <input type="number" value={depositAmt} onChange={e=>setDepositAmt(e.target.value)} style={{...INLw(90),textAlign:'center',display:'inline-block',margin:'0 4px'}}/>
              {isRentSend 
                ? <>元整，租賃期間不得以保證金抵作租金，租賃未滿 <strong>{rsNoRefund}</strong> 個月解約，保證金不予退還。租賃未滿 <strong>{rsHalfRefund}</strong> 個月解約，保證金扣除一半。</>
                : '元整，租賃期間不得以保證金抵作租金，租約期滿機器歸還甲方且確認機器狀態無誤後，五個工作天內無息退還。租約期滿經雙方書面同意繼續租賃時，本契約書及保證金則續延之。'
              }
            </p>
            {!isRentSend && <p style={{marginBottom:10}}>三、租賃未滿一年者，由保證金扣除<strong>拆裝費新台幣三千元整</strong>。乙方若需提前解約，須<strong>提前三十日</strong>以書面通知甲方；甲方若需提前終止契約，亦須提前三十日以書面通知乙方，並退還乙方保證金全額及已預付之租金餘額，不得扣除拆裝費。</p>}
            <p style={{marginBottom:10}}>{isRentSend?'三':'四'}、租賃期間甲方應負責基礎保養及維修，遇故障時乙方應立即通知甲方，<strong>乙方不得自行或委託第三方拆修</strong>，違者所生之費用及損失由乙方自行負擔；甲方應於接獲通知後 <strong>{repairResp}</strong> 個工作天內到場修復。如無法當場排除故障，則應於到場後 <strong>{repairRepl}</strong> 日內提供同型號或同等性能之設備換機。</p>
            <p style={{marginBottom:4}}>{isRentSend?'四':'五'}、乙方應以善良管理人之注意妥善使用及保管機器。因乙方之故意或過失致機器毀損、滅失者，乙方應負損害賠償責任，賠償金額依下列方式計算：</p>
            <p style={{marginLeft:20,marginBottom:4}}>（一）可修復者：以實際維修費用為賠償基準。</p>
            <p style={{marginLeft:20,marginBottom:10}}>（二）無法修復或全損者：以機器購置原價依直線折舊法計算折舊後之現值為賠償基準，機器使用年限以
              <input value={useYears} onChange={e=>setUseYears(e.target.value)} style={{...INLw(40),textAlign:'center',display:'inline-block',margin:'0 4px',fontWeight:900}}/>
              年計算。
            </p>
            <p style={{marginBottom:10}}>{isRentSend
              ? '五、租約期滿並結清款項前，該機器所有權屬甲方，非經甲方書面同意，'
              : '六、該機器所有權屬甲方，非經甲方書面同意，'
            }<strong>乙方不得擅自遷移或轉讓</strong>。乙方違約致損害甲方權益時，願賠償損失及甲方一切訴訟費用，並拋棄先訴抗辯權。</p>
            <p style={{marginBottom:4}}>{isRentSend?'六':'七'}、若有爭執，乙方同意以臺灣板橋地方法院為第一審管轄法院。</p>
          </div>

          {/* 店家資料：左側直書 + 右側橫表 */}
          <div style={{display:'flex',alignItems:'stretch',borderBottom:CB}}>
            <div style={{width:32,background:'#f0f0f0',borderRight:'1px solid #ddd',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontWeight:900,letterSpacing:2,fontSize:13,padding:'8px 0'}}>
              <div>店</div><div>家</div><div>資</div><div>料</div>
            </div>
            <table style={{flex:1,borderCollapse:'collapse'}}>
              <tbody>
                <tr style={{borderBottom:'1px solid #eee'}}>
                  <td style={{width:80,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>店家名稱</td>
                  <td style={{fontSize:12,padding:'5px 10px',borderRight:'1px solid #eee'}}><input value={storeName} onChange={e=>setStoreName(e.target.value)} style={INL}/></td>
                  <td style={{width:60,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>電話</td>
                  <td style={{fontSize:12,padding:'5px 10px'}}><input value={storePhone} onChange={e=>setStorePhone(e.target.value)} style={INL}/></td>
                </tr>
                <tr>
                  <td style={{fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa'}}>地址</td>
                  <td colSpan={3} style={{fontSize:12,padding:'5px 10px'}}><input value={storeAddress} onChange={e=>setStoreAddress(e.target.value)} style={INL}/></td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* 甲乙方資料（只保留「甲方資料｜乙方資料」表頭，不要外層大標題） */}
          <table style={{width:'100%',borderCollapse:'collapse',borderBottom:CB}}>
            <thead>
              <tr>
                <th colSpan={2} style={{textAlign:'center',fontWeight:900,padding:'8px',border:'1px solid #ddd',background:'#f5f5f5',fontSize:12}}>甲　方　資　料</th>
                <th colSpan={2} style={{textAlign:'center',fontWeight:900,padding:'8px',border:'1px solid #ddd',background:'#f5f5f5',fontSize:12}}>乙　方　資　料</th>
              </tr>
            </thead>
            <tbody>
              {[
                ['公司抬頭', co.name, <input value={partyBName} onChange={e=>setPartyBName(e.target.value)} style={INL}/>],
                ['統一編號', co.taxId||'', <input value={partyBTax} onChange={e=>setPartyBTax(e.target.value)} style={INL}/>],
                ['電　　話', co.tel, <input value={partyBPhone} onChange={e=>setPartyBPhone(e.target.value)} style={INL}/>],
                ['地　　址', co.address, <input value={partyBAddress} onChange={e=>setPartyBAddress(e.target.value)} style={INL}/>],
                ['負 責 人', co.owner||'', <input value={partyBOwner} onChange={e=>setPartyBOwner(e.target.value)} style={INL}/>],
              ].map(([l,av,bInput],i,arr)=>(
                <tr key={l} style={{borderBottom:i<arr.length-1?'1px solid #eee':'none'}}>
                  <td style={{width:90,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>{l}</td>
                  <td style={{fontSize:12,padding:'5px 10px',borderRight:'2px solid #ccc',color:'#555'}}>{av}</td>
                  <td style={{width:90,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>{l}</td>
                  <td style={{fontSize:12,padding:'5px 8px'}}>{bInput}</td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* 負責人資料：左側直書 + 右側 [負責人｜身分證號｜電話 / 地址] */}
          <div style={{display:'flex',alignItems:'stretch',borderBottom:CB}}>
            <div style={{width:32,background:'#f0f0f0',borderRight:'1px solid #ddd',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontWeight:900,letterSpacing:2,fontSize:13,padding:'8px 0'}}>
              <div>負</div><div>責</div><div>人</div>
            </div>
            <table style={{flex:1,borderCollapse:'collapse'}}>
              <tbody>
                <tr style={{borderBottom:'1px solid #eee'}}>
                  <td style={{width:60,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>負責人</td>
                  <td style={{fontSize:12,padding:'5px 10px',borderRight:'1px solid #eee'}}><input value={ownerName} onChange={e=>setOwnerName(e.target.value)} style={INL}/></td>
                  <td style={{width:70,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>身分證號</td>
                  <td style={{fontSize:12,padding:'5px 10px',borderRight:'1px solid #eee'}}><input value={ownerIdNo} onChange={e=>setOwnerIdNo(e.target.value)} style={INL}/></td>
                  <td style={{width:60,fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>電話</td>
                  <td style={{fontSize:12,padding:'5px 10px'}}><input value={ownerPhone} onChange={e=>setOwnerPhone(e.target.value)} style={INL}/></td>
                </tr>
                <tr>
                  <td style={{fontWeight:700,fontSize:11,padding:'7px 10px',background:'#fafafa'}}>地址</td>
                  <td colSpan={5} style={{fontSize:12,padding:'5px 10px'}}><input value={ownerAddress} onChange={e=>setOwnerAddress(e.target.value)} style={INL}/></td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* 簽章 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'16px 24px',gap:20,background:`${CC}22`}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>甲　方　簽　章</div>
              {co.companyStamp
                ? <img src={co.companyStamp} alt="公司大小章" style={{display:'block',margin:'0 auto',maxWidth:200,height:80,objectFit:'contain',background:'#fff',border:`1.5px solid ${CC}`,borderRadius:6,padding:4}}/>
                : <div style={{border:`1.5px solid ${CC}`,borderRadius:6,height:80,background:'rgba(255,255,255,.85)',display:'flex',alignItems:'center',justifyContent:'center',color:CC,fontSize:13,fontWeight:700}}>{co.name}（公司章）</div>
              }
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>乙　方　簽　章</div>
              {partyBSig
                ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <img src={partyBSig} style={{display:'block',maxWidth:200,height:70,objectFit:'contain',background:'#fff',border:`2px solid ${CC}`,borderRadius:6}}/>
                    <button type="button" onClick={()=>{setPartyBSig(null);setSigPadOpen(true);}} style={{padding:'2px 10px',background:'rgba(255,255,255,.7)',border:`1px solid ${CC}`,borderRadius:4,color:CC,fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>重新簽名</button>
                  </div>
                : <button type="button" onClick={()=>setSigPadOpen(true)} style={{padding:'12px 20px',background:'rgba(255,255,255,.7)',border:`2px dashed ${CC}`,borderRadius:6,color:CC,fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:'inherit',width:'100%',height:80}}>✍️ 點此開啟簽名板</button>
              }
            </div>
          </div>
          {/* 日期 */}
          <div style={{padding:'16px 24px',borderTop:CB,textAlign:'center',fontSize:13,background:`${CC}22`}}>
            中　華　民　國
            <span style={{margin:'0 8px',fontWeight:700}}>{roDate.y}</span>年
            <span style={{margin:'0 8px',fontWeight:700}}>{roDate.m}</span>月
            <span style={{margin:'0 8px',fontWeight:700}}>{roDate.day}</span>日
          </div>

          <div style={{padding:'8px 16px',textAlign:'center',fontSize:10,color:'#bbb',borderTop:CB}}>{co.name} · {co.tel} · {co.address}</div>
        </div>
      </div>
      {sigPadOpen && <BigSigPad
        title={`${storeName||'承租人'} 簽名（乙方）`}
        borderColor={CC}
        onSave={(dataUrl)=>setPartyBSig(dataUrl)}
        onClose={()=>setSigPadOpen(false)}/>}
    </div>
  );
}



// ── ContractActionSheet：合約全螢幕檢視（待簽可簽名，已簽可下載）─────────
function ContractActionSheet({contract, onClose, onEdit, onDelete, onSigned}){
  const co = getCompany();
  const isRS = contract.contractType === 'rentSend';
  const CC = isRS ? (co.contractRentSendColor||'#a16207') : (co.contractRentColor||'#0f766e');
  const isWaiting = (contract['狀態']||'待簽')==='待簽';
  const [partyBSig, setPartyBSig] = useState(contract.partyBSig||null);
  const [sigPadOpen, setSigPadOpen] = useState(false);
  const [saving, setSaving] = useState(false);
  const [confirmTerminate, setConfirmTerminate] = useState(false);

  // 民國日期解析（合約建立日期，支援 - 或 / 格式）
  const ct = contract;
  const startDate = ct.startDate || ct['租期起'] || todayStr();
  const ds = String(startDate).split(/[-/]/);
  const yNum = Number(ds[0]);
  const mNum = Number(ds[1]);
  const dNum = Number(ds[2]);
  const roYear  = (yNum && !isNaN(yNum)) ? String(yNum-1911) : '—';
  const roMonth = (mNum && !isNaN(mNum)) ? String(mNum) : '—';
  const roDay   = (dNum && !isNaN(dNum)) ? String(dNum) : '—';
  
  const isRentSend = contract.contractType === 'rentSend';
  const rsMonths     = parseInt(co.rentSendMonths||24);
  const rsNoRefund   = parseInt(co.rentSendBreakNoRefund||6);
  const rsHalfRefund = parseInt(co.rentSendBreakHalfRefund||12);

  const dlPDF = async() => {
    try { await generateContractPDF({...contract, partyBSig: partyBSig||contract.partyBSig}); showToast('✓ PDF 已下載','success'); }
    catch(e){ showToast('PDF 失敗','error'); }
  };

  const doSign = async() => {
    if (!partyBSig) { showToast('請先取得乙方簽章','error'); return; }
    setSaving(true);
    try {
      const list = getContracts();
      const idx = list.findIndex(c => c['合約號'] === contract['合約號']);
      if (idx >= 0) {
        const cur = list[idx];
        const wasSigned = cur['狀態']!=='待簽' && cur['狀態']!=='';
        const isRS = cur.contractType === 'rentSend';
        // 狀態：原本不是「待簽」就保留；待簽 → 給初始狀態
        const newStatus = wasSigned ? cur['狀態'] : (isRS ? '租送機' : '出租中');
        list[idx] = {...cur, partyBSig, '狀態':newStatus, signedDate: cur.signedDate||todayStr()};
        setContracts(list);
        try { markDirty('合約', contract['合約號'], 'upsert'); } catch{}
        showToast(wasSigned?'✓ 已更新簽章':'✓ 合約已簽立','success');
        if (onSigned) onSigned();
        onClose();
      }
    } catch(e){ showToast('儲存失敗','error'); }
    setSaving(false);
  };

  // 退租 / 解約 處理：依合約類型判定要轉成什麼狀態
  const doTerminate = async () => {
    setSaving(true);
    try {
      const list = getContracts();
      const idx = list.findIndex(c => c['合約號'] === contract['合約號']);
      if (idx >= 0) {
        const cur = list[idx];
        const isRS = cur.contractType === 'rentSend';
        const newStatus = isRS ? '已解約' : '已退租';
        list[idx] = { ...cur, '狀態': newStatus, terminatedDate: todayStr() };
        setContracts(list);
        try { markDirty('合約', cur['合約號'], 'upsert'); } catch{}
        // 機器類型改回「◎進廠」（從客戶處收回）
        if (cur.serialNo) {
          try {
            const mc = await storeHelper.get('machines_v1');
            const all = mc?.value ? JSON.parse(mc.value) : { machines: [] };
            const midx = all.machines.findIndex(m => (m['機號']||m.serialNo||'') === cur.serialNo);
            if (midx >= 0) {
              all.machines[midx] = { ...all.machines[midx], '類型': '◎進廠', '目前客戶': '' };
              await storeHelper.set('machines_v1', JSON.stringify(all));
              try { markDirty('機器清單', cur.serialNo, 'upsert'); } catch{}
            }
          } catch{}
        }
        showToast(isRS ? '✓ 合約已解約' : '✓ 已退租','success');
        if (onSigned) onSigned();
        onClose();
      }
    } catch(e) { showToast('處理失敗','error'); }
    setSaving(false);
    setConfirmTerminate(false);
  };

  // 偵測是否有變動需要儲存（已簽合約重新簽名後）
  const sigChanged = !!partyBSig && partyBSig !== contract.partyBSig;

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,background:'#1a1a1a',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'#111',padding:'10px 14px',display:'flex',alignItems:'center',gap:8,flexShrink:0,borderBottom:'1px solid #222'}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#aaa',display:'flex',padding:4,cursor:'pointer'}}><IBack/></button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:'#f0f0f0'}}>{contract.storeName||'承租人'}</div>
          <div style={{fontSize:10,color:'#666'}}>{contract['合約號']} · {contract['狀態']||'待簽'}</div>
        </div>
        <button onClick={dlPDF} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(107,114,128,.15)',border:'1px solid rgba(107,114,128,.3)',borderRadius:6,color:'#9ca3af',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>📄 PDF</button>
        {/* 退租/解約：依合約類型 + 當前狀態判定 */}
        {(() => {
          const st = contract['狀態']||'';
          const isRS = contract.contractType === 'rentSend';
          // 租賃 + 出租中 → 退租
          if (!isRS && st === '出租中') {
            return <button onClick={()=>setConfirmTerminate(true)} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(220,38,38,.12)',border:'1px solid rgba(220,38,38,.3)',borderRadius:6,color:'#f87171',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>退租</button>;
          }
          // 租送 + 租送機 → 解約
          if (isRS && st === '租送機') {
            return <button onClick={()=>setConfirmTerminate(true)} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(220,38,38,.12)',border:'1px solid rgba(220,38,38,.3)',borderRadius:6,color:'#f87171',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>解約</button>;
          }
          return null;
        })()}
        <button onClick={onEdit} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:6,color:'#60a5fa',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}><IEdit/>編輯</button>
        <button onClick={onDelete} style={{display:'flex',padding:6,background:'rgba(220,38,38,.1)',border:'1px solid rgba(220,38,38,.25)',borderRadius:6,color:'#f87171',cursor:'pointer'}}><ITrash/></button>
      </div>

      {/* 合約內容（簡化檢視）*/}
      <div style={{flex:1,overflowY:'auto',background:'#c8c8c8',padding:'12px'}}>
        <div style={{maxWidth:780,margin:'0 auto',background:'#fff',color:'#111',borderRadius:8,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.3)'}}>
          {/* 標題 */}
          <div style={{padding:'18px',background:CC,color:'#fff',textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:18,letterSpacing:'.2em'}}>{isRentSend?'製冰機租送契約書':'製冰機租賃契約書'}</div>
            <div style={{fontSize:11,marginTop:4,opacity:.9}}>合約號：{contract['合約號']}</div>
          </div>

          {/* 立約人 */}
          <div style={{padding:'14px 18px',borderBottom:'1px solid #e5e7eb',fontSize:12,lineHeight:1.8}}>
            <div><strong>立約人：</strong></div>
            <div style={{marginLeft:14,color:'#444'}}>甲方：{co.name}</div>
            <div style={{marginLeft:14,color:'#444'}}>乙方：{contract.storeName}</div>
          </div>

          {/* 租期 */}
          <div style={{padding:'10px 18px',borderBottom:'1px solid #e5e7eb',fontSize:12,lineHeight:1.8}}>
            <div>自民國 {roYear} 年 {roMonth} 月 {roDay} 日起，乙方向甲方租賃，</div>
            <div>{isRentSend ? `租期 ${rsMonths} 個月，租約期滿並結清款項後，機器所有權歸乙方所有：` : '租期不定，至任一方依本契約規定終止為止：'}</div>
          </div>

          {/* 機器資訊 */}
          <div style={{padding:'10px 18px',borderBottom:'1px solid #e5e7eb',fontSize:12}}>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 80px 1fr',gap:6,padding:'6px',background:CC,color:'#fff',fontWeight:700,marginBottom:4,borderRadius:4,opacity:.85}}>
              <div>廠　　牌</div><div>機　　型</div><div>容　　量</div><div>機　　號</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 80px 1fr',gap:6,padding:'4px 6px',color:'#444'}}>
              <div>{contract.brand||'—'}</div>
              <div>{contract.model||'—'}</div>
              <div>{contract.capacity||'—'}</div>
              <div>{contract.serialNo||'—'}</div>
            </div>
          </div>

          {/* 條款 */}
          <div style={{padding:'14px 18px',fontSize:11,lineHeight:1.7,color:'#333'}}>
            <p style={{margin:'4px 0'}}>{isRentSend
              ? <>一、租金每月 <strong>{Number(contract.rentAmt||0).toLocaleString()}</strong> 元新台幣（未稅），每月 <strong>{contract.payDay||'—'}</strong> 日前由乙方付給甲方，付款方式為 <strong>{contract.payMethod||'—'}</strong>。逾期未付者，甲方得催告乙方於七日內付清，屆期仍未付清者，甲方得終止本契約並取回機器，保證金不予退還。</>
              : <>一、租金每月 <strong>{Number(contract.rentAmt||0).toLocaleString()}</strong> 元新台幣（未稅），每月 <strong>{contract.payDay||'—'}</strong> 日前由乙方付給甲方，付款方式為 <strong>{contract.payMethod||'—'}</strong>。逾期未付者，每逾一日按未付金額千分之三計算遲延利息。</>
            }</p>
            <p style={{margin:'4px 0'}}>{isRentSend
              ? <>二、保證金為新台幣 <strong>{Number(contract.depositAmt||0).toLocaleString()}</strong> 元整，租賃期間不得以保證金抵作租金，租賃未滿 <strong>{rsNoRefund}</strong> 個月解約，保證金不予退還。租賃未滿 <strong>{rsHalfRefund}</strong> 個月解約，保證金扣除一半。</>
              : <>二、保證金為新台幣 <strong>{Number(contract.depositAmt||0).toLocaleString()}</strong> 元整，租賃期間不得以保證金抵作租金。</>
            }</p>
            {!isRentSend && <p style={{margin:'4px 0'}}>三、租賃未滿一年者，由保證金扣除<strong>拆裝費新台幣三千元整</strong>。乙方若需提前解約，須<strong>提前三十日</strong>以書面通知甲方。</p>}
            <p style={{margin:'4px 0'}}>{isRentSend?'三':'四'}、租賃期間甲方應負責基礎保養及維修，<strong>乙方不得自行或委託第三方拆修</strong>。</p>
            <p style={{margin:'4px 0'}}>{isRentSend?'四':'五'}、乙方應以善良管理人之注意妥善使用及保管機器。因乙方故意或過失致機器毀損，賠償依機器使用年限 <strong>{contract.useYears||10}</strong> 年計算折舊後現值為基準。遇地震、颱風、政府徵用等不可抗力情形，乙方不負賠償責任，但須於知悉後二十四小時內通知甲方。</p>
            <p style={{margin:'4px 0'}}>{isRentSend
              ? <>五、租約期滿並結清款項前，該機器所有權屬甲方，<strong>乙方不得擅自遷移或轉讓</strong>。乙方違約致損害甲方權益時，願賠償損失及甲方一切訴訟費用，並拋棄先訴抗辯權。</>
              : <>六、該機器所有權屬甲方，<strong>乙方不得擅自遷移或轉讓</strong>。乙方違約致損害甲方權益時，願賠償損失及甲方一切訴訟費用，並拋棄先訴抗辯權。</>
            }</p>
            <p style={{margin:'4px 0'}}>{isRentSend?'六':'七'}、若有爭執，乙方同意以臺灣板橋地方法院為第一審管轄法院。</p>
          </div>

          {/* 店家資料 */}
          <div style={{display:'flex',alignItems:'stretch',borderTop:'1px solid #e5e7eb',borderBottom:'1px solid #e5e7eb'}}>
            <div style={{width:30,background:'#f0f0f0',borderRight:'1px solid #ddd',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontWeight:900,letterSpacing:2,fontSize:12,padding:'6px 0'}}>
              <div>店</div><div>家</div><div>資</div><div>料</div>
            </div>
            <table style={{flex:1,borderCollapse:'collapse'}}>
              <tbody>
                <tr style={{borderBottom:'1px solid #eee'}}>
                  <td style={{width:80,fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>店家名稱</td>
                  <td style={{fontSize:12,padding:'6px 10px',borderRight:'1px solid #eee'}}>{contract.storeName||'—'}</td>
                  <td style={{width:60,fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>電話</td>
                  <td style={{fontSize:12,padding:'6px 10px'}}>{contract.storePhone||'—'}</td>
                </tr>
                <tr>
                  <td style={{fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa'}}>地址</td>
                  <td colSpan={3} style={{fontSize:12,padding:'6px 10px'}}>{contract.storeAddress||'—'}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* 甲乙方資料 */}
          <table style={{width:'100%',borderCollapse:'collapse',borderBottom:'1px solid #e5e7eb',tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:'18%'}}/>
              <col style={{width:'32%'}}/>
              <col style={{width:'18%'}}/>
              <col style={{width:'32%'}}/>
            </colgroup>
            <thead>
              <tr>
                <th colSpan={2} style={{textAlign:'center',fontWeight:900,padding:'7px',border:'1px solid #ddd',background:'#f5f5f5',fontSize:12}}>甲　方　資　料</th>
                <th colSpan={2} style={{textAlign:'center',fontWeight:900,padding:'7px',border:'1px solid #ddd',background:'#f5f5f5',fontSize:12}}>乙　方　資　料</th>
              </tr>
            </thead>
            <tbody>
              {[
                ['公司抬頭', co.name||'', contract.partyBName||''],
                ['統一編號', co.taxId||'', contract.partyBTax||''],
                ['電　　話', co.tel||'', contract.partyBPhone||''],
                ['地　　址', co.address||'', contract.partyBAddress||''],
                ['負 責 人', co.owner||'', contract.partyBOwner||''],
              ].map(([l,av,bv],i,arr)=>(
                <tr key={l} style={{borderBottom:i<arr.length-1?'1px solid #eee':'none'}}>
                  <td style={{fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>{l}</td>
                  <td style={{fontSize:12,padding:'6px 10px',borderRight:'2px solid #ccc',wordBreak:'break-all'}}>{av||'—'}</td>
                  <td style={{fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>{l}</td>
                  <td style={{fontSize:12,padding:'6px 10px',wordBreak:'break-all'}}>{bv||'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* 負責人資料 */}
          <div style={{display:'flex',alignItems:'stretch',borderBottom:'1px solid #e5e7eb'}}>
            <div style={{width:30,background:'#f0f0f0',borderRight:'1px solid #ddd',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontWeight:900,letterSpacing:2,fontSize:12,padding:'6px 0'}}>

            </div>
            <table style={{flex:1,borderCollapse:'collapse'}}>
              <tbody>
                <tr style={{borderBottom:'1px solid #eee'}}>
                  <td style={{width:60,fontWeight:700,fontSize:11,padding:'6px 10px',background:'#fafafa',whiteSpace:'nowrap'}}>負責人</td>
                  <td style={{fontSize:12,padding:'6px 10px',borderRight:'1px solid #eee'}}>{contract.ownerName||'—'}</td>

              {(partyBSig||contract.partyBSig)
                ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>

  const isAdmin = currentUser?.role === 'admin';
  const myName  = currentUser?.name || '';

    if(isAdmin || !myName) return null; // null = 不限
    const ids = new Set();

      const staff = parseArr(w['執行人員']);

      const rows = parseArr(w['工作明細'])||[];

  const visibleContracts = useMemo(()=>{
    if(!allowedContractIds) return contracts;
    return contracts.filter(c => allowedContractIds.has(c['合約號']));

// ── 租期算法 ──────────────────────────────────────────────────────────────
// 起算 = 裝機完成日 +1，每期 30 天
function addDays(dateStr, days){
  if(!dateStr) return '';
  const d = new Date(String(dateStr).replace(/-/g,'/'));
  if(isNaN(d.getTime())) return '';
  d.setDate(d.getDate()+days);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function diffDays(d1, d2){
  if(!d1||!d2) return 0;
  const a = new Date(String(d1).replace(/-/g,'/'));
  const b = new Date(String(d2).replace(/-/g,'/'));
  return Math.round((b.getTime()-a.getTime())/86400000);
}
// 對於合約 c，計算下一期租期
// installCompletionDate 為裝機完成日（沒有則 fallback 到 startDate）
// lastBilledTo 為上次計費結束日（沒有則第一期）
function calcNextBillingPeriod(c){
  const baseDate = c.installCompletionDate || c.startDate || c['租借日期'];
  if(!baseDate) return null;
  if(!c.lastBilledTo){
    // 第一期：完成日+1 起，30 天
    const from = addDays(baseDate, 1);
    const to = addDays(from, 29); // +1 起算共 30 天
    return { from, to, period: 1 };
  }
  // 後續：lastBilledTo+1 起，30 天
  const from = addDays(c.lastBilledTo, 1);
  const to = addDays(from, 29);
  // period 編號：算第幾期
  const total = diffDays(addDays(baseDate,1), to);
  const period = Math.ceil((total+1)/30);
  return { from, to, period };
}
// 找出今天起 30 天內到期的待收清單
function getDueRentals(daysAhead=30){
  const contracts = getContracts();
  const today = todayStr();
  const result = [];
  // 只抓「目前在租中」的合約：出租中 / 租送機 / 已簽（舊資料相容）
  const ACTIVE = new Set(['出租中','租送機','已簽']);
  contracts.forEach(c=>{
    if(!ACTIVE.has(c['狀態']||'')) return;
    if(c.terminated) return; // 已終止
    const next = calcNextBillingPeriod(c);
    if(!next) return;
    const daysToDue = diffDays(today, next.to);
    // 顯示條件：到期日在 -∞ ~ +daysAhead 之間（已逾期 + 未來 30 天內）
    if(daysToDue <= daysAhead){
      result.push({ contract:c, period:next, daysToDue });
    }
  });
  return result.sort((a,b)=>a.daysToDue-b.daysToDue);
}
// 找出該客戶該期間是否已開過收租簽單
function findExistingRentSign(contractId, fromDate){
  try{
    const wo = JSON.parse(localStorage.getItem('tk_work')||'[]');
    return wo.find(w=>{
      const rows = parseArr(w['工作明細'])||[];
      return rows.some(r=>r._k==='rental' && r.contractId===contractId && r.rentFrom===fromDate);
    });
  }catch{ return null; }
}

// ── RentManagementPage：應收租金管理頁 ────────────────────────────────────
function RentManagementPage({onCreateRentSign}){
  const [refreshKey, setRefreshKey] = useState(0);
  const today = todayStr();
  
  const dueList = useMemo(()=>getDueRentals(30), [refreshKey]);
  
  // 分類：已收 / 未收（待收+逾期）
  const items = useMemo(()=>dueList.map(d=>{
    const existing = findExistingRentSign(d.contract['合約號'], d.period.from);
    const status = existing
      ? (existing['付款狀態']==='付清' ? 'paid' : 'pending')
      : 'unbilled';
    return { ...d, existing, status };

// ── LoginScreen：選職員 + 輸入 PIN ───────────────────────────────────
function LoginScreen({onLogin}){
  const [name, setName] = useState('');
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [pulling, setPulling] = useState(false);
  const [initialPulled, setInitialPulled] = useState(false);
  
  // 第一次開啟畫面：若本機沒快取職員名單，自動從試算表拉取
  React.useEffect(() => {
    const co = getCompany();
    const staff = co.staff || [];
    if (staff.length === 0 && co.appsScriptUrl) {
      setPulling(true);
      pullStaffFromSheet()
        .then(()=>{ setInitialPulled(true); setPulling(false); })
        .catch(()=>{ setPulling(false); });
    }
  }, []);
  
  const tryLogin = async () => {
    setError('');
    const n = (name||'').trim();
    if (!n) { setError('請輸入姓名'); return; }
    
    const co = getCompany();
    const staff = co.staff || [];
    
    // 找匹配的職員（不分大小寫）
    let found = staff.find(s => (s.name||'').trim().toLowerCase() === n.toLowerCase());
    
    // 找不到 → 從試算表拉一次再找
    if (!found && co.appsScriptUrl && !pulling) {
      setPulling(true);
      setError('查無此人，正在從試算表更新…');
      try {
        const fresh = await pullStaffFromSheet();
        found = (fresh||[]).find(s => (s.name||'').trim().toLowerCase() === n.toLowerCase());
      } catch(e) {}
      setPulling(false);
    }
    
    if (!found) {
      setError('查無此職員（請確認姓名或試算表上是否已新增）');
      return;
    }
    
    // PIN 驗證
    const staffPin = String(found.pin||'').trim();
    if (!staffPin) {
      // 試算表的 PIN 留空 → 不允許登入，要求設 PIN
      setError('此帳號尚未設定 PIN，請先跟主管設定 PIN 碼');
      return;
    }
    if (staffPin !== String(pin||'').trim()) { 
      setError('PIN 錯誤'); 
      return; 
    }
    
    setAuth({ name: found.name, role: found.role||'staff', loginAt: new Date().toISOString() });
    onLogin();
  };
  
  const co = getCompany();
  const hasStaff = (co.staff||[]).length > 0;

  return (
    <div style={{position:'fixed',inset:0,background:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',padding:20,zIndex:9999}}>
      <div style={{maxWidth:380,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:32,fontWeight:900,color:'#dc2626',letterSpacing:'.1em',marginBottom:6}}>{co.systemTitle || '統晉企業'}</div>
          <div style={{fontSize:12,color:'#666',letterSpacing:'.2em'}}>SERVICE  ·  RENTAL  ·  REPAIR</div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:'#888',letterSpacing:'.08em',display:'block',marginBottom:6}}>姓名</label>
          <input type="text" value={name} onChange={e=>{setName(e.target.value);setError('');}}
            onKeyDown={e=>{if(e.key==='Enter')tryLogin();}}
            placeholder="請輸入姓名"
            style={{width:'100%',padding:'14px 16px',background:'#1a1a1a',border:`1px solid ${error?'#dc2626':'#2a2a2a'}`,borderRadius:10,color:'#fff',fontSize:15,outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:'#888',letterSpacing:'.08em',display:'block',marginBottom:6}}>PIN（4-6 碼數字）</label>
          <input type="password" inputMode="numeric" value={pin} onChange={e=>{setPin(e.target.value);setError('');}}
            onKeyDown={e=>{if(e.key==='Enter')tryLogin();}}
            placeholder="••••"
            style={{width:'100%',padding:'14px 16px',background:'#1a1a1a',border:`1px solid ${error?'#dc2626':'#2a2a2a'}`,borderRadius:10,color:'#fff',fontSize:18,letterSpacing:'.5em',textAlign:'center',outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
        </div>

        {error && <div style={{fontSize:12,color:'#f87171',textAlign:'center',marginBottom:10,lineHeight:1.5}}>{error}</div>}

        <button onClick={tryLogin} disabled={pulling}
          style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#dc2626,#991b1b)',border:'none',borderRadius:9,color:'#fff',fontSize:15,fontWeight:800,cursor:pulling?'wait':'pointer',fontFamily:'inherit',marginBottom:10,opacity:pulling?.5:1}}>
          {pulling?'⌛ 連線試算表中…':'登入'}
        </button>

        <div style={{textAlign:'center',marginTop:14,fontSize:10,color:'#444',lineHeight:1.6}}>
          {hasStaff 
            ? `本機已快取 ${(co.staff||[]).length} 位職員${initialPulled?'（剛剛已更新）':''}` 
            : (pulling ? '正在從試算表拉取職員名單…' : '尚未拉取職員名單，登入時會自動取得')
          }
          <br/>
          職員資料統一管理於試算表「職員名單」分頁
        </div>
      </div>
    </div>
  );
}


// ── Cloud Sync: 同步至 Google Sheets / Drive ──────────────────────────
const SYNC_KEY = 'tk_sync_state'; // 上次同步時間 + dirty queue
const getSyncState = () => { try { return JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'); } catch { return {}; } };
const setSyncState = (s) => { try { localStorage.setItem(SYNC_KEY, JSON.stringify(s)); } catch{} };

// 標記某筆資料為「待同步」
function markDirty(table, id, op){
  const s = getSyncState();
  s.dirty = s.dirty || [];
  // 同 id 已存在 → 升級 op
  const existing = s.dirty.findIndex(d=>d.table===table && d.id===id);
  if(existing>=0){
    if(op==='delete') s.dirty[existing] = {table,id,op};
    // upsert 不覆蓋 delete
  } else {
    s.dirty.push({table,id,op,t:Date.now()});
  }
  setSyncState(s);
  // 觸發 debounced 自動同步
  scheduleSync();
}

// Debounced 自動同步（任何資料變動後 3 秒沒新動作就推送）
let _syncTimer = null;
let _syncing = false;
function scheduleSync(delay){
  try {
    const co = getCompany();
    if(!co.appsScriptUrl) return; // 沒設 URL = 等同關閉同步
  } catch { return; }
  const wait = typeof delay === 'number' ? delay : 3000;
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    // 若另一個同步正在執行 → 不要放棄，等 2 秒再試
    if ((typeof window !== 'undefined' && window._syncing) || _syncing) {
      console.log('[scheduleSync] 偵測到其他同步進行中，2 秒後重排');
      scheduleSync(2000);
      return;
    }
    _syncing = true;
    try { window._syncing = true; } catch{}
    try {
      await pushToSheet('upsert');
      try { window.dispatchEvent(new CustomEvent('tk-sync-done')); } catch{}
    }
    catch(e){ console.warn('[autoSync]', e.message); }
    _syncing = false;
    try { window._syncing = false; } catch{}

    // 完成後若 dirty queue 還有 delete → 表示這次未清掉，再排一次重試
    try {
      const after = getSyncState();
      const stillPendingDelete = (after.dirty||[]).some(d => d.op === 'delete');
      if (stillPendingDelete) {
        console.log('[scheduleSync] 還有待刪資料 → 10 秒後重試');
        scheduleSync(10000);
      }
    } catch{}
  }, wait);
}

// 收集所有資料變成 8 張表
function collectAllData(){
  const ls = (k, def='[]') => { try { return JSON.parse(localStorage.getItem(k)||def); } catch { return JSON.parse(def); } };
  
  const crm = ls('crm_v3','{"stores":[],"companies":[],"persons":[]}');
  const machData = ls('machines_v1','{"machines":[]}');
  const quote = ls('quotation_v1','{"iceMachines":[],"parts":[],"repairs":[]}');
  const workOrders = ls('tk_work','[]');
  const contracts = ls('tk_contracts','[]');
  const payment = ls('tk_pay','[]');
  const co = getCompany();
  
  // 客戶公司
  const companies = (crm.companies||[]).map(c=>{
    const id = c.id||('C'+(c.title||'').slice(0,4));
    return {
      '公司ID': id, '公司名稱': c.title||c['公司名稱']||'', '統一編號': c.taxId||'',
      '電話': c.phone||'', '地址': c.address||'',
      '聯絡人IDs': _arr(c.personIds).join(', '), '備註': c.note||''
    };
  });
  
  // 客戶資料
  const stores = (crm.stores||[]).map(s=>{
    const id = s.id||('S'+(s.name||'').slice(0,4));
    return {
      '客戶ID': id, '客戶名稱': s.name||s['店家名稱']||'',
      '電話': (Array.isArray(s.phones)?s.phones:[s.phones||'']).filter(Boolean).join(', '),
      '地址': s.address||s['地址']||'', '所屬公司ID': s.companyId||'',
      '聯絡人IDs': _arr(s.personIds).join(', '),
      '備註': s.note||'', '建立日期': s.createdAt||''
    };
  });
  
  // 聯絡人 — 只同步「有被店家或公司連結到」的聯絡人
  // 沒被連結的「孤立聯絡人」不推送（也會自動標記刪除以清理試算表）
  const linkedPersonIds = new Set();
  (crm.stores||[]).forEach(s => _arr(s.personIds).forEach(id => id && linkedPersonIds.add(String(id))));
  (crm.companies||[]).forEach(c => _arr(c.personIds).forEach(id => id && linkedPersonIds.add(String(id))));
  
  // 找出孤立的並自動標記刪除（會在這次同步時一起刪掉試算表上的列）
  // ⚠️ 只標尚未在 dirty queue 中的，避免每次 collect 都重複 push 同樣的 delete
  const allPersons = crm.persons || [];
  const orphans = allPersons.filter(p => p.id && !linkedPersonIds.has(String(p.id)));
  try {
    const _ss = getSyncState();
    const _existingDirtyContactIds = new Set((_ss.dirty||[]).filter(d=>d.table==='聯絡人').map(d=>String(d.id)));
    orphans.forEach(p => {
      if (_existingDirtyContactIds.has(String(p.id))) return; // 已在 queue → 不重複加
      try { markDirty('聯絡人', p.id, 'delete'); } catch{}
    });
  } catch {
    orphans.forEach(p => { try { markDirty('聯絡人', p.id, 'delete'); } catch{} });
  }
  
  const persons = allPersons
    .filter(p => p.id && linkedPersonIds.has(String(p.id)))
    .map(p => ({
      '聯絡人ID': p.id, '姓名': p.name||'', '職稱': p.role||'',
      '聯絡資訊': p.info||p.phone||'', '備註': p.note||''
    }));
  
  // 機器清單
  const machines = (machData.machines||[]).map(m=>({
    '廠牌': m['廠牌']||m.brand||'', '機型': m['型號']||m.model||'',
    '機號': m['機號']||m.serialNo||'', '冰型': m['冰型']||m.iceType||'',
    '磅數': String(m['容量']||m.capacity||'').replace('磅','').trim(),
    '電壓': m.voltage||'',
    '冷媒': m.coolant||m.refrigerant||'',
    '散熱': m.cooling||'',
    '類型': m['類型']||m.type||'', '目前客戶': m['目前客戶']||m.customer||''
  }));
  
  // 合約
  const contractRows = contracts.map(c=>({
    '合約ID': c['合約號']||'',
    '狀態': c['狀態']||'', 
    '建立日期': c['建立日期']||'', '簽立日期': c.signedDate||'',
    '客戶名稱': c.storeName||'', '廠牌': c.brand||'', '機型': c.model||'',
    '機號': c.serialNo||'', '磅數': String(c.capacity||'').replace('磅','').trim(),
    '起租日': c.startDate||'', '裝機完成日': c.installCompletionDate||'',
    '上次計費迄日': c.lastBilledTo||'',
    '月租金': c.rentAmt||'', '押金': c.depositAmt||'',
    '繳租日': c.payDay||'', '付款方式': c.payMethod||'',
    '匯款帳號': c.bankAccount||'',
    '終止日期': c.terminatedDate||'',
    '乙方簽章URL': c.partyBSig || '',
    'PDF URL': c.pdfUrl||'',
    '備註': c.note||''
  }));
  
  // 簽單：每張單的第一列含主檔欄位，後續列只填明細
  // 表頭：單號 | 紀錄日期 | 執行人員 | 完成日期 | 客戶名稱 | 序號 | 類型 | 服務類型 |
  //        機型 | 機號 | 品名 | 數量 | 租期起 | 租期迄 | 金額 | 含稅 | 稅後金額 |
  //        總金額 | 收款方式 | 付款狀態 | 收款日期 | 備註 | 發票號碼 | 合約ID
  const signRows = [];
  workOrders.forEach(w => {
    const detailRows = parseArr(w['工作明細']) || [];
    // 把工作明細展平成一行一筆（維修要把 items 展開）
    const flatDetails = [];
    detailRows.forEach((r, i) => {
      let typeLabel = '';
      if (r._k==='con') typeLabel='施工';
      else if (r._k==='repair') typeLabel='維修';
      else if (r._k==='rental') typeLabel='租賃';
      else if (r._k==='misc') typeLabel='外務';
      else if (r._k==='material') typeLabel='材料';
      else if (r._k==='other') typeLabel='其他';
      
      if (r._k==='repair') {
        // 維修：每個 items 一列
        (r.items||[]).forEach(it => {
          flatDetails.push({
            類型:'維修', 服務類型:'',
            機型: r.model||'', 機號: r.serial||'',
            品名: it.name||'', 數量: '',
            租期起:'', 租期迄:'',
            金額: Number(it.amount||0), 含稅: !!it.tax,
            稅後金額: it.tax ? Math.round(Number(it.amount||0)*1.05) : Number(it.amount||0),
            備註:'',
          });
        });
      } else if (r._k==='rental') {
        // 租賃：可能有租金、可能有押金（最多兩列）
        if (r.hasRent && r.rentAmt) {
          const amt = Number(r.rentAmt);
          flatDetails.push({
            類型:'租賃', 服務類型:'月租金',
            機型: r.model||'', 機號: r.serial||'',
            品名:'月租金', 數量:'',
            租期起: r.rentFrom||'', 租期迄: r.rentTo||'',
            金額: amt, 含稅: !!r.rentTax,
            稅後金額: r.rentTax ? Math.round(amt*1.05) : amt,
            備註:'',
          });
        }
        if (r.hasDeposit && r.depositAmt) {
          flatDetails.push({
            類型:'租賃', 服務類型:'押金',
            機型: r.model||'', 機號: r.serial||'',
            品名:'押金', 數量:'',
            租期起:'', 租期迄:'',
            金額: Number(r.depositAmt), 含稅: false,
            稅後金額: Number(r.depositAmt),
            備註:'',
          });
        }
      } else {
        const amt = Number(r.amount||0);
        const taxFlag = !!r.tax;
        flatDetails.push({
          類型: typeLabel, 服務類型: r.serviceType||r.miscType||'',
          機型: r.model||r.newModel||'', 機號: r.serial||r.newSerial||'',
          品名: r.name||r.desc||r.miscType||'', 數量: r.qty||'',
          租期起: r.rentFrom||'', 租期迄: r.rentTo||'',
          金額: amt, 含稅: taxFlag,
          稅後金額: taxFlag ? Math.round(amt*1.05) : amt,
          備註: '',
        });
      }
    });
    
    // 沒有任何明細 → 仍輸出一列（只有主檔，明細欄位空）
    if (flatDetails.length === 0) {
      flatDetails.push({
        類型:'', 服務類型:'',
        機型:'', 機號:'',
        品名:'', 數量:'',
        租期起:'', 租期迄:'',
        金額:'', 含稅:false, 稅後金額:'',
        備註:'',
      });
    }
    
    // 取合約ID（從第一筆有 contractId 的明細取）
    const contractId = detailRows.find(r => r.contractId)?.contractId || '';
    
    flatDetails.forEach((d, idx) => {
      const isFirst = idx === 0;
      signRows.push({
        '單號': w['單號']||'',
        '紀錄日期': isFirst ? (w['紀錄日期']||'') : '',
        '執行人員': isFirst ? ((parseArr(w['執行人員'])||[]).join(', ')) : '',
        '完成日期': isFirst ? (w['完成日期']||'') : '',
        '客戶名稱': isFirst ? (w['客戶名稱']||'') : '',
        '序號': idx + 1,
        '類型': d.類型,
        '服務類型': d.服務類型,
        '機型': d.機型,
        '機號': d.機號,
        '品名': d.品名,
        '數量': d.數量,
        '租期起': d.租期起,
        '租期迄': d.租期迄,
        '金額': d.金額,
        '含稅': d.含稅,
        '稅後金額': d.稅後金額,
        '總金額': isFirst ? (w['總金額']||'') : '',
        '收款方式': isFirst ? (w['收款方式']||'') : '',
        '付款狀態': isFirst ? (w['付款狀態']||'') : '',
        '收款日期': isFirst ? (w['收款日期']||'') : '',
        '備註': isFirst ? (w['備註']||d.備註||'') : (d.備註||''),
        '發票號碼': '',
        '合約ID': isFirst ? contractId : '',
      });
    });
  });
  
  // 報價
  // 處理可能是陣列或字串的 chip 欄位
  const arrJoin = v => Array.isArray(v) ? v.join('/') : (v||'');
  const fmtSize = (w,d,h) => (w||d||h) ? [w,d,h].filter(Boolean).join('×') : '';
  
  const iceQuote = (quote.iceMachines||[]).map(q=>({
    '廠牌': q.brand||'', '機型': q.model||'',
    '冰型': arrJoin(q.iceType),
    '磅數': arrJoin(q.capacity),
    '電壓': arrJoin(q.voltage),
    '冷媒': arrJoin(q.coolant),
    '散熱': arrJoin(q.cooling),
    '租金': q.rent||'',
    '租送 月數': q.rentSendMonths || co.rentSendMonths || 24,
    '租送 租金': q.rentDel||'',
    '租送 押金': q.deposit||'',
    '售價': q.price||'',
    '寬深高': fmtSize(q.width, q.depth, q.height),
    '儲冰量': q.iceStorage||'',
    '新機庫存': q.newStock||'', '待租庫存': q.rentStock||'',
    '停售': !!q.stopped, '附註': q.note||''
  }));
  
  const partsQuote = (quote.parts||[]).map(p=>({
    '名稱': p.name||'', '價格': p.price||'',
    '庫存': p.stock||'', '狀態': p.status||'', '附註': p.note||''
  }));
  
  const repairQuote = (quote.repairs||[]).map(r=>({
    '名稱': r.name||'', '價格': r.price||'',
    '庫存': r.stock||'', '狀態': r.status||'', '附註': r.note||''
  }));
  
  // 收款 — 主鍵「單號」（一張簽單一筆收款）
  // 欄位：單號 | 客戶名稱 | 服務日期 | 應收金額 | 付款狀態 | 收款方式 | 收款日期 | 請款單號 | 備註
  const seenPayNos = new Set();
  const paymentRows = (payment||[])
    .filter(p => {
      const no = p['單號'] || '';
      if (!no || seenPayNos.has(no)) return false;
      seenPayNos.add(no);
      return true;
    })
    .map(p => ({
      '單號': p['單號']||'',
      '客戶名稱': p['客戶名稱']||'',
      '服務日期': p['服務日期']||'',
      '應收金額': p['應收金額']||'',
      '付款狀態': p['付款狀態']||'未付',
      '收款方式': p['收款方式']||'',
      '收款日期': p['收款日期']||'',
      '請款單號': p['請款單號']||'',
      '備註': p['備註']||'',
    }));
  
  return {
    // ⚠️ 不推送職員名單（避免覆蓋試算表的個資）— 系統只「拉取」
    '客戶公司': companies,
    '客戶資料': stores,
    '聯絡人': persons,
    '機器清單': machines,
    '合約': contractRows,
    '簽單': signRows,
    '製冰機 報價': iceQuote,
    '材料 報價': partsQuote,
    '維修 報價': repairQuote,
    '收款': paymentRows,
  };
}

// 推送到 Apps Script
async function pushToSheet(mode='upsert'){
  const co = getCompany();
  if(!co.appsScriptUrl) throw new Error('未設定 Apps Script URL');
  const data = collectAllData();
  // 從 dirty queue 取出刪除指令
  const syncState = getSyncState();
  const deletes = (syncState.dirty||[]).filter(d=>d.op==='delete');

  console.log('[push] 開始推送', {
    dirtyCount: (syncState.dirty||[]).length,
    deleteCount: deletes.length,
    deletes: deletes,
    dataSize: Object.fromEntries(Object.entries(data).map(([k,v])=>[k,Array.isArray(v)?v.length:'?']))
  });

  const payload = { mode, timestamp: new Date().toISOString(), data, deletes };

  const resp = await fetch(co.appsScriptUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  });
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const txt = await resp.text();
  let result;
  try { result = JSON.parse(txt); } catch { result = {raw:txt}; }

  console.log('[push] Apps Script 回應', result);
  if (result && result.deleteResult) {
    console.log('[push] 刪除結果 (deleteResult):', JSON.stringify(result.deleteResult, null, 2));
  }
  if (result && result.upsertError) {
    console.warn('[push] Upsert 錯誤:', result.upsertError);
  }
  if (result && result.deleteError) {
    console.warn('[push] Delete 錯誤:', result.deleteError);
  }

  // 同步成功 → 更新時間、清空 dirty queue
  const s = getSyncState();
  s.lastSyncAt = new Date().toISOString();
  if (result && result.ok === true) {
    // upsert 部分：若 Apps Script 沒爆 → 清掉；若 upsertError 全爆 → 保留下次重試
    let newDirty;
    if (result.upsertError) {
      console.log('[push] upsertError → 保留所有 upsert dirty 等下次重試');
      newDirty = (s.dirty||[]);
    } else {
      newDirty = (s.dirty||[]).filter(d => d.op !== 'upsert');
    }

    // delete 部分：精確處理
    //   - 只有「真的被刪掉」(deletedIds 命中) 才清 dirty
    //   - notFoundIds 不清掉 → 下次同步會重試 (避免 Apps Script 暫時找不到列就永久放棄)
    //   - 重試 5 次後仍 notFound 才放棄 (避免 dirty queue 無限累積)
    if (deletes.length === 0) {
      // 沒送 delete → 保留
    } else if (result.deleteResult) {
      const cleared = []; // for log
      const retained = []; // for log
      newDirty = newDirty.filter(d => {
        if(d.op !== 'delete') return true;
        const info = result.deleteResult[d.table];
        if(!info) { retained.push({table:d.table,id:d.id,reason:'table 未回應'}); return true; }
        // 新版：deletedIds (真的刪了) → 一律清掉
        if(Array.isArray(info.deletedIds) && info.deletedIds.includes(d.id)) {
          cleared.push({table:d.table,id:d.id,reason:'deletedIds 命中'});
          return false;
        }
        // notFoundIds (試算表找不到列) → 累積 notFoundRetry 計數，超過 5 次才放棄
        if(Array.isArray(info.notFoundIds) && info.notFoundIds.includes(d.id)) {
          const c = (d.notFoundRetry||0) + 1;
          if (c >= 5) {
            cleared.push({table:d.table,id:d.id,reason:'notFound 已重試 5 次，放棄'});
            // 同時清掉本地對應紀錄，避免下次 collectAllData 又把它加回 dirty
            try {
              if (d.table === '聯絡人') {
                const crmRaw = localStorage.getItem('crm_v3') || '{}';
                const crm = JSON.parse(crmRaw);
                if (Array.isArray(crm.persons)) {
                  crm.persons = crm.persons.filter(p => String(p.id) !== String(d.id));
                  localStorage.setItem('crm_v3', JSON.stringify(crm));
                }
              }
            } catch {}
            return false;
          }
          d.notFoundRetry = c;
          retained.push({table:d.table,id:d.id,reason:`notFound retry ${c}/5`});
          return true;
        }
        // 舊版：deleted>0 才清整張表
        if(typeof info.deleted === 'number' && info.deleted > 0) {
          cleared.push({table:d.table,id:d.id,reason:'舊版 deleted>0'});
          return false;
        }
        retained.push({table:d.table,id:d.id,reason:'deleted=0，保留重試'});
        return true;
      });
      console.log('[push] 已清除的 delete dirty:', cleared);
      console.log('[push] 保留的 delete dirty (下次重試):', retained);
    }
    // 沒 deleteResult（Apps Script 是舊版）→ 保留所有 delete 等下次再試

    s.dirty = newDirty;
  }
  setSyncState(s);

  return result;
}

// 從 Apps Script 拉取職員名單
async function pullStaffFromSheet(){
  const co = getCompany();
  if(!co.appsScriptUrl) throw new Error('未設定 Apps Script URL');
